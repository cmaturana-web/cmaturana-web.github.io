<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario PRO - Higuerillas</title>
    
    <!-- Librerías Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --red: #002060; /* Cambiado a Azul Higuerillas */
            --yellow: #ffcc00;
            --text: #1a1a1a;
            --muted: #888780;
            --bg: #F5F3EF;
            --card: #fff;
            --border: rgba(0,0,0,0.08);
            --r: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Pantallas */
        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }

        /* Header */
        .hdr { background: var(--red); color: #fff; padding: 15px; border-bottom: 4px solid var(--yellow); }
        .hdr-title { font-size: 20px; font-weight: bold; }

        /* Estilos base */
        .card { background: var(--card); border-radius: var(--r); padding: 15px; margin: 10px; box-shadow: 0 2px 5px var(--border); }
        .btn { padding: 12px; border-radius: var(--r); border: none; font-weight: bold; cursor: pointer; text-align: center; width: 100%; display: block; margin-top: 10px; }
        .btn-primary { background: var(--red); color: white; }
        .btn-outline { background: white; border: 1px solid var(--red); color: var(--red); }
        
        /* Ocultar según dispositivo */
        body.is-pc .mobile-only { display: none !important; }
        body.is-mobile .pc-only { display: none !important; }

        #error-log { color: red; padding: 20px; font-family: monospace; display: none; }
        .loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
    </style>
</head>
<body class="is-pc"> <!-- Por defecto PC -->

    <!-- Mensaje de Error (Se muestra solo si el JS falla) -->
    <div id="error-log"></div>

    <!-- Pantalla de Carga Inicial -->
    <div id="loading" class="loading-screen">
        <h3>Cargando Inventario PRO...</h3>
        <p>Si la página no carga, revisa tu conexión a internet.</p>
    </div>

    <!-- ===== CONTENIDO PC ===== -->
    <div class="screen pc-only" id="pc-main">
        <div class="hdr">
            <div class="hdr-title">PANEL DE CONTROL - PC</div>
        </div>
        <div class="card">
            <h4>1. Subir archivo Excel</h4>
            <input type="file" id="pc-file-input" accept=".xlsx, .xls" onchange="loadExcel(event)">
            <p id="status-excel" style="margin-top:10px; color: green;"></p>
        </div>
        <div class="card" id="pc-config" style="display:none;">
            <h4>2. Configurar y Generar</h4>
            <input type="text" id="pc-folio" placeholder="Folio (Ej: 2026100)" class="btn btn-outline" style="text-align: left;">
            <button class="btn btn-primary" onclick="generateInventory()">Generar QR para Celular</button>
        </div>
        <div class="card" id="pc-qr-container" style="display:none; text-align: center;">
            <div id="qrcode" style="display: inline-block; padding: 10px; background: white;"></div>
            <p>Escanea esto con la App en el celular</p>
        </div>
    </div>

    <!-- ===== CONTENIDO MÓVIL ===== -->
    <div class="screen mobile-only" id="m-home">
        <div class="hdr">
            <div class="hdr-title">MÓVIL - ESCÁNER</div>
        </div>
        <div id="m-no-inv" class="card">
            <p>No hay inventario activo.</p>
            <button class="btn btn-primary" onclick="goTo('m-load')">Cargar Inventario</button>
        </div>
        <div id="m-with-inv" style="display:none;">
            <div class="card">
                <h3 id="m-folio-disp">Folio: -</h3>
                <button class="btn btn-primary" onclick="navMobile('m-scan')">📷 ABRIR ESCÁNER</button>
            </div>
            <div id="m-list" class="card">
                <!-- Lista de productos -->
            </div>
        </div>
    </div>

    <!-- MÓVIL: CARGA -->
    <div class="screen mobile-only" id="m-load">
        <div class="hdr"><button onclick="goTo('m-home')" style="background:none; border:none; color:white;">← Volver</button></div>
        <div class="card">
            <h4>Escanear QR del PC</h4>
            <div id="qr-video-container" style="width:100%; min-height:200px; background:black;"></div>
            <button class="btn btn-primary" onclick="startQRScan()">Activar Cámara</button>
        </div>
    </div>

    <!-- MÓVIL: ESCÁNER DE PRODUCTOS -->
    <div class="screen mobile-only" id="m-scan">
        <div class="hdr"><button onclick="navMobile('m-home')" style="background:none; border:none; color:white;">← Cerrar</button></div>
        <div style="background:black; position:relative;">
            <video id="video" style="width:100%; max-height:300px;"></video>
        </div>
        <div class="card">
            <input type="text" id="manual-code" placeholder="Código Manual" class="btn btn-outline" style="text-align:left;">
            <button class="btn btn-primary" onclick="searchManual()">Buscar</button>
        </div>
    </div>

    <div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:black; color:white; padding:10px 20px; border-radius:20px; display:none; z-index:9999;"></div>

    <script>
        // Log de errores para depuración
        window.onerror = function(msg, url, line) {
            document.getElementById('error-log').style.display = 'block';
            document.getElementById('error-log').innerHTML += "ERROR: " + msg + " en línea " + line + "<br>";
            return false;
        };

        let state = {
            inventory: null,
            conteos: {},
            activeScreen: ''
        };

        function init() {
            console.log("Iniciando App...");
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;
            
            document.body.classList.remove('is-pc', 'is-mobile');
            document.body.classList.add(isMobile ? 'is-mobile' : 'is-pc');

            document.getElementById('loading').style.display = 'none';

            if (isMobile) {
                goTo('m-home');
                updateMobileUI();
            } else {
                goTo('pc-main');
            }
        }

        function goTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if (target) {
                target.classList.add('active');
                state.activeScreen = id;
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        // --- LÓGICA PC ---
        let rawData = [];
        function loadExcel(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                rawData = XLSX.utils.sheet_to_json(sheet);
                document.getElementById('status-excel').textContent = "✓ " + rawData.length + " productos cargados.";
                document.getElementById('pc-config').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        }

        function generateInventory() {
            const folio = document.getElementById('pc-folio').value;
            if(!folio) return alert("Ingresa un folio");

            const inventory = {
                folio: folio,
                productos: rawData.slice(0, 500) // Limitamos para que el QR no sea gigante
            };

            document.getElementById('pc-qr-container').style.display = 'block';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById('qrcode'), {
                text: JSON.stringify(inventory),
                width: 250,
                height: 250
            });
        }

        // --- LÓGICA MÓVIL ---
        function updateMobileUI() {
            if (state.inventory) {
                document.getElementById('m-no-inv').style.display = 'none';
                document.getElementById('m-with-inv').style.display = 'block';
                document.getElementById('m-folio-disp').textContent = "Folio: " + state.inventory.folio;
            }
        }

        function startQRScan() {
            const codeReader = new ZXing.BrowserQRCodeReader();
            const videoContainer = document.getElementById('qr-video-container');
            videoContainer.innerHTML = '<video id="qr-video" style="width:100%;"></video>';

            codeReader.decodeFromVideoDevice(null, 'qr-video', (result, err) => {
                if (result) {
                    state.inventory = JSON.parse(result.text);
                    codeReader.reset();
                    showToast("Inventario Cargado");
                    updateMobileUI();
                    goTo('m-home');
                }
            });
        }

        function navMobile(id) {
            if (id === 'm-scan') {
                startBarcodeScanner();
            }
            goTo(id);
        }

        function startBarcodeScanner() {
            const codeReader = new ZXing.BrowserMultiFormatReader();
            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result) {
                    alert("Producto detectado: " + result.text);
                    // Aquí buscarías en state.inventory.productos
                }
            });
        }

        function searchManual() {
            const code = document.getElementById('manual-code').value;
            if (!state.inventory) return showToast("Carga un inventario primero");
            const prod = state.inventory.productos.find(p => p.codigo == code || p.CodigoFH == code);
            if (prod) {
                alert("Encontrado: " + (prod.descripcion || prod.Descripcion));
            } else {
                showToast("No encontrado");
            }
        }

        // Iniciar al cargar
        window.addEventListener('load', init);
    </script>
</body>
</html>
