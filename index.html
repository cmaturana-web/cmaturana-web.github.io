<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Importaciones China · !LWii</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --orange:    #FF6A00;
  --orange-lt: #FF8C38;
  --orange-glow: rgba(255,106,0,.35);
  --bg:        #0E0E12;
  --bg2:       #16161C;
  --bg3:       #1E1E26;
  --card:      #1A1A22;
  --card2:     #22222C;
  --text:      #F0F0F5;
  --muted:     #7070888;
  --muted2:    #505060;
  --border:    rgba(255,255,255,.07);
  --font-h:    'Barlow Condensed', sans-serif;
  --font-b:    'Barlow', sans-serif;
  --radius:    16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: var(--bg);
  font-family: var(--font-b); color: var(--text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; border: none; outline: none; }
input  { font-family: inherit; outline: none; }

/* Fondo con textura sutil */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 0%, rgba(255,106,0,.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(255,106,0,.06) 0%, transparent 60%);
  pointer-events: none;
}

#app {
  display: flex; flex-direction: column;
  min-height: 100dvh; max-width: 480px; margin: 0 auto;
  position: relative; z-index: 1;
}

/* ── TOPBAR ── */
#topbar {
  background: rgba(14,14,18,.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 16px 18px 14px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid var(--border);
}
.topbar-left { display: flex; flex-direction: column; gap: 2px; }
.topbar-label {
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--orange); opacity: .9;
}
#topbar h1 {
  font-family: var(--font-h); font-size: 20px; font-weight: 900;
  color: var(--text); letter-spacing: .5px; line-height: 1;
}

#btn-sync-top {
  background: var(--orange);
  border-radius: 50px; padding: 9px 16px;
  font-size: 12px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 6px;
  letter-spacing: .8px; text-transform: uppercase;
  transition: background .2s, box-shadow .2s, transform .15s;
  box-shadow: 0 4px 16px var(--orange-glow);
}
#btn-sync-top:hover  { background: var(--orange-lt); }
#btn-sync-top:active { transform: scale(.95); }
#btn-sync-top svg { width: 14px; height: 14px; }

/* ── SEARCH ── */
.search-wrap {
  padding: 14px 14px 0;
  position: sticky; top: 65px; z-index: 90;
  background: var(--bg);
}
.search-inner {
  background: var(--card);
  border-radius: 14px;
  display: flex; align-items: center; padding: 0 14px;
  border: 1.5px solid var(--border);
  transition: border-color .2s, box-shadow .2s;
}
.search-inner:focus-within {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px var(--orange-glow);
}
.search-inner svg { width: 17px; height: 17px; color: var(--orange); flex-shrink: 0; }
#search-input {
  flex: 1; border: none; background: transparent;
  padding: 13px 10px; font-size: 15px; color: var(--text);
  font-weight: 500;
}
#search-input::placeholder { color: var(--muted2); }
#btn-clear {
  background: none; border: none; color: var(--muted2);
  padding: 4px; display: none; font-size: 16px;
}

/* ── STATS ── */
.stats-row {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 18px 6px;
}
#product-count {
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted2);
}
#product-count strong { color: var(--orange); font-size: 14px; }
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted2); display: inline-block;
}
.sync-dot.ok   { background: #22C55E; box-shadow: 0 0 6px rgba(34,197,94,.5); }
.sync-dot.busy { background: var(--orange); animation: pulse 1s infinite; box-shadow: 0 0 6px var(--orange-glow); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ── LISTA ── */
#product-list { padding: 6px 14px 80px; display: flex; flex-direction: column; gap: 10px; }

/* ── CARD ── */
.product-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: fadeUp .25s ease both;
  transition: border-color .2s, box-shadow .2s;
}
.product-card:hover {
  border-color: rgba(255,106,0,.3);
  box-shadow: 0 4px 24px rgba(0,0,0,.4);
}
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

.card-top {
  display: flex; align-items: flex-start; gap: 12px; padding: 12px 12px 10px;
}

.prod-thumb {
  width: 76px; height: 76px; border-radius: 12px;
  object-fit: cover; flex-shrink: 0;
  background: var(--bg3);
  border: 1px solid var(--border);
}
.prod-thumb-placeholder {
  width: 76px; height: 76px; border-radius: 12px;
  background: var(--bg3); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; border: 1px solid var(--border);
}
.prod-thumb-placeholder svg { width: 26px; height: 26px; color: var(--muted2); }

.prod-info { flex: 1; min-width: 0; padding-top: 2px; }
.prod-code {
  font-family: var(--font-h); font-size: 18px; font-weight: 900;
  color: var(--orange); letter-spacing: .5px; line-height: 1;
}
.prod-name {
  font-size: 13px; color: rgba(240,240,245,.75);
  margin-top: 6px; line-height: 1.55;
  word-break: break-word; white-space: normal;
  font-weight: 400;
}

.card-footer {
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  display: flex; justify-content: flex-end;
  background: rgba(0,0,0,.15);
}
.btn-ver {
  background: transparent;
  border: 1.5px solid var(--orange);
  color: var(--orange);
  border-radius: 50px; padding: 7px 18px;
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
  transition: background .2s, color .2s, transform .15s, box-shadow .2s;
}
.btn-ver:hover {
  background: var(--orange); color: #fff;
  box-shadow: 0 4px 14px var(--orange-glow);
}
.btn-ver:active { transform: scale(.95); }
.btn-ver svg { width: 13px; height: 13px; }

/* ── EMPTY ── */
#empty-state {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; padding: 70px 32px; gap: 14px;
  color: var(--muted2); text-align: center;
}
#empty-state svg { width: 60px; height: 60px; opacity: .25; }
#empty-state p { font-size: 14px; line-height: 1.7; font-weight: 500; }

/* ── LOADER ── */
#loader {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 70px 32px; gap: 16px; color: var(--muted2);
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--bg3);
  border-top-color: var(--orange); border-radius: 50%;
  animation: spin .7s linear infinite;
  box-shadow: 0 0 12px var(--orange-glow);
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader span { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

/* ══════════════════════════════════
   MODAL 9:16  
   ══════════════════════════════════ */
#modal-view {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.95);
  align-items: center; justify-content: center; padding: 16px;
  backdrop-filter: blur(4px);
}
#modal-view.open { display: flex; }

.modal-card {
  background: var(--card);
  border-radius: 28px;
  border: 1px solid rgba(255,106,0,.2);
  overflow: hidden;
  animation: scaleIn .22s cubic-bezier(.34,1.56,.64,1);
  display: flex; flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,.8), 0 0 40px rgba(255,106,0,.08);

  /* 9:16 */
  width: min(340px, calc(100vw - 32px));
  height: min(605px, calc(100dvh - 32px));
}
@keyframes scaleIn { from { opacity:0; transform:scale(.88); } to { opacity:1; transform:scale(1); } }

.modal-img-wrap {
  flex: 1; background: #0a0a0e;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
#modal-img { width: 100%; height: 100%; object-fit: contain; }

/* Gradient overlay abajo de imagen */
.modal-img-wrap::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(to top, var(--card), transparent);
  pointer-events: none;
}

.modal-badge {
  position: absolute; top: 14px; left: 14px; z-index: 2;
  background: var(--orange);
  color: #fff;
  font-family: var(--font-h); font-size: 16px; font-weight: 900;
  padding: 5px 16px; border-radius: 50px; letter-spacing: .5px;
  box-shadow: 0 4px 14px rgba(255,106,0,.5);
}

.modal-body {
  padding: 14px 18px 18px;
  background: var(--card); flex-shrink: 0;
}
.modal-name {
  font-size: 14px; color: rgba(240,240,245,.8);
  line-height: 1.6; word-break: break-word;
  margin-bottom: 14px; font-weight: 400;
}
#btn-modal-close {
  width: 100%; padding: 13px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted2); border-radius: 14px;
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase;
  transition: background .2s, color .2s;
}
#btn-modal-close:hover { background: var(--card2); color: var(--text); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text); border-radius: 50px;
  padding: 10px 22px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 300;
  white-space: nowrap; letter-spacing: .3px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
</style>
</head>
<body>
<div id="app">

  <header id="topbar">
    <div class="topbar-left">
      <span class="topbar-label">by !LWii</span>
      <h1>IMPORTACIONES CHINA</h1>
    </div>
    <button id="btn-sync-top" onclick="syncDrive()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      SINCRO
    </button>
  </header>

  <div class="search-wrap">
    <div class="search-inner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="search" placeholder="Buscar código o nombre…"
             oninput="filterProducts()" autocomplete="off"/>
      <button id="btn-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="stats-row">
    <span id="product-count">
      <strong>—</strong> productos
      <span class="sync-dot busy" id="sync-dot"></span>
    </span>
  </div>

  <div id="loader">
    <div class="spinner"></div>
    <span>Cargando inventario…</span>
  </div>
  <div id="product-list" style="display:none"></div>
  <div id="empty-state" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="7" width="20" height="14" rx="2"/>
      <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
    </svg>
    <p>No se encontraron productos.</p>
  </div>

</div>

<!-- MODAL 9:16 -->
<div id="modal-view" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <div class="modal-img-wrap">
      <img id="modal-img" src="" alt=""/>
      <div class="modal-badge" id="modal-code"></div>
    </div>
    <div class="modal-body">
      <div class="modal-name" id="modal-name"></div>
      <button id="btn-modal-close" onclick="closeModal()">✕ &nbsp;CERRAR</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_KEY   = 'AIzaSyAAHwo4KFYUkRDUQHPqY0pzjmv0BKrjtw8';
const FOLDER_ID = '1iezyx2NVafqz4qH7PbMqX7E_1tsFqUXU';
const DISCOVERY = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

let gapiReady   = false;
let allProducts = [];

function gapiLoaded() {
  gapi.load('client', () => {
    gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY] })
      .then(() => { gapiReady = true; syncDrive(); })
      .catch(e => showError('Error al cargar: ' + (e.message || e)));
  });
}

async function syncDrive() {
  if (!gapiReady) { toast('Cargando…'); return; }
  setSyncDot('busy'); showLoader(true); toast('Sincronizando…');
  try {
    let all = [], pageToken = null;
    do {
      const params = {
        q: `'${FOLDER_ID}' in parents and trashed=false and (mimeType contains 'image/')`,
        fields: 'nextPageToken,files(id,name,thumbnailLink)',
        pageSize: 100, spaces: 'drive',
      };
      if (pageToken) params.pageToken = pageToken;
      const r = await gapi.client.drive.files.list(params);
      all.push(...(r.result.files || []));
      pageToken = r.result.nextPageToken;
    } while (pageToken);

    allProducts = all.map(f => {
      const base  = f.name.replace(/\.[^.]+$/, '');
      const parts = base.split('_');
      return {
        id:    f.id,
        code:  parts[0] || '?',
        name:  parts.slice(1).join(' ') || 'SN',
        thumb: f.thumbnailLink ? f.thumbnailLink.replace(/=s\d+/, '=s300') : null,
        full:  `https://drive.google.com/uc?export=view&id=${f.id}`,
      };
    }).sort((a, b) => b.code.localeCompare(a.code, undefined, { numeric: true }));

    showLoader(false);
    renderProducts(allProducts);
    setSyncDot('ok');
    toast(`✓ ${allProducts.length} productos`);
  } catch (e) {
    console.error(e);
    showError('Error al conectar con Drive.<br>Verifica que la carpeta sea pública.');
    setSyncDot('');
  }
}

function renderProducts(list) {
  const container = document.getElementById('product-list');
  const empty     = document.getElementById('empty-state');
  updateCount(list.length);
  if (!list.length) {
    container.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  container.style.display = 'flex';
  container.innerHTML = list.map((p, i) => {
    const nombre = p.name === 'SN'
      ? '<em style="opacity:.4">Sin nombre</em>'
      : p.name.replace(/-/g, ' ');
    const imgHtml = p.thumb
      ? `<img class="prod-thumb" src="${p.thumb}" alt="#${p.code}" loading="lazy">`
      : `<div class="prod-thumb-placeholder">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
             <rect x="3" y="3" width="18" height="18" rx="2"/>
             <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
           </svg>
         </div>`;
    return `
    <div class="product-card" style="animation-delay:${Math.min(i*25,400)}ms">
      <div class="card-top">
        ${imgHtml}
        <div class="prod-info">
          <div class="prod-code">#${p.code}</div>
          <div class="prod-name">${nombre}</div>
        </div>
      </div>
      <div class="card-footer">
        <button class="btn-ver" onclick="viewProduct(${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          VER PRODUCTO
        </button>
      </div>
    </div>`;
  }).join('');
}

function getFiltered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  return q ? allProducts.filter(p =>
    p.code.toLowerCase().includes(q) ||
    p.name.toLowerCase().replace(/-/g,' ').includes(q)) : allProducts;
}
function filterProducts() {
  const q = document.getElementById('search-input').value.trim();
  document.getElementById('btn-clear').style.display = q ? 'block' : 'none';
  renderProducts(getFiltered());
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('btn-clear').style.display = 'none';
  renderProducts(allProducts);
}

function viewProduct(idx) {
  const p = getFiltered()[idx]; if (!p) return;
  document.getElementById('modal-img').src = p.full;
  document.getElementById('modal-code').textContent = `#${p.code}`;
  document.getElementById('modal-name').textContent =
    p.name === 'SN' ? 'Sin nombre' : p.name.replace(/-/g, ' ');
  document.getElementById('modal-view').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-view').classList.remove('open');
  document.getElementById('modal-img').src = '';
  document.body.style.overflow = '';
}

function showLoader(on) {
  document.getElementById('loader').style.display = on ? 'flex' : 'none';
  if (on) {
    document.getElementById('product-list').style.display = 'none';
    document.getElementById('empty-state').style.display  = 'none';
  }
}
function showError(msg) {
  showLoader(false);
  const el = document.getElementById('empty-state');
  el.querySelector('p').innerHTML = msg;
  el.style.display = 'flex';
  document.getElementById('product-list').style.display = 'none';
}
function updateCount(n) {
  const dot = document.getElementById('sync-dot');
  const cls = dot ? dot.className : 'sync-dot';
  document.getElementById('product-count').innerHTML =
    `<strong>${n}</strong> producto${n!==1?'s':''} <span class="${cls}" id="sync-dot"></span>`;
}
function setSyncDot(s) {
  const d = document.getElementById('sync-dot');
  if (d) d.className = 'sync-dot'+(s?' '+s:'');
}
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>

<script src="https://apis.google.com/js/api.js?onload=gapiLoaded" async defer></script>
</body>
</html>
