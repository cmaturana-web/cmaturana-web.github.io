<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Importaciones China · !LWii</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --teal:    #00838F;
  --teal-dk: #005F6B;
  --green:   #43A047;
  --bg:      #F0F2F5;
  --card:    #FFFFFF;
  --text:    #1A1A2E;
  --muted:   #7A8090;
  --border:  #E2E5EC;
  --shadow:  0 2px 12px rgba(0,0,0,.09);
  --radius:  14px;
  --font-h:  'Syne', sans-serif;
  --font-b:  'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); font-family: var(--font-b); color: var(--text); -webkit-font-smoothing: antialiased; }
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; border: none; outline: none; }
input  { font-family: inherit; outline: none; }

#app { display: flex; flex-direction: column; min-height: 100dvh; max-width: 480px; margin: 0 auto; }

/* TOPBAR */
#topbar {
  background: var(--teal); padding: 14px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,131,143,.35);
}
#topbar h1 { font-family: var(--font-h); font-size: 13px; font-weight: 800; color: #fff; letter-spacing: .5px; line-height: 1.3; }
#topbar h1 span { display: block; font-size: 10px; font-weight: 400; opacity: .75; letter-spacing: 1px; text-transform: uppercase; }
#btn-sync-top {
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
  border-radius: 50px; padding: 6px 12px; font-size: 12px; font-weight: 600; color: #fff;
  display: flex; align-items: center; gap: 6px; transition: background .2s; white-space: nowrap;
}
#btn-sync-top:hover { background: rgba(255,255,255,.28); }
#btn-sync-top svg { width: 15px; height: 15px; }

/* SEARCH */
.search-wrap { padding: 12px 12px 0; position: sticky; top: 60px; z-index: 90; background: var(--bg); }
.search-inner {
  background: var(--card); border-radius: var(--radius);
  display: flex; align-items: center; padding: 0 14px;
  box-shadow: var(--shadow); border: 1.5px solid transparent; transition: border-color .2s;
}
.search-inner:focus-within { border-color: var(--teal); }
.search-inner svg { width: 18px; height: 18px; color: var(--teal); flex-shrink: 0; }
#search-input { flex: 1; border: none; background: transparent; padding: 13px 10px; font-size: 15px; color: var(--text); }
#search-input::placeholder { color: var(--muted); }
#btn-clear { background: none; border: none; color: var(--muted); padding: 4px; display: none; font-size: 16px; }

/* STATS */
.stats-row { display: flex; align-items: center; padding: 10px 16px 4px; }
#product-count { font-size: 13px; font-weight: 700; color: var(--teal); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; display: inline-block; margin-left: 7px; vertical-align: middle; }
.sync-dot.ok   { background: var(--green); }
.sync-dot.busy { background: #EF6C00; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* LIST */
#product-list { padding: 8px 12px 40px; display: flex; flex-direction: column; gap: 8px; }

.product-card {
  background: var(--card); border-radius: var(--radius);
  display: flex; align-items: center; gap: 12px; padding: 10px;
  box-shadow: var(--shadow); animation: fadeUp .22s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

.prod-thumb {
  width: 70px; height: 70px; border-radius: 10px;
  object-fit: cover; flex-shrink: 0; background: var(--bg);
  cursor: pointer;
}
.prod-thumb-placeholder {
  width: 70px; height: 70px; border-radius: 10px;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer;
}
.prod-thumb-placeholder svg { width: 28px; height: 28px; color: var(--border); }
.prod-info { flex: 1; min-width: 0; cursor: pointer; }
.prod-code { font-family: var(--font-h); font-size: 15px; font-weight: 700; color: var(--teal); }
.prod-name { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

/* EMPTY */
#empty-state {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 32px; gap: 12px;
  color: var(--muted); text-align: center;
}
#empty-state svg { width: 64px; height: 64px; opacity: .3; }
#empty-state p { font-size: 15px; line-height: 1.6; }

/* LOADER */
#loader {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 32px; gap: 16px; color: var(--muted);
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--teal); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MODAL */
#modal-view {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.88); align-items: center; justify-content: center; padding: 20px;
}
#modal-view.open { display: flex; }
.modal-card {
  background: var(--card); border-radius: 20px;
  width: 100%; max-width: 440px; max-height: 92dvh;
  display: flex; flex-direction: column; overflow: hidden;
  animation: scaleIn .18s ease;
}
@keyframes scaleIn { from { opacity:0; transform:scale(.93); } to { opacity:1; transform:scale(1); } }
#modal-img { width: 100%; aspect-ratio: 1; object-fit: contain; background: var(--bg); }
.modal-body { padding: 16px 20px 20px; }
.modal-code { font-family: var(--font-h); font-size: 22px; font-weight: 800; color: var(--teal); }
.modal-name { font-size: 16px; margin-top: 2px; color: var(--text); }
#btn-modal-close {
  margin-top: 16px; width: 100%; padding: 14px;
  background: var(--teal); color: #fff; border-radius: 12px;
  font-size: 15px; font-weight: 600; transition: background .2s;
}
#btn-modal-close:hover { background: var(--teal-dk); }

/* TOAST */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #1a1a2e; color: #fff; border-radius: 50px;
  padding: 10px 20px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 300; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div id="app">

  <header id="topbar">
    <h1>IMPORTACIONES CHINA <span>by !LWii</span></h1>
    <button id="btn-sync-top" onclick="syncDrive()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      SINCRO
    </button>
  </header>

  <div class="search-wrap">
    <div class="search-inner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="search" placeholder="Buscar código o nombre…" oninput="filterProducts()" autocomplete="off"/>
      <button id="btn-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="stats-row">
    <span id="product-count">— <span class="sync-dot busy" id="sync-dot"></span></span>
  </div>

  <div id="loader"><div class="spinner"></div><span>Cargando inventario…</span></div>
  <div id="product-list" style="display:none"></div>
  <div id="empty-state" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="7" width="20" height="14" rx="2"/>
      <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
    </svg>
    <p>No se encontraron productos.</p>
  </div>

</div>

<!-- MODAL VER -->
<div id="modal-view" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <img id="modal-img" src="" alt=""/>
    <div class="modal-body">
      <div class="modal-code" id="modal-code"></div>
      <div class="modal-name" id="modal-name"></div>
      <button id="btn-modal-close" onclick="closeModal()">CERRAR</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════
   CONFIGURACIÓN
   ═══════════════════════════════════════ */
const API_KEY     = 'AIzaSyAAHwo4KFYUkRDUQHPqY0pzjmv0BKrjtw8';
const FOLDER_NAME = 'Importaciones';
const DISCOVERY   = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

let gapiReady   = false;
let allProducts = [];

/* ── GAPI init ── */
function gapiLoaded() {
  gapi.load('client', () => {
    gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY] })
      .then(() => { gapiReady = true; syncDrive(); })
      .catch(e => showError('Error al cargar: ' + (e.message || e)));
  });
}

/* ── Sync Drive (solo API Key, sin login) ── */
async function syncDrive() {
  if (!gapiReady) { toast('Cargando…'); return; }
  setSyncDot('busy');
  showLoader(true);
  toast('Sincronizando…');
  try {
    // Buscar carpeta pública
    const fRes = await gapi.client.drive.files.list({
      q: `mimeType='application/vnd.google-apps.folder' and name='${FOLDER_NAME}' and trashed=false`,
      fields: 'files(id,name)',
      spaces: 'drive',
    });
    const folders = fRes.result.files || [];
    if (!folders.length) {
      showError(`No encontré la carpeta "${FOLDER_NAME}" en Drive.<br>Asegúrate de que sea pública.`);
      setSyncDot(''); return;
    }
    const folderId = folders[0].id;
    let all = [], pageToken = null;
    do {
      const params = {
        q: `'${folderId}' in parents and trashed=false and (mimeType contains 'image/')`,
        fields: 'nextPageToken,files(id,name,thumbnailLink)',
        pageSize: 100, spaces: 'drive',
      };
      if (pageToken) params.pageToken = pageToken;
      const r = await gapi.client.drive.files.list(params);
      all.push(...(r.result.files || []));
      pageToken = r.result.nextPageToken;
    } while (pageToken);

    allProducts = all.map(f => {
      const base  = f.name.replace(/\.[^.]+$/, '');
      const parts = base.split('_');
      return {
        id:    f.id,
        code:  parts[0] || '?',
        name:  parts.slice(1).join(' ') || 'SN',
        thumb: f.thumbnailLink ? f.thumbnailLink.replace(/=s\d+/, '=s300') : null,
        full:  `https://drive.google.com/uc?export=view&id=${f.id}`,
      };
    }).sort((a, b) => b.code.localeCompare(a.code, undefined, { numeric: true }));

    showLoader(false);
    renderProducts(allProducts);
    setSyncDot('ok');
    toast(`✓ ${allProducts.length} productos`);
  } catch (e) {
    console.error(e);
    showError('Error al conectar con Drive.<br>Verifica que la carpeta sea pública.');
    setSyncDot('');
  }
}

/* ── Render ── */
function renderProducts(list) {
  const container = document.getElementById('product-list');
  const empty     = document.getElementById('empty-state');
  updateCount(list.length);
  if (!list.length) {
    container.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  container.style.display = 'flex';
  container.innerHTML = list.map((p, i) => `
    <div class="product-card" style="animation-delay:${Math.min(i*20,300)}ms" onclick="viewProduct(${i})">
      ${p.thumb
        ? `<img class="prod-thumb" src="${p.thumb}" alt="#${p.code}" loading="lazy">`
        : `<div class="prod-thumb-placeholder">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
               <rect x="3" y="3" width="18" height="18" rx="2"/>
               <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
             </svg></div>`}
      <div class="prod-info">
        <div class="prod-code">#${p.code}</div>
        <div class="prod-name">${p.name==='SN'?'<em style="color:var(--muted)">Sin nombre</em>':p.name.replace(/-/g,' ')}</div>
      </div>
    </div>`).join('');
}

/* ── Búsqueda ── */
function getFiltered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  return q ? allProducts.filter(p =>
    p.code.toLowerCase().includes(q) ||
    p.name.toLowerCase().replace(/-/g,' ').includes(q)) : allProducts;
}
function filterProducts() {
  const q = document.getElementById('search-input').value.trim();
  document.getElementById('btn-clear').style.display = q ? 'block' : 'none';
  renderProducts(getFiltered());
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('btn-clear').style.display = 'none';
  renderProducts(allProducts);
}

/* ── Modal ── */
function viewProduct(idx) {
  const p = getFiltered()[idx]; if (!p) return;
  document.getElementById('modal-img').src = p.full;
  document.getElementById('modal-code').textContent = `#${p.code}`;
  document.getElementById('modal-name').textContent = p.name==='SN'?'Sin nombre':p.name.replace(/-/g,' ');
  document.getElementById('modal-view').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-view').classList.remove('open');
  document.getElementById('modal-img').src = '';
  document.body.style.overflow = '';
}

/* ── Helpers ── */
function showLoader(on) {
  document.getElementById('loader').style.display = on ? 'flex' : 'none';
  if (on) {
    document.getElementById('product-list').style.display = 'none';
    document.getElementById('empty-state').style.display  = 'none';
  }
}
function showError(msg) {
  showLoader(false);
  const el = document.getElementById('empty-state');
  el.querySelector('p').innerHTML = msg;
  el.style.display = 'flex';
  document.getElementById('product-list').style.display = 'none';
}
function updateCount(n) {
  const dot = document.getElementById('sync-dot');
  const cls = dot ? dot.className : 'sync-dot';
  document.getElementById('product-count').innerHTML =
    `${n} Producto${n!==1?'s':''} <span class="${cls}" id="sync-dot"></span>`;
}
function setSyncDot(s) {
  const d = document.getElementById('sync-dot');
  if (d) d.className = 'sync-dot'+(s?' '+s:'');
}
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>

<script src="https://apis.google.com/js/api.js?onload=gapiLoaded" async defer></script>
</body>
</html>
