<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Scanner · Stock</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<!-- ZXing para leer códigos de barras desde la cámara -->
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
:root {
  --cyan:        #00E5FF;
  --cyan-dim:    rgba(0,229,255,.15);
  --cyan-glow:   rgba(0,229,255,.35);
  --green:       #00FF9C;
  --green-dim:   rgba(0,255,156,.12);
  --green-glow:  rgba(0,255,156,.35);
  --red:         #FF3B5C;
  --red-dim:     rgba(255,59,92,.12);
  --yellow:      #FFD600;
  --bg:          #080C10;
  --bg2:         #0D1117;
  --bg3:         #131920;
  --card:        #111820;
  --border:      rgba(0,229,255,.12);
  --text:        #E0F0FF;
  --muted:       #4A6070;
  --font-mono:   'Share Tech Mono', monospace;
  --font-ui:     'Exo 2', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: var(--bg);
  font-family: var(--font-ui); color: var(--text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none; overflow-x: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; outline: none; }

/* ── FONDO GRID ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,229,255,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 100%, rgba(0,255,156,.05) 0%, transparent 60%);
  pointer-events: none;
}

#app {
  display: flex; flex-direction: column;
  min-height: 100dvh; max-width: 480px; margin: 0 auto;
  position: relative; z-index: 1;
  padding-bottom: 80px;
}

/* ── HEADER ── */
header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,12,16,.9);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.app-title {
  font-family: var(--font-mono); font-size: 18px; color: var(--cyan);
  letter-spacing: 2px; text-shadow: 0 0 20px var(--cyan-glow);
}
.app-sub {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
}
.header-badge {
  background: var(--cyan-dim); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px;
  font-family: var(--font-mono); font-size: 11px; color: var(--cyan);
  display: flex; align-items: center; gap: 6px;
}
.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 8px var(--green-glow);
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── SECCIÓN SCANNER ── */
.section { padding: 16px 14px; }
.section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── VISOR CÁMARA ── */
.camera-wrap {
  position: relative; width: 100%; aspect-ratio: 1/1;
  border-radius: 20px; overflow: hidden;
  background: #000;
  border: 1px solid var(--border);
  box-shadow: 0 0 0 1px rgba(0,229,255,.05), 0 8px 40px rgba(0,0,0,.6);
}
#video {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
/* Marco de escaneo animado */
.scan-frame {
  position: absolute; inset: 0; z-index: 10; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
}
.scan-box {
  width: 65%; aspect-ratio: 3/2;
  position: relative;
}
.scan-box::before, .scan-box::after,
.scan-corner-bl, .scan-corner-br {
  content: ''; position: absolute;
  width: 28px; height: 28px;
  border-color: var(--cyan); border-style: solid;
}
.scan-box::before  { top: 0; left: 0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.scan-box::after   { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.scan-corner-bl    { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.scan-corner-br    { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

/* Línea de escaneo */
.scan-line {
  position: absolute; left: 6%; right: 6%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  box-shadow: 0 0 12px var(--cyan-glow);
  animation: scanMove 2s ease-in-out infinite;
}
@keyframes scanMove {
  0%   { top: 10%; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { top: 90%; opacity: 0; }
}

/* Overlay oscuro bordes */
.scan-overlay {
  position: absolute; inset: 0; z-index: 9;
  background:
    radial-gradient(ellipse 60% 45% at 50% 50%, transparent 55%, rgba(0,0,0,.65) 100%);
  pointer-events: none;
}

/* Estado de la cámara */
.cam-status {
  position: absolute; bottom: 12px; left: 0; right: 0; z-index: 11;
  display: flex; justify-content: center;
}
.cam-status-pill {
  background: rgba(8,12,16,.85); border: 1px solid var(--border);
  border-radius: 50px; padding: 5px 14px;
  font-family: var(--font-mono); font-size: 11px; color: var(--cyan);
  display: flex; align-items: center; gap: 6px;
  backdrop-filter: blur(8px);
}

/* ── CONTROLES ── */
.controls { display: flex; gap: 10px; margin-top: 12px; }
#btn-scan {
  flex: 1; padding: 15px; border-radius: 14px;
  background: var(--cyan); color: var(--bg);
  font-size: 13px; font-weight: 900; letter-spacing: 1.5px;
  text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 20px var(--cyan-glow), 0 0 0 1px rgba(0,229,255,.3);
  transition: all .2s;
}
#btn-scan:hover  { background: #33EAFF; box-shadow: 0 6px 28px var(--cyan-glow); }
#btn-scan:active { transform: scale(.96); }
#btn-scan.active { background: var(--red); box-shadow: 0 4px 20px rgba(255,59,92,.4); color: #fff; }
#btn-scan svg { width: 18px; height: 18px; flex-shrink: 0; }

#btn-manual {
  padding: 15px 18px; border-radius: 14px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--muted); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .2s;
}
#btn-manual:hover { border-color: var(--cyan); color: var(--cyan); }
#btn-manual svg { width: 16px; height: 16px; }

/* ── INPUT MANUAL ── */
.manual-wrap {
  display: none; margin-top: 10px;
  background: var(--card); border-radius: 14px;
  border: 1.5px solid var(--border);
  overflow: hidden; transition: border-color .2s;
}
.manual-wrap.show { display: flex; }
.manual-wrap:focus-within { border-color: var(--cyan); box-shadow: 0 0 0 3px var(--cyan-dim); }
#manual-input {
  flex: 1; background: transparent; border: none; padding: 13px 14px;
  font-family: var(--font-mono); font-size: 15px; color: var(--text);
  letter-spacing: 1px;
}
#manual-input::placeholder { color: var(--muted); letter-spacing: 1px; }
#btn-manual-go {
  padding: 13px 16px; background: var(--cyan-dim); border-left: 1px solid var(--border);
  color: var(--cyan); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  transition: background .2s;
}
#btn-manual-go:hover { background: var(--cyan); color: var(--bg); }

/* ── RESULTADO ── */
#result-section { display: none; padding: 0 14px 16px; }

.result-card {
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  animation: slideUp .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }

.result-header {
  padding: 14px 16px 12px;
  background: linear-gradient(135deg, rgba(0,229,255,.08), transparent);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.result-code-badge {
  font-family: var(--font-mono); font-size: 20px; font-weight: 700;
  color: var(--cyan); letter-spacing: 1px;
  text-shadow: 0 0 20px var(--cyan-glow);
}
.result-source {
  margin-left: auto; font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
}

.result-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

.data-row {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.data-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted); padding-top: 2px;
  flex-shrink: 0;
}
.data-value {
  font-size: 15px; font-weight: 700; color: var(--text);
  text-align: right; word-break: break-word;
}
.data-value.price  { color: var(--green); font-family: var(--font-mono); font-size: 18px; text-shadow: 0 0 16px var(--green-glow); }
.data-value.stock-ok   { color: var(--green); }
.data-value.stock-low  { color: var(--yellow); }
.data-value.stock-none { color: var(--red); }

.result-divider { height: 1px; background: var(--border); margin: 2px 0; }

/* ── PREGUNTA REPORTE ── */
.report-ask {
  margin: 0 16px 16px; padding: 14px 16px;
  background: rgba(0,255,156,.06); border: 1px solid rgba(0,255,156,.2);
  border-radius: 14px; display: flex; flex-direction: column; gap: 10px;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.report-ask-text {
  font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.5;
}
.report-ask-text span { color: var(--green); }
.report-btns { display: flex; gap: 8px; }
#btn-add-report {
  flex: 1; padding: 12px; background: var(--green); color: var(--bg);
  border-radius: 12px; font-size: 12px; font-weight: 900;
  letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: 0 4px 16px var(--green-glow);
  transition: all .2s;
}
#btn-add-report:hover { background: #33FFB0; }
#btn-add-report:active { transform: scale(.96); }
#btn-skip-report {
  padding: 12px 16px; background: transparent;
  border: 1px solid var(--border); border-radius: 12px;
  color: var(--muted); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  transition: all .2s;
}
#btn-skip-report:hover { border-color: var(--red); color: var(--red); }

/* ── LOADING RESULT ── */
.loading-card {
  background: var(--card); border-radius: 20px;
  border: 1px solid var(--border); padding: 32px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  animation: fadeIn .2s ease;
}
.loading-code {
  font-family: var(--font-mono); font-size: 22px; color: var(--cyan);
  letter-spacing: 2px; text-shadow: 0 0 20px var(--cyan-glow);
}
.scan-spinner {
  width: 40px; height: 40px;
  border: 2px solid var(--bg3);
  border-top-color: var(--cyan);
  border-right-color: var(--cyan);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  box-shadow: 0 0 14px var(--cyan-glow);
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-label {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
}

/* ── ERROR CARD ── */
.error-card {
  background: var(--red-dim); border: 1px solid rgba(255,59,92,.3);
  border-radius: 20px; padding: 20px;
  display: flex; align-items: center; gap: 12px;
  animation: fadeIn .2s ease;
}
.error-icon { font-size: 24px; flex-shrink: 0; }
.error-text { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.5; }
.error-text small { display: block; color: var(--muted); font-weight: 400; margin-top: 4px; }

/* ── LISTA DE COMPRAS ── */
#report-section { padding: 0 14px 16px; display: none; }

.report-header-row {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
#btn-clear-report {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--red); background: none;
  border: 1px solid rgba(255,59,92,.25); border-radius: 8px;
  padding: 5px 10px; transition: all .2s;
}
#btn-clear-report:hover { background: var(--red-dim); }

#btn-export-report {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--green); background: none;
  border: 1px solid rgba(0,255,156,.25); border-radius: 8px;
  padding: 5px 10px; transition: all .2s; display: flex; align-items: center; gap: 5px;
}
#btn-export-report:hover { background: var(--green-dim); }

.report-list { display: flex; flex-direction: column; gap: 8px; }

.report-item {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  animation: slideUp .2s ease;
  transition: border-color .2s;
}
.report-item:hover { border-color: rgba(0,229,255,.2); }
.report-item-num {
  font-family: var(--font-mono); font-size: 11px; color: var(--muted);
  width: 20px; text-align: center; flex-shrink: 0;
}
.report-item-info { flex: 1; min-width: 0; }
.report-item-code {
  font-family: var(--font-mono); font-size: 14px; color: var(--cyan); font-weight: 700;
}
.report-item-name {
  font-size: 11px; color: var(--muted); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.report-item-price {
  font-family: var(--font-mono); font-size: 13px; color: var(--green);
  font-weight: 700; flex-shrink: 0;
}
.btn-remove-item {
  background: none; color: var(--muted); font-size: 16px;
  padding: 2px 6px; border-radius: 6px; transition: all .2s; flex-shrink: 0;
}
.btn-remove-item:hover { color: var(--red); background: var(--red-dim); }

.report-total {
  margin-top: 10px; padding: 14px 16px;
  background: var(--green-dim); border: 1px solid rgba(0,255,156,.2);
  border-radius: 14px; display: flex; justify-content: space-between; align-items: center;
}
.report-total-label { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.report-total-value { font-family: var(--font-mono); font-size: 20px; color: var(--green); text-shadow: 0 0 16px var(--green-glow); }

.report-empty {
  text-align: center; padding: 28px; color: var(--muted);
  font-size: 13px; font-weight: 600; letter-spacing: 1px;
  border: 1px dashed var(--border); border-radius: 14px;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); border-radius: 50px;
  padding: 10px 22px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 500;
  white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,.6);
  font-family: var(--font-mono); letter-spacing: 1px;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.green { border-color: rgba(0,255,156,.3); color: var(--green); }
#toast.red   { border-color: rgba(255,59,92,.3);  color: var(--red); }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-left">
      <div class="app-title">◈ SCANNER</div>
      <div class="app-sub">Sistema de Stock · Ultron</div>
    </div>
    <div class="header-badge">
      <span class="pulse-dot"></span>
      <span id="report-count">0 ítems</span>
    </div>
  </header>

  <!-- ── SECCIÓN CÁMARA ── -->
  <div class="section">
    <div class="section-title">Escanear código</div>

    <div class="camera-wrap">
      <video id="video" playsinline muted></video>
      <div class="scan-overlay"></div>
      <div class="scan-frame">
        <div class="scan-box">
          <div class="scan-corner-bl"></div>
          <div class="scan-corner-br"></div>
          <div class="scan-line"></div>
        </div>
      </div>
      <div class="cam-status">
        <div class="cam-status-pill" id="cam-pill">
          <span id="cam-pill-dot" class="pulse-dot" style="background:var(--muted);box-shadow:none;animation:none"></span>
          <span id="cam-pill-text">Cámara inactiva</span>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="btn-scan" onclick="toggleScan()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span id="btn-scan-txt">ACTIVAR CÁMARA</span>
      </button>
      <button id="btn-manual" onclick="toggleManual()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/>
          <line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/>
        </svg>
        MANUAL
      </button>
    </div>

    <div class="manual-wrap" id="manual-wrap">
      <input id="manual-input" type="text" placeholder="Ingresar código…"
             inputmode="numeric" autocomplete="off"
             onkeydown="if(event.key==='Enter')consultarCodigo(this.value.trim())"/>
      <button id="btn-manual-go" onclick="consultarCodigo(document.getElementById('manual-input').value.trim())">
        BUSCAR
      </button>
    </div>
  </div>

  <!-- ── RESULTADO CONSULTA ── -->
  <div id="result-section"></div>

  <!-- ── REPORTE DE COMPRAS ── -->
  <div id="report-section">
    <div class="section-title">Reporte de compras</div>
    <div class="report-header-row">
      <button id="btn-export-report" onclick="exportarReporte()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        EXPORTAR
      </button>
      <button id="btn-clear-report" onclick="limpiarReporte()">✕ LIMPIAR TODO</button>
    </div>
    <div class="report-list" id="report-list"></div>
    <div id="report-total-wrap"></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  CONFIGURACIÓN
// ═══════════════════════════════════════════
const STOCK_URL = 'http://net.fh.cl:82/ultron_stock.asp';
// Proxy CORS: necesario porque el servidor no tiene cabeceras CORS
// Usamos allorigins.win para hacer el fetch desde el navegador
const PROXY     = 'https://api.allorigins.win/get?url=';

let scannerActivo = false;
let codeReader    = null;
let reporteItems  = JSON.parse(localStorage.getItem('reporte_compras') || '[]');
let ultimoProducto = null;
let escaneando     = false;

// ═══════════════════════════════════════════
//  CÁMARA / SCANNER
// ═══════════════════════════════════════════
async function toggleScan() {
  if (scannerActivo) {
    detenerScanner();
  } else {
    iniciarScanner();
  }
}

async function iniciarScanner() {
  const btn  = document.getElementById('btn-scan');
  const txt  = document.getElementById('btn-scan-txt');
  const pill = document.getElementById('cam-pill-text');
  const dot  = document.getElementById('cam-pill-dot');

  txt.textContent  = 'DETENER';
  pill.textContent = 'Iniciando cámara…';
  dot.style.background   = 'var(--yellow)';
  dot.style.animation    = 'blink 1.4s ease-in-out infinite';
  dot.style.boxShadow    = '0 0 8px rgba(255,214,0,.5)';
  btn.classList.add('active');

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    const devices = await ZXing.BrowserMultiFormatReader.listVideoInputDevices();

    // Preferir cámara trasera
    let deviceId = undefined;
    if (devices.length > 1) {
      const back = devices.find(d =>
        d.label.toLowerCase().includes('back') ||
        d.label.toLowerCase().includes('trasera') ||
        d.label.toLowerCase().includes('rear') ||
        d.label.toLowerCase().includes('environment')
      );
      if (back) deviceId = back.deviceId;
      else deviceId = devices[devices.length - 1].deviceId;
    }

    await codeReader.decodeFromVideoDevice(deviceId, 'video', (result, err) => {
      if (result && !escaneando) {
        escaneando = true;
        const code = result.getText();
        vibrar();
        pill.textContent = '✓ ' + code;
        dot.style.background = 'var(--green)';
        dot.style.boxShadow  = '0 0 8px var(--green-glow)';
        consultarCodigo(code);
        // Pausa anti-rebote
        setTimeout(() => { escaneando = false; }, 3000);
      }
    });

    scannerActivo = true;
    pill.textContent = 'Escaneando…';
    dot.style.background = 'var(--green)';
    dot.style.animation  = 'blink 1.4s ease-in-out infinite';
    dot.style.boxShadow  = '0 0 8px var(--green-glow)';

  } catch(e) {
    detenerScanner();
    pill.textContent = 'Error de cámara';
    dot.style.background = 'var(--red)';
    dot.style.animation  = 'none';
    toast('No se pudo acceder a la cámara', 'red');
    console.error(e);
  }
}

function detenerScanner() {
  if (codeReader) { try { codeReader.reset(); } catch(e){} codeReader = null; }
  scannerActivo = false;
  escaneando    = false;

  const btn = document.getElementById('btn-scan');
  const txt = document.getElementById('btn-scan-txt');
  const pill = document.getElementById('cam-pill-text');
  const dot  = document.getElementById('cam-pill-dot');

  btn.classList.remove('active');
  txt.textContent        = 'ACTIVAR CÁMARA';
  pill.textContent       = 'Cámara inactiva';
  dot.style.background   = 'var(--muted)';
  dot.style.boxShadow    = 'none';
  dot.style.animation    = 'none';
}

function toggleManual() {
  const wrap = document.getElementById('manual-wrap');
  const inp  = document.getElementById('manual-input');
  if (wrap.classList.toggle('show')) {
    inp.focus();
  } else {
    inp.value = '';
  }
}

function vibrar() {
  if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
}

// ═══════════════════════════════════════════
//  CONSULTA DE STOCK
// ═══════════════════════════════════════════
async function consultarCodigo(codigo) {
  if (!codigo) { toast('Ingresa un código', 'red'); return; }

  const rs = document.getElementById('result-section');
  rs.style.display = 'block';
  rs.innerHTML = `
    <div style="padding:0 14px 16px">
      <div class="loading-card">
        <div class="loading-code">${codigo}</div>
        <div class="scan-spinner"></div>
        <div class="loading-label">Consultando stock…</div>
      </div>
    </div>`;

  // Limpiar pregunta de reporte anterior
  const oldAsk = document.querySelector('.report-ask');
  if (oldAsk) oldAsk.remove();

  try {
    const targetUrl = encodeURIComponent(`${STOCK_URL}?codigo=${encodeURIComponent(codigo)}`);
    const resp = await fetch(PROXY + targetUrl);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    const html  = json.contents;

    // Parsear el HTML recibido
    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');
    const data   = parsearRespuesta(doc, codigo);

    ultimoProducto = { codigo, ...data };
    mostrarResultado(ultimoProducto);
    mostrarPreguntaReporte(ultimoProducto);

  } catch(e) {
    console.error(e);
    // Si el proxy falla, intentar mostrar igualmente con iframe fallback
    rs.innerHTML = `
      <div style="padding:0 14px 16px">
        <div class="error-card">
          <span class="error-icon">⚠</span>
          <div class="error-text">
            No se pudo conectar al servidor de stock.
            <small>Verifica que estés en la red de la empresa o que el servidor esté disponible.</small>
          </div>
        </div>
        <div style="margin-top:10px">
          <a href="${STOCK_URL}?codigo=${encodeURIComponent(codigo)}" target="_blank"
             style="display:block;text-align:center;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--cyan);font-family:var(--font-mono);font-size:12px;text-decoration:none;letter-spacing:1px;">
            ↗ ABRIR EN NAVEGADOR
          </a>
        </div>
      </div>`;

    // Igual preguntamos si agregar al reporte (sin datos de precio)
    ultimoProducto = { codigo, nombre: 'Sin datos', precio: null, stock: null };
    mostrarPreguntaReporte(ultimoProducto);
  }

  document.getElementById('manual-input').value = '';
}

// ── Parsear la respuesta HTML de Ultron ──
function parsearRespuesta(doc, codigoBuscado) {
  // Buscar en tablas, celdas, spans, etc.
  const texto = doc.body ? doc.body.innerText || doc.body.textContent : '';

  let nombre = 'No encontrado';
  let precio = null;
  let stock  = null;

  // Intentar extraer datos desde celdas de tabla (estructura típica de ASP clásico)
  const celdas = Array.from(doc.querySelectorAll('td, th, span, div, p'));
  const textos = celdas.map(c => c.textContent.trim()).filter(t => t.length > 0);

  // Buscar precio (formato $1.234 o 1234)
  const rePrecio = /\$\s?[\d.,]+|precio[:\s]+[\d.,]+|\b\d{3,6}(?:[.,]\d{2,3})?\b/gi;
  const matchPrecio = texto.match(rePrecio);
  if (matchPrecio && matchPrecio.length > 0) {
    const raw = matchPrecio[0].replace(/[^0-9]/g, '');
    if (raw.length >= 3) precio = parseInt(raw);
  }

  // Buscar stock (número seguido de "unid", "stock", "disponible")
  const reStock = /stock[:\s]+(\d+)|(\d+)\s*unid|disponible[:\s]+(\d+)|cantidad[:\s]+(\d+)/gi;
  const matchStock = reStock.exec(texto);
  if (matchStock) {
    stock = parseInt(matchStock[1] || matchStock[2] || matchStock[3] || matchStock[4]);
  }

  // Buscar nombre del producto (texto largo que no sea número)
  for (const t of textos) {
    if (t.length > 5 && t.length < 120 && !/^\d+$/.test(t) && !t.includes('$')) {
      if (t.toLowerCase() !== 'no encontrado' && !/^(código|codigo|precio|stock|nombre|descripción)/i.test(t)) {
        nombre = t;
        break;
      }
    }
  }

  // Si no se parseó nada útil
  if (nombre === 'No encontrado' && precio === null && stock === null) {
    return { nombre: 'Sin datos disponibles', precio: null, stock: null, rawHtml: doc.body?.innerHTML };
  }

  return { nombre, precio, stock };
}

function mostrarResultado(p) {
  const rs = document.getElementById('result-section');

  let stockClass = 'stock-ok';
  let stockTxt   = p.stock !== null ? p.stock + ' unidades' : 'N/D';
  if (p.stock === 0)         { stockClass = 'stock-none'; stockTxt = 'Sin stock'; }
  else if (p.stock !== null && p.stock < 5) { stockClass = 'stock-low'; stockTxt = p.stock + ' (bajo)'; }
  else if (p.stock === null) { stockClass = ''; }

  const precioTxt = p.precio !== null
    ? '$' + p.precio.toLocaleString('es-CL')
    : 'N/D';

  rs.innerHTML = `
    <div style="padding:0 14px 16px">
      <div class="result-card">
        <div class="result-header">
          <div class="result-code-badge">${p.codigo}</div>
          <div class="result-source">ULTRON STOCK</div>
        </div>
        <div class="result-body">
          <div class="data-row">
            <span class="data-label">Producto</span>
            <span class="data-value">${p.nombre}</span>
          </div>
          <div class="result-divider"></div>
          <div class="data-row">
            <span class="data-label">Precio</span>
            <span class="data-value price">${precioTxt}</span>
          </div>
          <div class="result-divider"></div>
          <div class="data-row">
            <span class="data-label">Stock</span>
            <span class="data-value ${stockClass}">${stockTxt}</span>
          </div>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  PREGUNTA DE REPORTE
// ═══════════════════════════════════════════
function mostrarPreguntaReporte(p) {
  // Eliminar anterior si existe
  const old = document.querySelector('.report-ask');
  if (old) old.remove();

  const div = document.createElement('div');
  div.className = 'report-ask';
  div.innerHTML = `
    <div class="report-ask-text">
      ¿Agregar <span>#${p.codigo}</span> al reporte de compras?
    </div>
    <div class="report-btns">
      <button id="btn-add-report" onclick="agregarReporte()">✓ AGREGAR</button>
      <button id="btn-skip-report" onclick="this.closest('.report-ask').remove()">✕ OMITIR</button>
    </div>`;

  // Insertar después del result-section
  const rs = document.getElementById('result-section');
  rs.parentNode.insertBefore(div, rs.nextSibling);
}

// ═══════════════════════════════════════════
//  REPORTE DE COMPRAS
// ═══════════════════════════════════════════
function agregarReporte() {
  if (!ultimoProducto) return;

  // Verificar si ya está en el reporte
  const existe = reporteItems.find(i => i.codigo === ultimoProducto.codigo);
  if (existe) {
    toast('Ya está en el reporte', 'red');
    document.querySelector('.report-ask')?.remove();
    return;
  }

  reporteItems.push({ ...ultimoProducto, ts: Date.now() });
  guardarReporte();
  renderReporte();
  toast('✓ Agregado al reporte', 'green');
  document.querySelector('.report-ask')?.remove();
  vibrar();
}

function renderReporte() {
  const sec  = document.getElementById('report-section');
  const list = document.getElementById('report-list');
  const totW = document.getElementById('report-total-wrap');
  const cnt  = document.getElementById('report-count');

  cnt.textContent = reporteItems.length + ' ítem' + (reporteItems.length !== 1 ? 's' : '');
  sec.style.display = 'block';

  if (!reporteItems.length) {
    list.innerHTML = '<div class="report-empty">Sin productos en el reporte</div>';
    totW.innerHTML = '';
    return;
  }

  list.innerHTML = reporteItems.map((item, i) => {
    const precioTxt = item.precio !== null ? '$' + item.precio.toLocaleString('es-CL') : '—';
    const nombre    = item.nombre && item.nombre !== 'Sin datos disponibles' && item.nombre !== 'Sin datos'
      ? item.nombre : '(sin nombre)';
    return `
      <div class="report-item">
        <div class="report-item-num">${i+1}</div>
        <div class="report-item-info">
          <div class="report-item-code">${item.codigo}</div>
          <div class="report-item-name">${nombre}</div>
        </div>
        <div class="report-item-price">${precioTxt}</div>
        <button class="btn-remove-item" onclick="eliminarItem(${i})">✕</button>
      </div>`;
  }).join('');

  // Total
  const total = reporteItems.reduce((s, i) => s + (i.precio || 0), 0);
  totW.innerHTML = `
    <div class="report-total">
      <span class="report-total-label">Total estimado</span>
      <span class="report-total-value">$${total.toLocaleString('es-CL')}</span>
    </div>`;
}

function eliminarItem(idx) {
  reporteItems.splice(idx, 1);
  guardarReporte();
  renderReporte();
  toast('Ítem eliminado');
}

function limpiarReporte() {
  if (!reporteItems.length) return;
  if (!confirm('¿Limpiar todo el reporte?')) return;
  reporteItems = [];
  guardarReporte();
  renderReporte();
  toast('Reporte limpiado');
}

function guardarReporte() {
  localStorage.setItem('reporte_compras', JSON.stringify(reporteItems));
}

function exportarReporte() {
  if (!reporteItems.length) { toast('Reporte vacío', 'red'); return; }

  const fecha = new Date().toLocaleDateString('es-CL');
  const lineas = [
    `REPORTE DE COMPRAS · ${fecha}`,
    '─'.repeat(40),
    ...reporteItems.map((item, i) => {
      const nombre = item.nombre !== 'Sin datos disponibles' ? item.nombre : '(sin nombre)';
      const precio = item.precio !== null ? '$' + item.precio.toLocaleString('es-CL') : 'S/P';
      return `${i+1}. [${item.codigo}] ${nombre} — ${precio}`;
    }),
    '─'.repeat(40),
    `TOTAL: $${reporteItems.reduce((s,i)=>s+(i.precio||0),0).toLocaleString('es-CL')}`,
  ];

  const texto = lineas.join('\n');

  // Compartir si está disponible
  if (navigator.share) {
    navigator.share({ title: 'Reporte de Compras', text: texto })
      .then(() => toast('✓ Compartido', 'green'))
      .catch(() => copiarPortapapeles(texto));
  } else {
    copiarPortapapeles(texto);
  }
}

function copiarPortapapeles(texto) {
  navigator.clipboard.writeText(texto)
    .then(() => toast('✓ Copiado al portapapeles', 'green'))
    .catch(() => toast('Error al copiar', 'red'));
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let _tt;
function toast(msg, tipo='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show ' + tipo;
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  renderReporte();
});
</script>
