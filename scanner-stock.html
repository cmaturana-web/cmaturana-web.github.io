<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GESTOR DE COMPRAS - v58.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #cbd5e1;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh; margin: 0; padding: 0;
            font-family: system-ui, -apple-system, sans-serif; overflow: hidden;
        }
        .app-frame {
            width: 100%; max-width: 410px; height: 100%; max-height: 96dvh;
            background-color: #ffffff; border: 4px solid #2563eb;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.4);
            border-radius: 2.5rem; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        @media (max-width: 480px) {
            .app-frame { max-height: 100dvh; border-radius: 0; border: none; }
        }
        .screen {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            background-color: #ffffff; padding: 1.2rem; overflow: hidden;
        }
        .fade-in { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .check-item div { padding: 0.65rem; border-width: 2px; border-radius: 1.2rem; transition: all 0.2s; border-color: #f1f5f9; background-color: #fff; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .check-red input:checked + div { border-color: #ef4444; background-color: #fef2f2; }
        .check-red input:checked + div i { color: #dc2626; }
        .check-green input:checked + div { border-color: #22c55e; background-color: #f0fdf4; }
        .check-green input:checked + div i { color: #16a34a; }
        .minstk-active { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
        .minstk-active span { color: #16a34a !important; }
        #reader { width: 100% !important; border-radius: 1rem; overflow: hidden; }
        .bg-descontinuado { background-color: #dc2626 !important; }
        .badge-desc { display:inline-block; background:#dc2626; color:#fff; font-size:8px; font-weight:900; padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:0.05em; margin-top:3px; }
        #modalGestion, #modalAdmin {
            position: absolute; inset: 0; z-index: 9999;
            background-color: #020617; display: none;
            flex-direction: column; padding: 1.5rem; color: white; overflow-y: auto;
        }
        .logo-mt {
            width: 80px; height: 80px; background-color: #2563eb; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-style: italic; font-size: 2.2rem;
            border-radius: 1.8rem; margin: 0 auto 1rem; box-shadow: 0 10px 25px rgba(37,99,235,0.3);
        }
    </style>
</head>
<body>
<div class="app-frame">

    <!-- PANTALLA LOGIN -->
    <div id="introScreen" class="screen z-[500] items-center justify-center text-center hidden px-8">
        <div class="logo-mt">MT</div>
        <h2 class="text-3xl font-black text-slate-800 tracking-tighter uppercase leading-none">GESTOR DE <br><span class="text-blue-600">COMPRAS</span></h2>
        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-2">By Carlos Maturana</p>
        <div class="mt-8 w-full space-y-3">
            <select id="auditorSelect" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-slate-700 uppercase appearance-none text-center">
                <option value="" disabled selected>SELECCIONAR USUARIO</option>
            </select>
            <input id="passwordInput" type="password" placeholder="CONTRASEÑA" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-center text-slate-700 tracking-widest">
            <button onclick="loginSistema()" class="w-full mt-2 bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 uppercase text-xs italic tracking-widest transition-all">
                Entrar al Sistema
            </button>
        </div>
    </div>

    <!-- PANTALLA HOME -->
    <div id="homeScreen" class="screen hidden fade-in">
        <div class="flex justify-between items-center mb-5">
            <div class="text-left text-slate-800">
                <h1 class="text-xl font-black text-blue-900 italic uppercase leading-none">GESTOR DE <span class="text-blue-500 font-bold">COMPRAS</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <p id="auditorDisplay" class="text-[8px] font-black text-slate-400 uppercase truncate max-w-[120px]">---</p>
                    <button onclick="cerrarSesion()" class="text-red-500 text-[8px] font-bold active:scale-90">[SALIR]</button>
                </div>
            </div>
            <button onclick="abrirModalGestion()" class="relative bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                <i class="fas fa-clipboard-list text-lg"></i>
                <span id="badgeGestion" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white hidden">0</span>
            </button>
        </div>
        <div class="bg-white p-1 rounded-[2rem] shadow-sm flex items-center mb-5 border border-slate-200">
            <input id="codigoInput" type="number" inputmode="numeric" placeholder="ESCANEAR PRODUCTO..." class="flex-grow p-3 text-base font-bold bg-transparent outline-none w-full text-slate-700" onkeypress="if(event.key==='Enter') buscarStock()">
            <button onclick="abrirEscanner()" class="bg-slate-50 text-slate-400 w-10 h-10 rounded-xl flex items-center justify-center mr-1"><i class="fas fa-camera"></i></button>
            <button onclick="buscarStock()" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md active:scale-90"><i class="fas fa-search text-xs"></i></button>
        </div>
        <div id="scannerWrapper" class="hidden mb-4 relative">
            <div class="bg-black rounded-2xl overflow-hidden border-4 border-blue-600"><div id="reader"></div></div>
            <button onclick="cerrarEscanner()" class="absolute top-2 right-2 bg-red-600 text-white w-8 h-8 rounded-full z-50 flex items-center justify-center shadow-lg"><i class="fas fa-times text-xs"></i></button>
        </div>
        <div class="flex-grow overflow-y-auto pr-1">
            <div class="flex justify-between items-center mb-2 px-1">
                <h3 class="text-slate-400 text-[9px] font-black uppercase italic tracking-widest">HISTORIAL</h3>
                <button onclick="limpiarHistorial()" class="text-red-400 text-[9px] font-black uppercase">Borrar</button>
            </div>
            <div id="listaHistorial" class="space-y-2 pb-5"></div>
            <p class="text-[8px] text-center text-slate-300 font-bold uppercase mt-4">By Carlos Maturana</p>
        </div>
    </div>

    <!-- PANTALLA RESULTADO -->
    <div id="resultScreen" class="screen !p-0 hidden fade-in text-center">
        <div id="resBanner" class="bg-blue-600 p-4 text-white text-center font-black italic text-[13px] tracking-[0.2em] uppercase">
            <span id="resCodigoLabel">CÓDIGO: ---</span>
        </div>
        <div class="p-5 flex-grow flex flex-col justify-start overflow-hidden text-center">
            <h2 id="resNombre" class="text-[1.1rem] font-black text-slate-800 text-center leading-tight uppercase mb-4 px-2">PRODUCTO</h2>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 text-center">
                    <span class="text-[8px] font-black text-slate-400 uppercase block mb-1">PVP</span>
                    <p id="resPrecio" class="text-xl font-black text-slate-800">$0</p>
                </div>
                <div id="stockBox" class="p-4 rounded-[1.5rem] border text-center shadow-sm flex flex-col justify-center">
                    <span class="text-[8px] font-black uppercase block mb-1">STOCK</span>
                    <p id="resStock" class="text-xl font-black">0</p>
                </div>
            </div>
            <div class="bg-slate-50/80 p-4 rounded-[2.2rem] border border-slate-100 space-y-3 flex-grow max-h-fit">
                <div id="checklistArea" class="grid grid-cols-2 gap-2">
                    <!-- MIN. STK — verde, solo numeros, va ANTES de PRECIO -->
                    <label class="check-item check-green cursor-pointer" id="minStkLabel" onclick="toggleMinStk(); return false;">
                        <div id="minStkDiv" class="bg-white flex flex-col items-center gap-0.5 w-full">
                            <i id="minStkIcon" class="fas fa-cubes text-slate-300"></i>
                            <span class="uppercase text-[8px] font-black">MIN. STK</span>
                            <input id="inputMinStk" type="number" inputmode="numeric" min="0"
                                placeholder="0"
                                onclick="event.stopPropagation()"
                                oninput="onMinStkInput(this)"
                                class="hidden w-full text-center font-black text-[14px] text-green-700 bg-transparent outline-none border-b-2 border-green-400 mt-1 py-0" style="max-width:56px">
                        </div>
                    </label>
                    <label class="check-item check-red cursor-pointer"><input type="checkbox" data-tarea="PRECIO" class="hidden"><div class="bg-white"><i class="fas fa-tag text-slate-300"></i><span class="uppercase text-[8px] font-black">PRECIO</span></div></label>
                    <label class="check-item check-red cursor-pointer"><input type="checkbox" data-tarea="REPOSICIÓN" class="hidden"><div class="bg-white"><i class="fas fa-boxes text-slate-300"></i><span class="uppercase text-[8px] font-black">REPOSICIÓN</span></div></label>
                    <label class="check-item check-red cursor-pointer"><input type="checkbox" data-tarea="LIMPIEZA" class="hidden"><div class="bg-white"><i class="fas fa-broom text-slate-300"></i><span class="uppercase text-[8px] font-black">LIMPIEZA</span></div></label>
                    <label class="check-item check-red cursor-pointer"><input type="checkbox" data-tarea="REVISAR EXISTENCIA" class="hidden"><div class="bg-white"><i class="fas fa-clipboard-check text-slate-300"></i><span class="uppercase text-[8px] font-black leading-none">REVISAR EXISTENCIA</span></div></label>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <label class="check-item check-green cursor-pointer">
                        <input type="checkbox" id="checkUbi" class="hidden" onchange="toggleUbi()">
                        <div class="bg-white text-center flex flex-col items-center shadow-sm"><i class="fas fa-map-marker-alt text-slate-300"></i><span class="uppercase font-black text-[8px]">UBICACIÓN</span></div>
                    </label>
                    <div class="relative bg-white border-2 border-dashed border-slate-200 rounded-[1.2rem] flex flex-col items-center justify-center p-2 cursor-pointer active:scale-95" id="btnFotoUI">
                        <i class="fas fa-camera text-slate-400"></i>
                        <span class="text-[8px] font-black text-slate-400 uppercase text-center">FOTO PDF</span>
                        <input type="file" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full" onchange="procesarFotoLocal(this)">
                    </div>
                </div>
                <input id="inputUbi" type="text" placeholder="¿Dónde está?" class="hidden w-full p-4 bg-white rounded-2xl border-2 border-blue-100 text-sm font-bold text-blue-900 outline-none fade-in">
                <div id="fotoStatus" class="hidden text-center"><p class="text-[9px] text-green-600 font-black uppercase"><i class="fas fa-check-circle"></i> Imagen Guardada</p></div>
            </div>
            <div class="flex gap-3 mt-auto mb-2 text-center">
                <button onclick="irAHome()" class="w-[35%] bg-slate-200 text-slate-600 font-black py-5 rounded-[1.5rem] uppercase text-[10px] active:scale-95">CERRAR</button>
                <button onclick="guardarYGestionar()" class="flex-grow bg-blue-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl uppercase text-[10px] italic flex items-center justify-center gap-2 active:scale-95">
                    <i class="fas fa-save"></i> GUARDAR ALERTA
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL ALERTAS/REPORTE -->
    <div id="modalGestion">
        <div class="flex justify-between items-center mb-6 w-full">
            <h2 class="text-xl font-black italic uppercase tracking-tighter">LISTADO ALERTAS</h2>
            <button onclick="cerrarModalGestion()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><i class="fas fa-times"></i></button>
        </div>
        <div id="listaReporte" class="flex-grow overflow-y-auto space-y-3 pb-4"></div>
        <div class="flex flex-col gap-3 mt-4">
            <div class="flex gap-2">
                <button id="btnTipoAuditoria" onclick="setTipoReporte('auditoria')" class="flex-1 py-3 rounded-2xl text-[9px] font-black uppercase border-2 border-blue-500 bg-blue-600 text-white transition-all active:scale-95">AUDITORÍA MAITENCILLO</button>
                <button id="btnTipoCaminata" onclick="setTipoReporte('caminata')" class="flex-1 py-3 rounded-2xl text-[9px] font-black uppercase border-2 border-white/20 bg-white/10 text-white/50 transition-all active:scale-95">CAMINATA DE COMPRAS</button>
            </div>
            <button onclick="generarPDF()" class="w-full bg-slate-800 text-white font-black py-4 rounded-xl text-[10px] italic flex items-center justify-center gap-2 active:scale-95"><i class="fas fa-file-pdf text-red-400"></i> GENERAR REPORTE PDF</button>
            <div class="flex gap-3 justify-center">
                <button onclick="compartirReporte()" class="flex-grow bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase text-[10px] italic">WhatsApp</button>
                <button onclick="vaciarReporte()" class="bg-red-500/20 text-red-400 border border-red-500/20 p-5 rounded-2xl active:scale-90"><i class="fas fa-trash-alt"></i></button>
            </div>
        </div>
    </div>

    <!-- MODAL ADMIN -->
    <div id="modalAdmin">
        <div class="flex justify-between items-center mb-5">
            <div>
                <h2 class="text-xl font-black italic uppercase tracking-tighter">PANEL ADMIN</h2>
                <p class="text-white/40 text-[8px] font-bold uppercase tracking-widest">Gestión de usuarios</p>
            </div>
            <button onclick="cerrarPanelAdmin()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><i class="fas fa-times"></i></button>
        </div>
        <div class="bg-white/5 rounded-2xl p-4 mb-5 border border-white/10">
            <p class="text-white/50 text-[9px] font-black uppercase tracking-widest mb-3">AGREGAR NUEVO USUARIO</p>
            <input id="adminNombre" type="text" placeholder="NOMBRE COMPLETO" class="w-full p-3 bg-white/10 rounded-xl border border-white/10 text-white font-bold text-[11px] outline-none mb-2 uppercase placeholder:text-white/30">
            <input id="adminClave" type="text" placeholder="CONTRASEÑA" class="w-full p-3 bg-white/10 rounded-xl border border-white/10 text-white font-bold text-[11px] outline-none mb-3 tracking-widest placeholder:text-white/30">
            <button onclick="agregarUsuario()" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl text-[10px] uppercase italic active:scale-95 shadow-lg">+ AGREGAR USUARIO</button>
        </div>
        <p class="text-white/50 text-[9px] font-black uppercase tracking-widest mb-3">USUARIOS REGISTRADOS</p>
        <div id="adminUserList" class="flex-grow overflow-y-auto pb-10"></div>
    </div>

    <!-- LOADER -->
    <div id="loader" class="screen z-[10000] hidden items-center justify-center bg-white/95 text-slate-800 text-center">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent mb-3"></div>
        <p class="text-blue-900 font-black text-[9px] uppercase tracking-widest italic">Procesando...</p>
    </div>

</div>

<script>
    const ADMIN_CLAVE = "219610";
    const USUARIOS_DEFAULT = [
        { nombre: "CARLOS MATURANA", clave: "CM1" },
        { nombre: "NURY NEGRETE",    clave: "NN2" },
        { nombre: "RAQUEL CONTRERAS",clave: "RC3" },
        { nombre: "FAUCIEL ALVAREZ", clave: "FA4" },
        { nombre: "CARLOS OYANEDEL",clave: "CO5" },
        { nombre: "BRAYAN RODRIGUEZ",clave: "BR6" },
        { nombre: "RODRIGO OYANEDEL",clave: "RO7" },
    ];
    let USUARIOS_SISTEMA = JSON.parse(localStorage.getItem('ultron_usuarios') || 'null') || [...USUARIOS_DEFAULT];

    const API_URL = "https://round-sound-c782.cmaturana.workers.dev/?codigo=";
    let html5QrCode, currentProduct = null, currentBase64 = "";
    let historial  = JSON.parse(localStorage.getItem('ultron_history')    || '[]');
    let gestionados= JSON.parse(localStorage.getItem('ultron_gestionados')|| '[]');
    let auditorName= localStorage.getItem('ultron_auditor_name') || "";
    let tipoReporte = 'auditoria';

    window.onload = () => {
        cargarSelectorUsuarios();
        if (!auditorName) { mostrarPantalla('introScreen'); }
        else { actualizarAuditorDisplay(); mostrarPantalla('homeScreen'); }
        actualizarHistorial(); actualizarBadge();
    };

    // ── USUARIOS ──────────────────────────────────────────────
    function cargarSelectorUsuarios() {
        const select = document.getElementById('auditorSelect');
        select.innerHTML = '<option value="" disabled selected>SELECCIONAR USUARIO</option>';
        const adminOpt = document.createElement('option');
        adminOpt.value = 'ADMINISTRADOR'; adminOpt.innerText = 'ADMINISTRADOR';
        select.appendChild(adminOpt);
        USUARIOS_SISTEMA.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.nombre; opt.innerText = u.nombre.toUpperCase();
            select.appendChild(opt);
        });
    }
    function guardarUsuarios() {
        localStorage.setItem('ultron_usuarios', JSON.stringify(USUARIOS_SISTEMA));
        cargarSelectorUsuarios();
        renderTablaUsuarios();
    }

    // ── LOGIN ─────────────────────────────────────────────────
    function loginSistema() {
        const user = document.getElementById('auditorSelect').value;
        const pass = document.getElementById('passwordInput').value.trim();
        if (user === 'ADMINISTRADOR' && pass === ADMIN_CLAVE) { abrirPanelAdmin(); return; }
        const found = USUARIOS_SISTEMA.find(u => u.nombre === user && u.clave === pass);
        if (found) {
            auditorName = user;
            localStorage.setItem('ultron_auditor_name', auditorName);
            actualizarAuditorDisplay();
            mostrarPantalla('homeScreen');
        } else {
            alert("Usuario o Contraseña incorrectos");
            document.getElementById('passwordInput').value = "";
        }
    }

    // ── ADMIN ─────────────────────────────────────────────────
    function abrirPanelAdmin() {
        document.getElementById('modalAdmin').style.display = 'flex';
        renderTablaUsuarios();
    }
    function cerrarPanelAdmin() {
        document.getElementById('modalAdmin').style.display = 'none';
    }
    function renderTablaUsuarios() {
        const lista = document.getElementById('adminUserList');
        lista.innerHTML = USUARIOS_SISTEMA.map((u, i) => `
            <div class="flex items-center gap-2 bg-white/10 rounded-2xl p-3 mb-2 border border-white/10">
                <div class="flex-grow">
                    <p class="font-black text-white text-[11px] uppercase">${u.nombre}</p>
                    <p class="text-white/40 text-[9px] font-bold tracking-widest">CLAVE: ${u.clave}</p>
                </div>
                <button onclick="editarUsuario(${i})" class="bg-blue-600 text-white text-[9px] font-black px-3 py-2 rounded-xl active:scale-90"><i class="fas fa-pen"></i></button>
                <button onclick="eliminarUsuario(${i})" class="bg-red-600 text-white text-[9px] font-black px-3 py-2 rounded-xl active:scale-90"><i class="fas fa-trash"></i></button>
            </div>`).join('');
    }
    function agregarUsuario() {
        const nombre = document.getElementById('adminNombre').value.trim().toUpperCase();
        const clave  = document.getElementById('adminClave').value.trim();
        if (!nombre || !clave) return alert("Completa nombre y clave");
        if (USUARIOS_SISTEMA.find(u => u.nombre === nombre)) return alert("Usuario ya existe");
        USUARIOS_SISTEMA.push({ nombre, clave });
        guardarUsuarios();
        document.getElementById('adminNombre').value = '';
        document.getElementById('adminClave').value  = '';
    }
    function eliminarUsuario(i) {
        if (!confirm("¿Eliminar usuario " + USUARIOS_SISTEMA[i].nombre + "?")) return;
        USUARIOS_SISTEMA.splice(i, 1);
        guardarUsuarios();
    }
    function editarUsuario(i) {
        const u = USUARIOS_SISTEMA[i];
        const nuevoNombre = prompt("Nuevo nombre (vacío = mantener):", u.nombre);
        if (nuevoNombre !== null && nuevoNombre.trim()) USUARIOS_SISTEMA[i].nombre = nuevoNombre.trim().toUpperCase();
        const nuevaClave = prompt("Nueva clave (vacío = mantener):", u.clave);
        if (nuevaClave !== null && nuevaClave.trim()) USUARIOS_SISTEMA[i].clave = nuevaClave.trim();
        guardarUsuarios();
    }

    // ── NAVEGACIÓN ────────────────────────────────────────────
    function mostrarPantalla(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function cerrarSesion() {
        if (confirm("¿Cerrar sesión?")) { localStorage.removeItem('ultron_auditor_name'); location.reload(); }
    }
    function actualizarAuditorDisplay() {
        document.getElementById('auditorDisplay').innerText = auditorName.toUpperCase();
    }
    function irAHome() {
        document.getElementById('codigoInput').value = '';
        document.querySelectorAll('#checklistArea input').forEach(c => c.checked = false);
        document.getElementById('inputUbi').classList.add('hidden');
        document.getElementById('inputUbi').value = '';
        // Limpiar MIN. STK
        resetMinStk();
        mostrarPantalla('homeScreen');
    }
    function toggleUbi() {
        const i = document.getElementById('inputUbi');
        if (document.getElementById('checkUbi').checked) { i.classList.remove('hidden'); i.focus(); }
        else { i.classList.add('hidden'); i.value = ""; }
    }

    // ── FOTO ──────────────────────────────────────────────────
    async function procesarFotoLocal(input) {
        if (!input.files[0]) return;
        const file = input.files[0];
        const reader = new FileReader();
        document.getElementById('loader').classList.remove('hidden');
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const max_size = 1200; let w = img.width, h = img.height;
                if (w > h) { if (w > max_size) { h *= max_size/w; w = max_size; } }
                else       { if (h > max_size) { w *= max_size/h; h = max_size; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                currentBase64 = canvas.toDataURL('image/jpeg', 0.8);
                document.getElementById('fotoStatus').classList.remove('hidden');
                document.getElementById('btnFotoUI').style.borderColor = "#22c55e";
                document.getElementById('btnFotoUI').innerHTML = '<i class="fas fa-check-circle text-green-600"></i><span class="text-[8px] font-black text-green-700 uppercase">FOTO OK</span>';
                document.getElementById('loader').classList.add('hidden');
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    // ── BÚSQUEDA ──────────────────────────────────────────────
    async function buscarStock(codigoForzado = null) {
        const input = document.getElementById('codigoInput');
        const codigo = codigoForzado || input.value.trim();
        if (!codigo) return;
        input.blur();
        currentBase64 = "";
        document.getElementById('fotoStatus').classList.add('hidden');
        document.getElementById('btnFotoUI').style.borderColor = "";
        document.getElementById('btnFotoUI').innerHTML = '<i class="fas fa-camera text-slate-400"></i><span class="text-[8px] font-black text-slate-400 uppercase text-center">FOTO PDF</span><input type="file" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full" onchange="procesarFotoLocal(this)">';
        mostrarPantalla('loader');
        try {
            const response = await fetch(API_URL + codigo);
            const data = await response.json();
            if (data.error || !data.nombre || data.nombre === "No detectado") throw new Error();
            currentProduct = data;
            guardarEnHistorial(data);
            const banner   = document.getElementById('resBanner');
            const resLabel = document.getElementById('resCodigoLabel');
            const resNombre= document.getElementById('resNombre');
            const sBox     = document.getElementById('stockBox');
            if (data.descontinuado === true) {
                banner.classList.add('bg-descontinuado');
                resLabel.innerHTML = `<i class="fas fa-ban mr-2"></i> DESCONTINUADO: ${data.codigo}`;
                resNombre.classList.add('text-red-600');
                sBox.className = "p-3 rounded-[1.5rem] border-2 border-red-200 bg-red-50 text-red-600 text-center font-black shadow-sm";
            } else {
                banner.classList.remove('bg-descontinuado');
                resLabel.innerText = "CÓDIGO: " + data.codigo;
                resNombre.classList.remove('text-red-600');
                if (parseInt(data.stock) <= 0) sBox.className = "p-3 rounded-[1.5rem] border-2 border-red-100 bg-red-50 text-red-600 text-center font-black";
                else sBox.className = "p-3 rounded-[1.5rem] border-2 border-green-100 bg-green-50 text-green-600 text-center font-black";
            }
            resNombre.innerText = data.nombre;
            document.getElementById('resPrecio').innerText = data.precio ? "$" + data.precio.toLocaleString('es-CL') : "---";
            document.getElementById('resStock').innerText   = data.stock ?? 0;
            mostrarPantalla('resultScreen');
        } catch(e) { alert("Producto no encontrado"); mostrarPantalla('homeScreen'); }
    }

    // ── GUARDAR ALERTA ────────────────────────────────────────
    function guardarYGestionar() {
        const tareas    = Array.from(document.querySelectorAll('#checklistArea input[data-tarea]:checked')).map(c => c.getAttribute('data-tarea'));
        const minStkVal = document.getElementById('inputMinStk').value.trim();
        const ubiManual = document.getElementById('inputUbi').value.trim();
        if (tareas.length > 0 || ubiManual !== "" || currentBase64 !== "" || minStkVal !== "") {
            gestionados.push({ ...currentProduct, tareas, minStk: minStkVal, ubicacion: ubiManual, fotoBase64: currentBase64, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
            localStorage.setItem('ultron_gestionados', JSON.stringify(gestionados));
            actualizarBadge();
        }
        irAHome();
    }

    // ── TIPO REPORTE ──────────────────────────────────────────
    function setTipoReporte(tipo) {
        tipoReporte = tipo;
        const btnA = document.getElementById('btnTipoAuditoria');
        const btnC = document.getElementById('btnTipoCaminata');
        if (tipo === 'auditoria') {
            btnA.className = 'flex-1 py-3 rounded-2xl text-[9px] font-black uppercase border-2 border-blue-500 bg-blue-600 text-white transition-all active:scale-95';
            btnC.className = 'flex-1 py-3 rounded-2xl text-[9px] font-black uppercase border-2 border-white/20 bg-white/10 text-white/50 transition-all active:scale-95';
        } else {
            btnC.className = 'flex-1 py-3 rounded-2xl text-[9px] font-black uppercase border-2 border-blue-500 bg-blue-600 text-white transition-all active:scale-95';
            btnA.className = 'flex-1 py-3 rounded-2xl text-[9px] font-black uppercase border-2 border-white/20 bg-white/10 text-white/50 transition-all active:scale-95';
        }
    }

    function generarPDF() {
        if (gestionados.length === 0) return alert("Sin datos");
        const { jsPDF } = window.jspdf;
        const doc  = new jsPDF('l', 'mm', 'a4');
        const azul = [0, 31, 63];
        const rojo = [220, 38, 38];
        const tituloDoc = tipoReporte === 'caminata'
            ? "PLANILLA CAMINATA DE COMPRAS"
            : "PLANILLA AUDITORIA MAITENCILLO";

        const pageW = doc.internal.pageSize.getWidth();   // 297mm
        const pageH = doc.internal.pageSize.getHeight();  // 210mm

        // ─────────────────────────────────────────
        // HELPER: dibuja encabezado azul en pagina
        // ─────────────────────────────────────────
        const mkHeader = (d, texto) => {
            d.setFillColor(...azul);
            d.rect(10, 10, pageW - 20, 10, 'F');
            d.setTextColor(255, 255, 255);
            d.setFontSize(13);
            d.setFont(undefined, 'bold');
            d.text(texto, pageW / 2, 17, { align: 'center' });
        };

        // ─────────────────────────────────────────
        // PAGINAS DE TABLA (1, 2, 3... segun necesidad)
        // ─────────────────────────────────────────
        mkHeader(doc, tituloDoc);

        doc.autoTable({
            startY: 22, theme: 'grid',
            body: [
                [{content:'Tienda',      styles:{fillColor:azul,textColor:255}}, 'MAITENCILLO'],
                [{content:'Responsable', styles:{fillColor:azul,textColor:255}}, auditorName.toUpperCase()],
                [{content:'Fecha',       styles:{fillColor:azul,textColor:255}}, new Date().toLocaleDateString()]
            ],
            margin: { left: 10, right: 10 }
        });

        const body = gestionados.map((g, i) => [
            i + 1, g.codigo,
            g.descontinuado ? g.nombre + ' [DESCONTINUADO]' : g.nombre,
            g.minStk && g.minStk !== "" ? g.minStk : "",
            g.tareas.includes("PRECIO")            ? "X"       : "",
            g.tareas.includes("REPOSICIÓN")         ? "X"       : "",
            g.tareas.includes("LIMPIEZA")           ? "X"       : "",
            g.tareas.includes("REVISAR EXISTENCIA") ? "REVISAR" : "",
            g.ubicacion || ""
        ]);

        doc.autoTable({
            startY: doc.lastAutoTable.finalY + 3,
            head: [["N","SKU","DESCRIPCION","MIN.STK","PRECIO","REP","LIMP","EXIST","UBICACION"]],
            body: body,
            theme: 'grid',
            headStyles: { fillColor: azul, fontSize: 8 },
            bodyStyles: { fontSize: 7 },
            margin: { left: 10, right: 10 },
            // Encabezado en cada pagina extra de la tabla
            didDrawPage: function(data) {
                if (data.pageNumber > 1) {
                    mkHeader(doc, tituloDoc + " (cont.)");
                }
            },
            didParseCell: function(data) {
                if (data.section !== 'body') return;
                if (data.cell.raw === "X") {
                    data.cell.styles.textColor  = rojo;
                    data.cell.styles.fontStyle  = 'bold';
                    data.cell.styles.halign     = 'center';
                    data.cell.styles.fontSize   = 12;
                    data.cell.styles.fillColor  = [255, 235, 235];
                }
                // MIN. STK — verde si tiene valor
                if (data.column.index === 3 && data.cell.raw !== "" && data.cell.raw !== "MIN.STK") {
                    data.cell.styles.textColor  = [22, 163, 74];
                    data.cell.styles.fontStyle  = 'bold';
                    data.cell.styles.halign     = 'center';
                    data.cell.styles.fontSize   = 10;
                    data.cell.styles.fillColor  = [240, 253, 244];
                }
                if (data.cell.raw === "REVISAR") {
                    data.cell.styles.textColor  = [146, 64, 14];
                    data.cell.styles.fontStyle  = 'bold';
                    data.cell.styles.halign     = 'center';
                    data.cell.styles.fontSize   = 7;
                    data.cell.styles.fillColor  = [255, 251, 235];
                }
                if (typeof data.cell.raw === 'string' && data.cell.raw.includes('[DESCONTINUADO]')) {
                    data.cell.styles.textColor = rojo;
                    data.cell.styles.fontStyle = 'bold';
                }
            }
        });

        // ─────────────────────────────────────────
        // PAGINAS DE FOTOS: siempre despues de la tabla
        // 4 fotos por pagina en grilla 2x2
        // Cada foto ocupa un cuadrante fijo — NO se estira
        // ─────────────────────────────────────────
        const conFotos = gestionados.filter(g => g.fotoBase64);

        if (conFotos.length > 0) {
            // Dimensiones de cada cuadrante (pagina landscape 297x210mm)
            // Margenes: 10mm. Area util: 277 x 190mm
            // 2 columnas x 2 filas = 4 cuadrantes
            const margen  = 10;
            const areaW   = pageW - margen * 2;   // 277mm
            const areaH   = pageH - margen * 2;   // 190mm
            const celdaW  = areaW / 2;             // 138.5mm por columna
            const celdaH  = areaH / 2;             // 95mm por fila
            const padFoto = 4;                     // espacio interno en cada celda
            const labelH  = 10;                    // altura reservada para texto
            // Foto ocupa la celda menos el padding y el label
            const fotoMaxW = celdaW - padFoto * 2;         // ~130mm
            const fotoMaxH = celdaH - padFoto * 2 - labelH; // ~77mm

            // Posiciones de los 4 cuadrantes (col, fila)
            const cuadrantes = [
                { col: 0, fila: 0 }, // superior izquierdo
                { col: 1, fila: 0 }, // superior derecho
                { col: 0, fila: 1 }, // inferior izquierdo
                { col: 1, fila: 1 }, // inferior derecho
            ];

            const mkHeaderFotos = (d) => mkHeader(d, "ANEXO: RESPALDO FOTOGRAFICO");

            // Dividir fotos en grupos de 4
            for (let i = 0; i < conFotos.length; i += 4) {
                doc.addPage();
                mkHeaderFotos(doc);

                const grupo = conFotos.slice(i, i + 4);

                grupo.forEach((item, idx) => {
                    const { col, fila } = cuadrantes[idx];
                    const xBase = margen + col * celdaW;
                    const yBase = margen + fila * celdaH + 12; // +12 por header azul

                    // Numero y SKU — fuente grande
                    const numP = gestionados.indexOf(item) + 1;
                    doc.setTextColor(0, 31, 63);
                    doc.setFontSize(11);
                    doc.setFont(undefined, 'bold');
                    doc.text('N ' + numP + ' - SKU: ' + item.codigo, xBase + padFoto, yBase + 6);

                    // Nombre del producto
                    doc.setFontSize(9);
                    doc.setTextColor(60, 60, 60);
                    doc.setFont(undefined, 'normal');
                    const nm = item.nombre && item.nombre.length > 45
                        ? item.nombre.substring(0, 45) + '...'
                        : (item.nombre || '');
                    doc.text(nm, xBase + padFoto, yBase + 11);

                    // Calcular dimensiones reales de la foto manteniendo proporcion
                    let fW = fotoMaxW;
                    let fH = fotoMaxH;
                    try {
                        const props = doc.getImageProperties(item.fotoBase64);
                        const ratio = props.width / props.height;
                        if (ratio > fotoMaxW / fotoMaxH) {
                            // mas ancha que alta: limitar por ancho
                            fH = fW / ratio;
                        } else {
                            // mas alta que ancha: limitar por alto
                            fW = fH * ratio;
                        }
                    } catch(e) {}

                    // Centrar la foto en el cuadrante
                    const xFoto = xBase + padFoto + (fotoMaxW - fW) / 2;
                    const yFoto = yBase + labelH + padFoto;

                    try {
                        doc.addImage(item.fotoBase64, 'JPEG', xFoto, yFoto, fW, fH);
                    } catch(e) {}

                    // Borde del cuadrante (opcional, ayuda a ver los 4 espacios)
                    doc.setDrawColor(220, 220, 220);
                    doc.setLineWidth(0.3);
                    doc.rect(xBase + 1, yBase, celdaW - 2, celdaH - 2);
                });
            }
        }

        // ── Pie de página en todas las hojas ──
        const totalPages = doc.internal.getNumberOfPages();
        const pageW2 = doc.internal.pageSize.getWidth();
        const pageH2 = doc.internal.pageSize.getHeight();
        for (let p = 1; p <= totalPages; p++) {
            doc.setPage(p);
            doc.setFillColor(...azul);
            doc.rect(0, pageH2 - 10, pageW2, 10, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(8);
            doc.setFont(undefined, 'normal');
            doc.text(`Responsable: ${auditorName.toUpperCase()}`, 15, pageH2 - 3);
            doc.text(`Página ${p} de ${totalPages}`, pageW2 - 15, pageH2 - 3, { align: 'right' });
            const labelCentro = tipoReporte === 'caminata' ? 'Caminata de Compras' : 'Auditoría Maitencillo';
            doc.text(`${labelCentro} - ${new Date().toLocaleDateString()}`, pageW2 / 2, pageH2 - 3, { align: 'center' });
        }

        const fecha = new Date().toLocaleDateString('es-CL').replace(/\//g, '-');
        const nombreArchivo = tipoReporte === 'caminata' ? `Caminata de Compras ${fecha}` : `Auditoria Maitencillo ${fecha}`;
        doc.save(`${nombreArchivo}.pdf`);

        gestionados = [];
        localStorage.setItem('ultron_gestionados', '[]');
        actualizarBadge();
        cerrarModalGestion();
    }

    // ── HISTORIAL ─────────────────────────────────────────────
    function guardarEnHistorial(item) {
        historial = historial.filter(h => h.codigo !== item.codigo);
        historial.unshift({ ...item });
        historial = historial.slice(0, 10);
        localStorage.setItem('ultron_history', JSON.stringify(historial));
        actualizarHistorial();
    }
    function limpiarHistorial() {
        if (confirm("¿Borrar todo el historial?")) {
            historial = []; localStorage.setItem('ultron_history','[]'); actualizarHistorial();
        }
    }
    function borrarItemHistorial(event, codigo) {
        event.stopPropagation();
        if (confirm("¿Borrar item?")) {
            historial = historial.filter(h => h.codigo !== codigo);
            localStorage.setItem('ultron_history', JSON.stringify(historial));
            actualizarHistorial();
        }
    }
    function actualizarHistorial() {
        const lista = document.getElementById('listaHistorial');
        if (historial.length === 0) {
            lista.innerHTML = '<p class="text-slate-300 italic text-[11px] text-center py-6 font-black uppercase">Sin registros</p>';
            return;
        }
        lista.innerHTML = historial.map(h => `
            <div class="flex items-center gap-2 mb-2">
                <div onclick="buscarStock('${h.codigo}')" class="flex-grow ${h.descontinuado ? 'bg-red-50 border-red-200' : 'bg-white border-slate-100'} p-4 rounded-[1.5rem] flex justify-between items-center shadow-sm active:scale-95 transition-all border text-left">
                    <div class="w-2/3">
                        <p class="text-[8px] font-black text-slate-400 mb-0.5 uppercase italic">#${h.codigo}</p>
                        <p class="text-[10px] font-black uppercase leading-tight">${h.nombre}</p>
                        ${h.descontinuado ? '<span class="badge-desc"><i class="fas fa-ban mr-1"></i>DESCONTINUADO</span>' : ''}
                        <span class="text-[9px] font-black ${h.descontinuado || parseInt(h.stock) <= 0 ? 'text-red-500' : 'text-slate-400'} uppercase block mt-0.5">STK: ${h.stock}</span>
                    </div>
                    <div class="${h.descontinuado ? 'text-red-600' : 'text-blue-600'} font-black text-sm">$${Number(h.precio).toLocaleString('es-CL')}</div>
                </div>
                <button onclick="borrarItemHistorial(event,'${h.codigo}')" class="bg-red-100 text-red-500 w-10 h-14 rounded-2xl flex items-center justify-center active:bg-red-500 active:text-white transition-all"><i class="fas fa-trash-alt text-xs"></i></button>
            </div>`).join('');
    }

    // ── REPORTE MODAL ─────────────────────────────────────────
    function actualizarBadge() {
        const b = document.getElementById('badgeGestion');
        b.innerText = gestionados.length;
        b.classList.toggle('hidden', gestionados.length === 0);
    }
    function abrirModalGestion() {
        document.getElementById('modalGestion').style.display = 'flex';
        renderListaReporte();
    }
    function renderListaReporte() {
        const lista = document.getElementById('listaReporte');
        lista.innerHTML = gestionados.map((g, i) => `
            <div class="flex items-start gap-2 mb-2">
                <div class="flex-grow ${g.descontinuado ? 'bg-red-500/10 border-red-500/40' : 'bg-white/10 border-white/10'} p-4 rounded-[1.5rem] border text-left relative overflow-hidden shadow-sm">
                    <div class="absolute top-0 right-0 bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-bl-xl">${i+1}</div>
                    <p class="font-black text-[11px] uppercase w-4/5 text-white">${g.nombre}</p>
                    ${g.descontinuado ? '<span class="badge-desc"><i class="fas fa-ban mr-1"></i>DESCONTINUADO</span>' : ''}
                    <p class="text-[9px] text-white/40 font-bold uppercase tracking-widest mt-1">#${g.codigo} | STK: ${g.stock}</p>
                    <div class="flex flex-wrap gap-2 mt-3">
                        ${g.tareas.map(t => `<span class="bg-red-600 text-white text-[8px] font-black px-3 py-1 rounded-full uppercase">${t}</span>`).join('')}${g.minStk ? `<span class="bg-green-600 text-white text-[8px] font-black px-3 py-1 rounded-full uppercase">MIN. STK: ${g.minStk}</span>` : ''}
                        ${g.fotoBase64 ? '<span class="bg-green-600 text-white text-[8px] font-black px-3 py-1 rounded-full uppercase">📸 RESPALDO FOTOGRÁFICO</span>' : ''}
                    </div>
                </div>
                <button onclick="eliminarAlerta(${i})" class="bg-red-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center active:scale-90 flex-shrink-0 mt-1 shadow-lg"><i class="fas fa-trash-alt text-xs"></i></button>
            </div>`).join('');
    }
    function eliminarAlerta(i) {
        gestionados.splice(i, 1);
        localStorage.setItem('ultron_gestionados', JSON.stringify(gestionados));
        actualizarBadge();
        renderListaReporte();
    }
    function cerrarModalGestion() { document.getElementById('modalGestion').style.display = 'none'; }
    function vaciarReporte() {
        if (confirm("¿Borrar todo?")) {
            gestionados = []; localStorage.setItem('ultron_gestionados','[]');
            actualizarBadge(); cerrarModalGestion();
        }
    }
    function compartirReporte() {
        const t = gestionados.map((g,i) => `${i+1}. ${g.descontinuado?'🚫 DESCONTINUADO: ':''}${g.nombre} (#${g.codigo})\n📦 STK: ${g.stock}\n🚨 ${g.tareas.join(' | ')}`).join('\n\n');
        navigator.clipboard.writeText(`GESTOR DE COMPRAS\nAuditor: ${auditorName.toUpperCase()}\n\n${t}`).then(() => {
            alert("Copiado ✓");
            gestionados = [];
            localStorage.setItem('ultron_gestionados', '[]');
            actualizarBadge();
            cerrarModalGestion();
        });
    }

    // ── MIN. STK ──────────────────────────────────────────────────
    function toggleMinStk() {
        var inp  = document.getElementById('inputMinStk');
        var lbl  = document.getElementById('minStkLabel');
        var icon = document.getElementById('minStkIcon');
        if (inp.classList.contains('hidden')) {
            inp.classList.remove('hidden');
            icon.className = 'fas fa-cubes text-green-500';
            lbl.style.borderColor = '#22c55e';
            lbl.style.backgroundColor = '#f0fdf4';
            setTimeout(function(){ inp.focus(); }, 80);
        } else {
            if (inp.value.trim() === '') {
                inp.classList.add('hidden');
                icon.className = 'fas fa-cubes text-slate-300';
                lbl.style.borderColor = '';
                lbl.style.backgroundColor = '';
            }
        }
    }
    function onMinStkInput(el) {
        el.value = el.value.replace(/[^0-9]/g, '');
        var lbl  = document.getElementById('minStkLabel');
        var icon = document.getElementById('minStkIcon');
        if (el.value !== '') {
            lbl.style.borderColor = '#22c55e';
            lbl.style.backgroundColor = '#f0fdf4';
            icon.className = 'fas fa-cubes text-green-500';
        }
    }
    function resetMinStk() {
        var inp  = document.getElementById('inputMinStk');
        var lbl  = document.getElementById('minStkLabel');
        var icon = document.getElementById('minStkIcon');
        inp.value = '';
        inp.classList.add('hidden');
        icon.className = 'fas fa-cubes text-slate-300';
        lbl.style.borderColor = '';
        lbl.style.backgroundColor = '';
    }

        // ── ESCÁNER ───────────────────────────────────────────────
    function abrirEscanner() {
        document.getElementById('scannerWrapper').classList.remove('hidden');
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode:"environment" }, { fps:20, qrbox:200 }, (text) => { cerrarEscanner(); buscarStock(text); });
    }
    function cerrarEscanner() {
        if (html5QrCode) { html5QrCode.stop().then(() => document.getElementById('scannerWrapper').classList.add('hidden')).catch(() => document.getElementById('scannerWrapper').classList.add('hidden')); }
        else document.getElementById('scannerWrapper').classList.add('hidden');
    }
</script>
