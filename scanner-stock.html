<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultron Auditor PRO - v50.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #cbd5e1; display: flex; justify-content: center; align-items: center; height: 100dvh; margin: 0; font-family: system-ui, sans-serif; overflow: hidden; }
        .app-frame { width: 100%; max-width: 410px; height: 95dvh; background-color: #fff; border: 4px solid #2563eb; shadow-xl; border-radius: 2.5rem; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        @media (max-width: 480px) { .app-frame { height: 100dvh; border-radius: 0; border: none; } }
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background-color: #fff; padding: 1rem; overflow: hidden; }
        .fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .check-item div { padding: 0.65rem; border-width: 2px; border-radius: 1.2rem; transition: all 0.2s; border-color: #f1f5f9; background-color: #fff; text-align: center; }
        .check-red input:checked + div { border-color: #ef4444; background-color: #fef2f2; }
        .check-red input:checked + div i { color: #dc2626; }
        .check-green input:checked + div { border-color: #22c55e; background-color: #f0fdf4; }
        .check-green input:checked + div i { color: #16a34a; }
        .bg-descontinuado { background-color: #dc2626 !important; }
        #modalGestion { position: absolute; inset: 0; z-index: 9999; background-color: #020617; display: none; flex-direction: column; padding: 1.5rem; color: white; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="app-frame">
        
        <!-- PANTALLA 1: LOGIN -->
        <div id="introScreen" class="screen z-[500] items-center justify-center text-center hidden px-8">
            <div class="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white text-4xl mb-6 shadow-xl italic font-black">U</div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tighter uppercase leading-none">ULTRON <br><span class="text-blue-600">AUDITOR</span></h2>
            <input id="auditorNameInput" type="text" placeholder="TU NOMBRE" class="w-full mt-10 p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none text-center font-bold uppercase focus:border-blue-500">
            <button onclick="registrarAuditor()" class="w-full mt-4 bg-blue-600 text-white font-black py-5 rounded-3xl shadow-lg active:scale-95 uppercase text-xs italic">Entrar</button>
        </div>

        <!-- PANTALLA 2: HOME -->
        <div id="homeScreen" class="screen hidden fade-in">
            <div class="flex justify-between items-center mb-4">
                <div class="text-left">
                    <h1 class="text-xl font-black text-blue-900 italic uppercase leading-none">ULTRON <span class="text-blue-500 font-bold">GESTIÓN</span></h1>
                    <div class="flex items-center gap-2 mt-1">
                        <p id="auditorDisplay" class="text-[8px] font-black text-slate-400 uppercase truncate max-w-[120px]">---</p>
                        <button onclick="cerrarSesion()" class="text-red-400 active:scale-75"><i class="fas fa-door-open text-[11px]"></i></button>
                    </div>
                </div>
                <button onclick="abrirModalGestion()" class="relative bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-clipboard-list text-lg"></i>
                    <span id="badgeGestion" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white hidden">0</span>
                </button>
            </div>

            <div class="bg-white p-1 rounded-[2rem] shadow-sm flex items-center mb-4 border border-slate-200">
                <input id="codigoInput" type="number" inputmode="numeric" placeholder="ESCANEAR..." class="flex-grow p-3 text-base font-bold bg-transparent outline-none w-full" onkeypress="if(event.key === 'Enter') buscarStock()">
                <button onclick="abrirEscanner()" class="bg-slate-50 text-slate-400 w-10 h-10 rounded-xl flex items-center justify-center mr-1 active:scale-90"><i class="fas fa-camera"></i></button>
                <button onclick="buscarStock()" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md active:scale-90"><i class="fas fa-search text-xs"></i></button>
            </div>

            <div id="scannerWrapper" class="hidden mb-4 relative">
                <div class="bg-black rounded-2xl overflow-hidden border-4 border-blue-600"><div id="reader"></div></div>
                <button onclick="cerrarEscanner()" class="absolute top-2 right-2 bg-red-600 text-white w-8 h-8 rounded-full z-50 flex items-center justify-center shadow-lg"><i class="fas fa-times text-xs"></i></button>
            </div>

            <div class="flex-grow overflow-y-auto">
                <h3 class="text-slate-400 text-[9px] font-black uppercase italic mb-2 px-1">HISTORIAL RECIENTE</h3>
                <div id="listaHistorial" class="space-y-2 pb-10"></div>
            </div>
        </div>

        <!-- PANTALLA 3: RESULTADO -->
        <div id="resultScreen" class="screen !p-0 hidden fade-in">
            <div id="resBanner" class="bg-blue-600 p-4 text-white text-center font-black italic text-[13px] tracking-[0.2em] uppercase shadow-md">
                <span id="resCodigoLabel">CÓDIGO: ---</span>
            </div>
            
            <div class="p-5 flex-grow flex flex-col justify-start overflow-hidden">
                <h2 id="resNombre" class="text-[1rem] font-black text-slate-800 text-center leading-tight uppercase mb-4 px-2">PRODUCTO</h2>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-50 p-4 rounded-[1.5rem] border text-center shadow-sm">
                        <span class="text-[8px] font-black text-slate-400 uppercase block mb-1">PVP</span>
                        <p id="resPrecio" class="text-xl font-black text-slate-800">$0</p>
                    </div>
                    <div id="stockBox" class="p-4 rounded-[1.5rem] border text-center shadow-sm flex flex-col justify-center">
                        <span id="stockLabel" class="text-[8px] font-black uppercase block mb-1">STOCK</span>
                        <p id="resStock" class="text-xl font-black">0</p>
                    </div>
                </div>

                <div class="bg-slate-50/80 p-4 rounded-[2.2rem] border border-slate-100 space-y-3 flex-grow max-h-fit">
                    <div id="checklistArea" class="grid grid-cols-2 gap-2">
                        <label class="check-item check-red cursor-pointer"><input type="checkbox" data-tarea="PRECIO" class="hidden"><div class="bg-white"><i class="fas fa-tag"></i><span class="uppercase text-[8px] font-black">PRECIO</span></div></label>
                        <label class="check-item check-red cursor-pointer"><input type="checkbox" data-tarea="REPOSICIÓN" class="hidden"><div class="bg-white"><i class="fas fa-boxes"></i><span class="uppercase text-[8px] font-black">REPOSICIÓN</span></div></label>
                        <label class="check-item check-red cursor-pointer"><input type="checkbox" data-tarea="LIMPIEZA" class="hidden"><div class="bg-white"><i class="fas fa-broom"></i><span class="uppercase text-[8px] font-black">LIMPIEZA</span></div></label>
                        <label class="check-item check-red cursor-pointer"><input type="checkbox" data-tarea="REVISAR EXISTENCIA" class="hidden"><div class="bg-white"><i class="fas fa-clipboard-check"></i><span class="uppercase text-[8px] font-black leading-none">REVISAR EXISTENCIA</span></div></label>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <label class="check-item check-green cursor-pointer">
                            <input type="checkbox" id="checkUbi" class="hidden" onchange="toggleUbi()">
                            <div class="bg-white text-center flex flex-col items-center shadow-sm"><i class="fas fa-map-marker-alt"></i><span class="uppercase font-black text-[8px]">UBICACIÓN</span></div>
                        </label>
                        <div class="relative bg-white border-2 border-dashed border-slate-200 rounded-[1.2rem] flex flex-col items-center justify-center p-2 cursor-pointer" id="btnFotoUI">
                            <i class="fas fa-camera text-slate-400"></i>
                            <span class="text-[8px] font-black text-slate-400 uppercase">RESPALDO</span>
                            <input type="file" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full" onchange="procesarYSubirFoto(this)">
                        </div>
                    </div>
                    <input id="inputUbi" type="text" placeholder="Escribir lugar..." class="hidden w-full p-4 bg-white rounded-2xl border-2 border-blue-100 text-sm font-bold text-blue-900 outline-none fade-in">
                    <div id="fotoStatus" class="hidden text-center"><p class="text-[9px] text-blue-600 font-black uppercase"><i class="fas fa-check-circle"></i> Imagen Lista</p></div>
                </div>

                <div class="flex gap-3 mt-auto mb-2">
                    <button onclick="irAHome()" class="w-[35%] bg-slate-200 text-slate-600 font-black py-5 rounded-[1.5rem] uppercase text-[10px] active:scale-95 text-center">CERRAR</button>
                    <button onclick="guardarYGestionar()" class="flex-grow bg-blue-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl uppercase text-[10px] italic flex items-center justify-center gap-2 active:scale-95">
                        <i class="fas fa-save"></i> GUARDAR ALERTA
                    </button>
                </div>
            </div>
        </div>

        <!-- MODAL REPORTES -->
        <div id="modalGestion">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black italic uppercase italic tracking-tighter text-white w-full text-center">LISTADO ALERTAS</h2>
                <button onclick="cerrarModalGestion()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-white"><i class="fas fa-times"></i></button>
            </div>
            <div id="listaReporte" class="flex-grow overflow-y-auto space-y-3 pb-10 scrollbar-hide text-white"></div>
            <div class="flex flex-col gap-3 mt-4">
                <button onclick="generarPDF()" class="w-full bg-slate-800 text-white font-black py-4 rounded-xl text-[10px] italic flex items-center justify-center gap-2 active:scale-95"><i class="fas fa-file-pdf text-red-400"></i> GENERAR REPORTE PDF</button>
                <div class="flex gap-3">
                    <button onclick="compartirReporte()" class="flex-grow bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase text-[10px] italic">WhatsApp</button>
                    <button onclick="vaciarReporte()" class="bg-red-500/20 text-red-400 border border-red-500/20 p-5 rounded-2xl active:scale-90"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        </div>

        <!-- LOADER -->
        <div id="loader" class="screen z-[1000] hidden items-center justify-center bg-white/90">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent mb-3"></div>
            <p id="loaderText" class="text-blue-900 font-black text-[9px] uppercase tracking-widest italic">Procesando...</p>
        </div>
    </div>

    <script>
        const GOOGLE_DRIVE_URL = "https://script.google.com/macros/s/AKfycbzvCC-zCaC57HZFlHl5JWvCbKusO2rMYypxAaWjlG8bTz2_Jw3EvDxZ52ZMAnCMbo4F/exec"; 
        const API_URL = "https://round-sound-c782.cmaturana.workers.dev/?codigo=";
        
        let html5QrCode, currentProduct = null, currentFotoUrl = "", currentBase64 = "";
        let historial = JSON.parse(localStorage.getItem('ultron_history') || '[]');
        let gestionados = JSON.parse(localStorage.getItem('ultron_gestionados') || '[]');
        let auditorName = localStorage.getItem('ultron_auditor_name') || "";

        const vibrate = () => { if(navigator.vibrate) navigator.vibrate(50); };

        window.onload = () => { if (!auditorName) { mostrarPantalla('introScreen'); } else { actualizarAuditorDisplay(); mostrarPantalla('homeScreen'); } actualizarHistorial(); actualizarBadge(); };

        function mostrarPantalla(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function registrarAuditor() { const name = document.getElementById('auditorNameInput').value.trim(); if (name.length < 3) return; auditorName = name; localStorage.setItem('ultron_auditor_name', auditorName); actualizarAuditorDisplay(); mostrarPantalla('homeScreen'); }
        function cerrarSesion() { if (confirm("¿Cerrar sesión?")) { localStorage.removeItem('ultron_auditor_name'); location.reload(); } }
        function actualizarAuditorDisplay() { document.getElementById('auditorDisplay').innerText = "AUDITOR: " + auditorName.toUpperCase(); }
        function toggleUbi() { const i = document.getElementById('inputUbi'); if(document.getElementById('checkUbi').checked){ i.classList.remove('hidden'); i.focus(); } else { i.classList.add('hidden'); i.value = ""; } }
        function limpiarHistorial() { if (confirm("¿Borrar historial?")) { historial = []; localStorage.setItem('ultron_history', '[]'); actualizarHistorial(); } }
        function borrarItemHistorial(event, codigo) { event.stopPropagation(); if (confirm("¿Borrar item?")) { historial = historial.filter(h => h.codigo !== codigo); localStorage.setItem('ultron_history', JSON.stringify(historial)); actualizarHistorial(); } }

        async function procesarYSubirFoto(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const reader = new FileReader();
            document.getElementById('loaderText').innerText = "COMPRIMIENDO...";
            document.getElementById('loader').classList.remove('hidden');
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_size = 1000; 
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max_size) { h *= max_size / w; w = max_size; } } 
                    else { if (h > max_size) { w *= max_size / h; h = max_size; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    currentBase64 = base64;
                    enviarADrive(base64);
                }
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function enviarADrive(base64) {
            document.getElementById('loaderText').innerText = "SUBIENDO A DRIVE...";
            try {
                // Al usar mode: 'cors' y JSON, Google Script debería responder el enlace real si está bien publicado
                const res = await fetch(GOOGLE_DRIVE_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ base64: base64, sku: currentProduct.codigo, auditor: auditorName }) 
                });
                const result = await res.json();
                if (result.status === "success") {
                    currentFotoUrl = result.url;
                    document.getElementById('fotoStatus').classList.remove('hidden');
                    document.getElementById('btnFotoUI').style.borderColor = "#22c55e";
                    document.getElementById('btnFotoUI').innerHTML = '<i class="fas fa-check-circle text-green-600"></i><span class="text-[8px] font-black text-green-700 uppercase">FOTO OK</span>';
                }
            } catch (err) { 
                // Si falla por CORS pero se subió, marcamos OK manual
                currentFotoUrl = "(Ver en Drive)"; 
                document.getElementById('btnFotoUI').style.borderColor = "#22c55e";
                document.getElementById('btnFotoUI').innerHTML = '<i class="fas fa-check-circle text-green-600"></i><span class="text-[8px] font-black text-green-700 uppercase">FOTO OK</span>';
            }
            document.getElementById('loader').classList.add('hidden');
        }

        async function buscarStock(codigoForzado = null) {
            const input = document.getElementById('codigoInput');
            const codigo = codigoForzado || input.value.trim();
            if (!codigo) return;
            input.blur(); vibrate();
            currentFotoUrl = ""; currentBase64 = "";
            mostrarPantalla('loader');
            try {
                const response = await fetch(API_URL + codigo);
                const data = await response.json();
                if (data.error || !data.nombre || data.nombre === "No detectado") throw new Error();
                currentProduct = data; guardarEnHistorial(data);
                const banner = document.getElementById('resBanner'), resLabel = document.getElementById('resCodigoLabel'), resNombre = document.getElementById('resNombre'), sBox = document.getElementById('stockBox');
                if (data.descontinuado === true) {
                    banner.classList.add('bg-descontinuado'); resLabel.innerHTML = `<i class="fas fa-ban mr-2"></i> DESCONTINUADO: ${data.codigo}`; resNombre.classList.add('text-red-600'); sBox.className = "p-3 rounded-[1.5rem] border-2 border-red-200 bg-red-50 text-red-600 text-center font-black shadow-sm";
                } else {
                    banner.classList.remove('bg-descontinuado'); resLabel.innerText = "CÓDIGO: " + data.codigo; resNombre.classList.remove('text-red-600');
                    if (parseInt(data.stock) <= 0) sBox.className = "p-3 rounded-[1.5rem] border-2 border-red-100 bg-red-50 text-red-600 text-center font-black shadow-sm";
                    else sBox.className = "p-3 rounded-[1.5rem] border-2 border-green-100 bg-green-50 text-green-600 text-center font-black shadow-sm";
                }
                document.getElementById('resNombre').innerText = data.nombre; document.getElementById('resPrecio').innerText = data.precio ? "$" + data.precio.toLocaleString('es-CL') : "---"; document.getElementById('resStock').innerText = data.stock ?? 0; 
                mostrarPantalla('resultScreen');
            } catch (error) { mostrarPantalla('errorMsg'); }
        }

        function irAHome() { document.getElementById('codigoInput').value = ''; document.querySelectorAll('#checklistArea input').forEach(c => c.checked = false); document.getElementById('inputUbi').classList.add('hidden'); mostrarPantalla('homeScreen'); }
        
        function guardarYGestionar() {
            const tareas = Array.from(document.querySelectorAll('#checklistArea input[data-tarea]:checked')).map(c => c.getAttribute('data-tarea'));
            const ubiManual = document.getElementById('inputUbi').value.trim();
            if (tareas.length > 0 || ubiManual !== "" || currentBase64 !== "") {
                gestionados.push({ ...currentProduct, tareas, ubicacion: ubiManual, foto: currentFotoUrl, fotoBase64: currentBase64, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
                localStorage.setItem('ultron_gestionados', JSON.stringify(gestionados)); actualizarBadge();
                vibrate();
            }
            irAHome();
        }

        function generarPDF() {
            if (gestionados.length === 0) return alert("Sin datos");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const azul = [0, 31, 63];
            doc.setFillColor(...azul); doc.rect(10, 10, 277, 10, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(14); doc.text("PLANILLA CAMINATA COMPRAS", 148.5, 17, { align: "center" });
            doc.autoTable({ startY: 20, theme: 'grid', body: [[{content:'Tienda', styles:{fillColor:azul, textColor:255}},'MAITENCILLO'], [{content:'Responsable', styles:{fillColor:azul, textColor:255}},auditorName.toUpperCase()], [{content:'Fecha', styles:{fillColor:azul, textColor:255}},new Date().toLocaleDateString()]] });
            const body = gestionados.map((g, i) => [i+1, g.codigo, g.nombre, g.precio ? `$${g.precio.toLocaleString('es-CL')}` : '---', g.tareas.includes("REPOSICIÓN")?"⚠️ FALTA":"", g.tareas.includes("LIMPIEZA")?"⚠️ FALTA":"", g.tareas.includes("REVISAR EXISTENCIA")?"⚠️ REVISAR":"", g.ubicacion]);
            doc.autoTable({ startY: doc.lastAutoTable.finalY+5, head: [['N°','SKU','DESCRIPCIÓN','PRECIO','REP','LIMP','EXIST','UBICACIÓN']], body: body, theme:'grid', headStyles:{fillColor:azul} });

            const conFotos = gestionados.filter(g => g.fotoBase64);
            if (conFotos.length > 0) {
                doc.addPage();
                doc.setFillColor(...azul); doc.rect(10, 10, 277, 10, 'F');
                doc.setTextColor(255, 255, 255); doc.text("ANEXO: EVIDENCIA FOTOGRÁFICA", 148.5, 17, { align: "center" });
                let xPos = 15, yPos = 30;
                conFotos.forEach((item, index) => {
                    if (yPos > 150) { doc.addPage(); yPos = 20; }
                    doc.setTextColor(0,0,0); doc.setFontSize(10);
                    doc.text(`PRODUCTO N° ${gestionados.indexOf(item) + 1} - SKU: ${item.codigo}`, xPos, yPos - 3);
                    try { doc.addImage(item.fotoBase64, 'JPEG', xPos, yPos, 120, 70, undefined, 'FAST'); } catch(e) {}
                    if ((index + 1) % 2 === 0) { xPos = 15; yPos += 85; } else { xPos += 140; }
                });
            }
            doc.save("Reporte_Ultron.pdf");
        }

        function abrirEscanner() { document.getElementById('scannerWrapper').classList.remove('hidden'); html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 200 }, (text) => { cerrarEscanner(); buscarStock(text); }); }
        function cerrarEscanner() { if (html5QrCode) { html5QrCode.stop().then(() => { document.getElementById('scannerWrapper').classList.add('hidden'); }).catch(() => { document.getElementById('scannerWrapper').classList.add('hidden'); }); } else { document.getElementById('scannerWrapper').classList.add('hidden'); } }
        function actualizarBadge() { const b = document.getElementById('badgeGestion'); b.innerText = gestionados.length; b.classList.toggle('hidden', gestionados.length === 0); }
        function abrirModalGestion() { document.getElementById('modalGestion').style.display = 'flex'; const lista = document.getElementById('listaReporte'); lista.innerHTML = gestionados.map((g, i) => `
            <div class="${g.descontinuado ? 'bg-red-50/10 border-red-500/30' : 'bg-white/10 border-white/10'} p-4 rounded-[1.5rem] border mb-2 text-left relative overflow-hidden shadow-sm">
                <div class="absolute top-0 right-0 bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-bl-xl">${i + 1}</div>
                <p class="font-black text-[11px] uppercase w-4/5 leading-tight">${g.nombre}</p>
                <p class="text-[9px] text-white/40 font-bold uppercase tracking-widest mt-1">#${g.codigo} | STK: ${g.stock}</p>
                <div class="flex flex-wrap gap-2 mt-3">${g.tareas.map(t => `<span class="bg-blue-600 text-white text-[8px] font-black px-2 py-1 rounded-full italic uppercase">⚠️ FALTA ${t}</span>`).join('')}${g.fotoBase64 ? '<span class="bg-green-600 text-white text-[8px] font-black px-3 py-1 rounded-full italic uppercase shadow-sm">📸 FOTO OK</span>' : ''}</div>
            </div>`).join(''); }
        function cerrarModalGestion() { document.getElementById('modalGestion').style.display = 'none'; }
        function vaciarReporte() { if (confirm("¿Borrar todo?")) { gestionados = []; localStorage.setItem('ultron_gestionados', '[]'); actualizarBadge(); cerrarModalGestion(); } }
        function compartirReporte() { const t = gestionados.map((g, i) => `${i+1}. ⚠️ ${g.nombre} (#${g.codigo})\n📦 STK: ${g.stock}\n🚨 TAREAS: ⚠️ FALTA ${g.tareas.join(', ⚠️ FALTA ')}${g.foto ? '\n📸 FOTO: '+g.foto : ''}`).join('\n\n'); navigator.clipboard.writeText(`REPORTES ULTRON\nAuditor: ${auditorName.toUpperCase()}\n\n${t}`).then(() => alert("Reporte firmado ⚠️ copiado.")); }
        function guardarEnHistorial(item) { historial = historial.filter(h => h.codigo !== item.codigo); historial.unshift({ ...item }); historial = historial.slice(0, 10); localStorage.setItem('ultron_history', JSON.stringify(historial)); actualizarHistorial(); }
        function actualizarHistorial() { 
            const lista = document.getElementById('listaHistorial'); 
            if (historial.length === 0) { lista.innerHTML = '<p class="text-slate-300 italic text-[10px] text-center py-6 font-black uppercase">Vacío</p>'; return; } 
            lista.innerHTML = historial.map(h => `
                <div class="flex items-center gap-2 mb-2">
                    <div onclick="buscarStock('${h.codigo}')" class="flex-grow ${h.descontinuado ? 'bg-red-50 border-red-100' : 'bg-white border-slate-100'} p-4 rounded-[1.5rem] flex justify-between items-center shadow-sm active:scale-95 transition-all border text-left">
                        <div class="w-2/3">
                            <p class="text-[8px] font-black text-slate-400 mb-0.5 uppercase italic">#${h.codigo}</p>
                            <p class="text-[10px] font-black uppercase leading-tight">${h.nombre}</p>
                            <span class="text-[9px] font-black ${h.descontinuado ? 'text-red-500' : 'text-slate-400'} uppercase font-bold">STK: ${h.stock}</span>
                        </div>
                        <div class="${h.descontinuado ? 'text-red-600' : 'text-blue-600'} font-black text-sm">$${h.precio.toLocaleString('es-CL')}</div>
                    </div>
                    <button onclick="borrarItemHistorial(event, '${h.codigo}')" class="bg-red-100 text-red-500 w-10 h-14 rounded-2xl flex items-center justify-center active:bg-red-500 active:text-white transition-all text-xs"><i class="fas fa-trash-alt"></i></button>
                </div>`).join(''); 
        }
    </script>
</body>
</html>
