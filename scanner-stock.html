<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultron Auditor PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        #reader { width: 100% !important; border: none !important; border-radius: 2rem; overflow: hidden; }
        
        /* Estilos para checklists */
        .check-item input:checked + div { background-color: #fef2f2; border-color: #ef4444; }
        .check-item input:checked + div i { color: #dc2626; opacity: 1; }
        .check-item input:checked + div span { color: #991b1b; }
        #checkOtra:checked + div { background-color: #f0f9ff; border-color: #3b82f6; }

        /* Clases de estado descontinuado */
        .bg-descontinuado { background-color: #dc2626 !important; }
        .text-descontinuado { color: #dc2626 !important; }
        .border-descontinuado { border-color: #fecaca !important; background-color: #fef2f2 !important; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen pb-10">

    <div class="max-w-md mx-auto w-full">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6 px-2">
            <div>
                <h1 class="text-2xl font-black text-blue-900 tracking-tighter italic uppercase">ULTRON <span class="text-blue-500 font-bold">GESTIÓN</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Auditoría de Pasillo v7.0</p>
            </div>
            <button onclick="abrirModalGestion()" class="relative bg-blue-600 text-white p-2 rounded-2xl w-12 h-12 flex items-center justify-center shadow-xl shadow-blue-200 active:scale-90 transition-all">
                <i class="fas fa-clipboard-list text-lg"></i>
                <span id="badgeGestion" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white hidden">0</span>
            </button>
        </div>

        <!-- Buscador -->
        <div id="searchContainer" class="bg-white p-2 rounded-3xl shadow-xl flex items-center mb-4 border border-gray-100 transition-all">
            <input id="codigoInput" type="number" inputmode="numeric" placeholder="Código..." 
                   class="flex-grow p-4 text-lg font-bold bg-transparent text-gray-700 outline-none w-full"
                   onkeypress="if(event.key === 'Enter') buscarStock()">
            <button onclick="abrirEscanner()" class="bg-slate-100 text-slate-500 w-12 h-12 rounded-2xl flex items-center justify-center mr-2 active:scale-90 transition-all">
                <i class="fas fa-camera text-xl"></i>
            </button>
            <button onclick="buscarStock()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center active:scale-90 transition-all shadow-lg">
                <i class="fas fa-search text-sm"></i>
            </button>
        </div>

        <!-- Escáner -->
        <div id="scannerWrapper" class="hidden mb-6 fade-in text-white"><div class="bg-black rounded-[2.5rem] overflow-hidden relative shadow-2xl border-4 border-white"><div id="reader"></div><button onclick="cerrarEscanner()" class="absolute top-4 right-4 bg-white/20 backdrop-blur-md w-10 h-10 rounded-full z-50 flex items-center justify-center"><i class="fas fa-times"></i></button></div></div>

        <!-- Loader -->
        <div id="loader" class="hidden flex flex-col items-center justify-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-[6px] border-blue-50 border-t-blue-600 mb-4"></div>
            <p class="text-blue-900 font-black text-[10px] uppercase tracking-widest animate-pulse tracking-[0.3em]">Consultando Cloudflare...</p>
        </div>

        <!-- RESULTADO -->
        <div id="resultado" class="hidden fade-in space-y-4 pb-20">
            <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-50">
                <!-- BANNER SUPERIOR DINÁMICO -->
                <div id="resBanner" class="bg-blue-600 p-3 text-white text-center transition-all duration-300">
                    <span id="resCodigoLabel" class="text-[11px] font-black tracking-[0.3em] uppercase leading-none italic">CÓDIGO: ---</span>
                </div>

                <div class="p-6">
                    <h2 id="resNombre" class="text-lg font-black text-slate-800 mb-6 leading-tight text-center px-2">Nombre del producto</h2>
                    
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <!-- PRECIO -->
                        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex flex-col items-center justify-center text-center">
                            <span class="text-blue-500 text-[9px] font-black uppercase block mb-1 tracking-widest">PVP</span>
                            <span id="resPrecio" class="text-xl font-black text-blue-800">$0</span>
                        </div>
                        <!-- STOCK -->
                        <div id="stockBox" class="p-4 rounded-2xl border flex flex-col items-center justify-center text-center transition-all">
                            <span id="stockLabel" class="text-[9px] font-black uppercase block mb-1 tracking-widest">EN STOCK</span>
                            <span id="resStock" class="text-xl font-black">0</span>
                        </div>
                    </div>

                    <!-- Checklist -->
                    <div class="bg-slate-50 p-4 rounded-[2rem] border border-slate-100">
                        <div id="checklistArea" class="grid grid-cols-2 gap-3">
                            <label class="check-item"><input type="checkbox" data-tarea="Falta Precio" class="hidden"><div class="flex items-center justify-center gap-2 p-4 bg-white rounded-2xl border border-slate-200 transition-all shadow-sm"><i class="fas fa-exclamation-circle opacity-0 transition-opacity"></i><span class="text-xs font-black text-slate-500 uppercase tracking-tighter">Precio</span></div></label>
                            <label class="check-item"><input type="checkbox" data-tarea="Falta Limpieza" class="hidden"><div class="flex items-center justify-center gap-2 p-4 bg-white rounded-2xl border border-slate-200 transition-all shadow-sm"><i class="fas fa-exclamation-circle opacity-0 transition-opacity"></i><span class="text-xs font-black text-slate-500 uppercase tracking-tighter">Limpieza</span></div></label>
                            <label class="check-item"><input type="checkbox" data-tarea="Falta Reposición" class="hidden"><div class="flex items-center justify-center gap-2 p-4 bg-white rounded-2xl border border-slate-200 transition-all shadow-sm"><i class="fas fa-exclamation-circle opacity-0 transition-opacity"></i><span class="text-xs font-black text-slate-500 uppercase tracking-tighter">Reposición</span></div></label>
                            <label class="check-item"><input type="checkbox" data-tarea="Falta Orden" class="hidden"><div class="flex items-center justify-center gap-2 p-4 bg-white rounded-2xl border border-slate-200 transition-all shadow-sm"><i class="fas fa-exclamation-circle opacity-0 transition-opacity"></i><span class="text-xs font-black text-slate-500 uppercase tracking-tighter">Orden</span></div></label>
                            <label class="check-item col-span-2"><input type="checkbox" id="checkOtra" class="hidden" onchange="toggleNota()"><div class="flex items-center justify-center gap-2 p-4 bg-white rounded-2xl border border-slate-200 transition-all shadow-sm"><i class="fas fa-edit opacity-0 transition-opacity"></i><span class="text-xs font-black text-slate-500 uppercase italic">¿Otra Gestión?</span></div></label>
                        </div>
                        <div id="notaContainer" class="hidden mt-3 fade-in"><textarea id="inputNota" rows="2" placeholder="Detalles de auditoría..." class="w-full p-4 bg-white rounded-2xl border-2 border-blue-200 text-sm font-bold text-blue-900 shadow-inner outline-none"></textarea></div>
                    </div>
                </div>
            </div>
            <button onclick="guardarYGestionar()" class="w-full bg-blue-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl border border-blue-700 flex items-center justify-center gap-3 active:scale-95 uppercase text-[10px] tracking-[0.3em] italic">
                <i class="fas fa-save"></i> Guardar y Siguiente
            </button>
        </div>

        <!-- Historial -->
        <div id="historialSection" class="mt-8 px-2">
            <h3 class="text-slate-400 text-[9px] font-black uppercase tracking-[0.3em] mb-4 italic text-center">Búsquedas Recientes</h3>
            <div id="listaHistorial" class="space-y-2"></div>
        </div>

        <!-- Error -->
        <div id="errorMsg" class="hidden fade-in bg-white p-10 rounded-[2.5rem] text-center mt-4 border border-red-50 shadow-2xl">
            <i class="fas fa-ghost text-red-100 text-6xl mb-4"></i>
            <p class="font-black text-slate-800 uppercase">Sin información</p>
            <button onclick="nuevaBusqueda()" class="mt-6 text-[10px] font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-8 py-4 rounded-full italic">Volver</button>
        </div>
    </div>

    <!-- MODAL ALERTAS -->
    <div id="modalGestion" class="hidden fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-md p-4 flex flex-col fade-in">
        <div class="flex justify-between items-center text-white mb-6 pt-4 px-2">
            <h2 class="text-xl font-black italic uppercase">ALERTAS <span class="text-blue-400">PASILLO</span></h2>
            <button onclick="cerrarModalGestion()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><i class="fas fa-times"></i></button>
        </div>
        <div id="listaReporte" class="flex-grow overflow-y-auto space-y-3 pb-24 px-1"></div>
        <div class="fixed bottom-6 left-6 right-6 flex gap-3">
            <button onclick="compartirReporte()" class="flex-grow bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 uppercase text-xs tracking-widest italic"><i class="fas fa-share-alt"></i> Enviar</button>
            <button onclick="vaciarReporte()" class="bg-red-500 text-white p-4 rounded-2xl shadow-xl active:scale-90"><i class="fas fa-trash-alt"></i></button>
        </div>
    </div>

    <script>
        const API_URL = "https://round-sound-c782.cmaturana.workers.dev/?codigo=";
        let html5QrCode;
        let historial = JSON.parse(localStorage.getItem('ultron_history') || '[]');
        let gestionados = JSON.parse(localStorage.getItem('ultron_gestionados') || '[]');
        let currentProduct = null;

        window.onload = () => { actualizarHistorial(); actualizarBadge(); };

        async function buscarStock(codigoForzado = null) {
            const input = document.getElementById('codigoInput');
            const codigo = codigoForzado || input.value.trim();
            if (!codigo) return;
            
            cerrarEscanner(); 
            limpiarChecks(); 
            mostrarVista('loader');

            try {
                const response = await fetch(API_URL + codigo);
                const data = await response.json();
                
                if (data.error || !data.nombre || data.nombre === "No detectado") throw new Error();
                
                currentProduct = data;
                guardarEnHistorial(data);

                const banner = document.getElementById('resBanner');
                const resLabel = document.getElementById('resCodigoLabel');
                const resNombre = document.getElementById('resNombre');
                const sBox = document.getElementById('stockBox');
                const sLabel = document.getElementById('stockLabel');

                // --- DETECCIÓN DE PRODUCTO DESCONTINUADO ---
                if (data.descontinuado === true) {
                    banner.classList.add('bg-descontinuado');
                    resLabel.innerHTML = `<i class="fas fa-ban mr-1"></i> PRODUCTO DESCONTINUADO <i class="fas fa-ban ml-1"></i>`;
                    resNombre.classList.add('text-descontinuado');
                    sBox.classList.add('border-descontinuado');
                    sBox.classList.add('text-red-600');
                    sLabel.innerText = "DESCONTINUADO";
                } else {
                    banner.classList.remove('bg-descontinuado');
                    resLabel.innerText = "CÓDIGO: " + data.codigo;
                    resNombre.classList.remove('text-descontinuado');
                    sBox.classList.remove('border-descontinuado');
                    sBox.classList.remove('text-red-600');
                    sLabel.innerText = "EN STOCK";
                }
                // -------------------------------------------

                document.getElementById('resNombre').innerText = data.nombre;
                document.getElementById('resPrecio').innerText = data.precio ? "$" + data.precio.toLocaleString('es-CL') : "---";
                document.getElementById('resStock').innerText = data.stock ?? 0;
                
                if (!data.descontinuado) {
                    if (parseInt(data.stock) <= 0) {
                        sBox.className = "p-4 rounded-2xl border border-red-100 bg-red-50 text-red-600 text-center flex flex-col items-center justify-center";
                        sLabel.innerText = "SIN STOCK";
                    } else {
                        sBox.className = "p-4 rounded-2xl border border-green-50 bg-green-50 text-green-600 text-center flex flex-col items-center justify-center";
                        sLabel.innerText = "EN STOCK";
                    }
                }
                
                mostrarVista('resultado');
            } catch (error) { mostrarVista('errorMsg'); }
        }

        function guardarYGestionar() {
            const tareas = Array.from(document.querySelectorAll('#checklistArea input:checked')).map(c => c.getAttribute('data-tarea'));
            const nota = document.getElementById('inputNota').value.trim();
            if (tareas.length > 0 || nota !== "") {
                const item = { ...currentProduct, tareas, nota, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
                gestionados.unshift(item);
                localStorage.setItem('ultron_gestionados', JSON.stringify(gestionados));
                actualizarBadge();
            }
            nuevaBusqueda();
        }

        function toggleNota() {
            const container = document.getElementById('notaContainer');
            if (document.getElementById('checkOtra').checked) { container.classList.remove('hidden'); document.getElementById('inputNota').focus(); }
            else { container.classList.add('hidden'); document.getElementById('inputNota').value = ""; }
        }

        function mostrarVista(id) {
            ['loader', 'resultado', 'errorMsg', 'scannerWrapper', 'historialSection'].forEach(v => {
                const el = document.getElementById(v);
                if (v === id) el.classList.remove('hidden');
                else if (v === 'historialSection' && (id === 'loader' || id === 'resultado')) el.classList.add('hidden');
                else if (v === 'historialSection') el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
        }

        function abrirEscanner() {
            mostrarVista('scannerWrapper');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => buscarStock(text));
        }

        function cerrarEscanner() { if (html5QrCode) html5QrCode.stop().then(() => document.getElementById('scannerWrapper').classList.add('hidden')); }
        function nuevaBusqueda() { document.getElementById('codigoInput').value = ''; mostrarVista('historialSection'); document.getElementById('codigoInput').focus(); }
        
        function abrirModalGestion() {
            const lista = document.getElementById('listaReporte');
            document.getElementById('modalGestion').classList.remove('hidden');
            if (gestionados.length === 0) lista.innerHTML = '<p class="text-slate-500 text-center py-20 italic">No hay alertas</p>';
            else lista.innerHTML = gestionados.map(g => `
                <div class="bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-100">
                    <p class="font-black text-slate-800 text-sm truncate uppercase tracking-tight">${g.nombre}</p>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3 italic">${g.codigo} @ ${g.time}</p>
                    <div class="flex flex-wrap gap-1 mb-2">${g.tareas.map(t => `<span class="bg-red-50 text-red-600 text-[8px] font-black px-2 py-0.5 rounded-full uppercase border border-red-100">⚠️ ${t}</span>`).join('')}</div>
                    ${g.nota ? `<div class="bg-blue-50 p-3 rounded-xl border border-blue-100 text-[10px] font-bold text-blue-900 italic">"${g.nota}"</div>` : ''}
                </div>
            `).join('');
        }

        function cerrarModalGestion() { document.getElementById('modalGestion').classList.add('hidden'); }
        function vaciarReporte() { if (confirm("¿Borrar alertas?")) { gestionados = []; localStorage.setItem('ultron_gestionados', '[]'); actualizarBadge(); abrirModalGestion(); } }
        function actualizarBadge() { const b = document.getElementById('badgeGestion'); if (gestionados.length > 0) { b.innerText = gestionados.length; b.classList.remove('hidden'); } else b.classList.add('hidden'); }
        function limpiarChecks() { document.querySelectorAll('#checklistArea input').forEach(c => c.checked = false); document.getElementById('notaContainer').classList.add('hidden'); document.getElementById('inputNota').value = ""; }
        function guardarEnHistorial(item) { historial = historial.filter(h => h.codigo !== item.codigo); historial.unshift({codigo: item.codigo, nombre: item.nombre, precio: item.precio}); historial = historial.slice(0, 5); localStorage.setItem('ultron_history', JSON.stringify(historial)); actualizarHistorial(); }
        function actualizarHistorial() { const lista = document.getElementById('listaHistorial'); if (historial.length === 0) { lista.innerHTML = '<p class="text-slate-300 italic text-[10px] text-center py-4 uppercase font-black">Sin historial</p>'; return; } lista.innerHTML = historial.map(h => `<div onclick="buscarStock('${h.codigo}')" class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50 active:scale-95 transition-all text-xs"><div class="overflow-hidden flex flex-col items-start"><p class="font-black text-slate-700 truncate pr-4 tracking-tighter uppercase text-[10px]">${h.nombre}</p><p class="text-[8px] text-slate-400 font-black italic">${h.codigo}</p></div><div class="text-blue-600 font-black">$${h.precio ? h.precio.toLocaleString('es-CL') : '---'}</div></div>`).join(''); }
        function compartirReporte() { const texto = gestionados.map(g => `⚠️ ${g.nombre}\n🔢 COD: ${g.codigo}\n🚨 ${g.tareas.join(', ')}\n📝 ${g.nota || '-'}`).join('\n\n'); navigator.clipboard.writeText(texto).then(() => alert("Copiado al portapapeles")); }
    </script>
</body>
</html>
