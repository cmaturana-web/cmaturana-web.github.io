<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultron Auditor PRO - v18.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #cbd5e1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            -webkit-tap-highlight-color: transparent; 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        
        .app-frame {
            width: 100%;
            max-width: 430px;
            height: 95vh;
            background-color: #f8fafc;
            border: 4px solid #2563eb;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 3rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 480px) {
            .app-frame { height: 100vh; max-width: 100%; border: none; border-radius: 0; }
            body { background-color: #f8fafc; }
        }

        .content-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            scroll-behavior: smooth;
        }
        .content-scroll::-webkit-scrollbar { width: 0; background: transparent; }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        #reader { width: 100% !important; border: none !important; border-radius: 2rem; overflow: hidden; }
        
        /* ESTILO DE ICONOS EN CHECKLIST */
        .check-item div i { color: #94a3b8; opacity: 0.5; transition: all 0.2s; }
        .check-item input:checked + div { background-color: #fef2f2; border-color: #ef4444; }
        .check-item input:checked + div i { color: #dc2626; opacity: 1; transform: scale(1.1); }
        .check-item input:checked + div span { color: #991b1b; font-weight: 900; }
        
        .bg-descontinuado { background-color: #dc2626 !important; }
        .intro-overlay { position: absolute; inset: 0; z-index: 200; background-color: white; display: flex; flex-direction: column; justify-content: center; padding: 2rem; text-align: center; }
    </style>
</head>
<body>

    <div class="app-frame">
        
        <!-- PANTALLA INICIAL (INTRO) -->
        <div id="introScreen" class="intro-overlay hidden fade-in">
            <div class="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white text-4xl mx-auto mb-6 shadow-xl font-black italic">U</div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tighter italic uppercase leading-none text-center">ULTRON <br><span class="text-blue-600">AUDITOR</span></h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-4">v18.0 - Stock & Alert Memory</p>
            
            <div class="space-y-4 text-slate-600 text-sm leading-snug my-10 px-4 text-left">
                <p class="flex items-start gap-4"><i class="fas fa-history text-blue-500 mt-1"></i> <span>Historial detallado con <b>Stock</b>.</span></p>
                <p class="flex items-start gap-4"><i class="fas fa-exclamation-triangle text-blue-500 mt-1"></i> <span>Alerta visual para <b>Descontinuados</b>.</span></p>
                <p class="flex items-start gap-4"><i class="fas fa-user-check text-blue-500 mt-1"></i> <span>Firma de Reportes Personalizada.</span></p>
            </div>

            <div class="px-4">
                <input id="auditorNameInput" type="text" placeholder="Nombre Auditor..." class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-500 font-bold text-center mb-4">
                <button onclick="registrarAuditor()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest italic text-center">Entrar al Sistema</button>
            </div>
        </div>

        <div class="content-scroll">
            
            <!-- Header -->
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h1 class="text-2xl font-black text-blue-900 tracking-tighter italic uppercase leading-none">ULTRON <span class="text-blue-500 font-bold">GESTIÓN</span></h1>
                    <div class="flex items-center gap-2 mt-2">
                        <p id="auditorDisplay" class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Cargando...</p>
                        <button onclick="cerrarSesion()" class="text-red-400 active:scale-75"><i class="fas fa-power-off text-[10px]"></i></button>
                    </div>
                </div>
                <button onclick="abrirModalGestion()" class="relative bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl active:scale-90">
                    <i class="fas fa-clipboard-list text-xl"></i>
                    <span id="badgeGestion" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full border-2 border-white hidden">0</span>
                </button>
            </div>

            <!-- Buscador -->
            <div id="searchContainer" class="bg-white p-2 rounded-[2rem] shadow-md flex items-center mb-6 border border-slate-100">
                <input id="codigoInput" type="number" inputmode="numeric" placeholder="Escanear..." class="flex-grow p-4 text-lg font-bold bg-transparent outline-none w-full" onkeypress="if(event.key === 'Enter') buscarStock()">
                <button onclick="limpiarInput()" class="text-slate-300 w-10 h-10 flex items-center justify-center"><i class="fas fa-times"></i></button>
                <button onclick="abrirEscanner()" class="bg-slate-50 text-slate-400 w-12 h-12 rounded-2xl flex items-center justify-center mr-2"><i class="fas fa-camera"></i></button>
                <button onclick="buscarStock()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-search"></i></button>
            </div>

            <div id="mainContent">
                <div id="scannerWrapper" class="hidden mb-6 fade-in"><div class="bg-black rounded-[2rem] overflow-hidden relative border-4 border-white"><div id="reader"></div><button onclick="cerrarEscanner()" class="absolute top-4 right-4 bg-white/20 w-8 h-8 rounded-full z-50 text-white"><i class="fas fa-times text-xs"></i></button></div></div>

                <div id="loader" class="hidden flex flex-col items-center justify-center py-10">
                    <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-100 border-t-blue-600 mb-4"></div>
                    <p class="text-blue-900 font-black text-[9px] uppercase tracking-widest animate-pulse italic">Consultando...</p>
                </div>

                <!-- Resultado Principal -->
                <div id="resultado" class="hidden fade-in space-y-4">
                    <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
                        <div id="resBanner" class="bg-blue-600 p-3 text-white text-center font-black italic text-[11px] tracking-widest uppercase transition-colors">
                            <span id="resCodigoLabel">CÓDIGO: ---</span>
                        </div>
                        <div class="p-6">
                            <h2 id="resNombre" class="text-lg font-black text-slate-800 mb-6 text-center leading-tight">Nombre</h2>
                            <div class="grid grid-cols-2 gap-3 mb-6 text-center">
                                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-col justify-center">
                                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">PVP</span>
                                    <p id="resPrecio" class="text-xl font-black text-slate-800">$0</p>
                                </div>
                                <div id="stockBox" class="p-4 rounded-2xl border font-black flex flex-col justify-center">
                                    <span id="stockLabel" class="text-[9px] uppercase tracking-widest mb-1">STOCK</span>
                                    <p id="resStock" class="text-xl">0</p>
                                </div>
                            </div>
                            
                            <div class="bg-slate-50 p-4 rounded-[2rem] space-y-3">
                                <div id="checklistArea" class="grid grid-cols-2 gap-2">
                                    <label class="check-item"><input type="checkbox" data-tarea="Falta Precio" class="hidden"><div class="p-3 bg-white rounded-xl border border-slate-200 text-center shadow-sm flex flex-col items-center gap-1"><i class="fas fa-tag"></i><span class="text-[9px] font-black text-slate-500 uppercase">Precio</span></div></label>
                                    <label class="check-item"><input type="checkbox" data-tarea="Reposición" class="hidden"><div class="p-3 bg-white rounded-xl border border-slate-200 text-center shadow-sm flex flex-col items-center gap-1"><i class="fas fa-boxes"></i><span class="text-[9px] font-black text-slate-500 uppercase">Reposición</span></div></label>
                                    <label class="check-item"><input type="checkbox" data-tarea="Limpieza" class="hidden"><div class="p-3 bg-white rounded-xl border border-slate-200 text-center shadow-sm flex flex-col items-center gap-1"><i class="fas fa-broom"></i><span class="text-[9px] font-black text-slate-500 uppercase">Limpieza</span></div></label>
                                    <label class="check-item"><input type="checkbox" data-tarea="Existencia" class="hidden"><div class="p-3 bg-white rounded-xl border border-slate-200 text-center shadow-sm flex flex-col items-center gap-1"><i class="fas fa-clipboard-check"></i><span class="text-[9px] font-black text-slate-500 uppercase text-center leading-none">Existencia</span></div></label>
                                    <label class="check-item col-span-2"><input type="checkbox" id="checkUbi" class="hidden" onchange="toggleUbi()"><div class="p-3 bg-white rounded-xl border border-slate-200 text-center shadow-sm flex items-center justify-center gap-3"><i class="fas fa-map-marker-alt"></i><span class="text-[9px] font-black text-slate-500 uppercase">Ubicación Manual</span></div></label>
                                </div>
                                <input id="inputUbi" type="text" placeholder="Ej: Pasillo 5..." class="hidden w-full p-4 bg-white rounded-xl border-2 border-blue-100 text-sm font-bold text-blue-900 outline-none">
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="nuevaBusqueda()" class="w-1/3 bg-slate-200 text-slate-500 font-black py-5 rounded-[1.5rem] uppercase text-[10px]">Cerrar</button>
                        <button onclick="guardarYGestionar()" class="flex-grow bg-blue-600 text-white font-black py-5 rounded-[1.5rem] shadow-lg uppercase text-[10px] italic"><i class="fas fa-save mr-2"></i> Guardar Alerta</button>
                    </div>
                </div>

                <!-- Historial -->
                <div id="historialSection">
                    <div class="flex justify-between items-center mb-4 px-2 mt-4">
                        <h3 class="text-slate-400 text-[9px] font-black uppercase tracking-widest italic">Historial Reciente</h3>
                        <button onclick="limpiarHistorial()" class="text-red-400 text-[9px] font-black uppercase">Limpiar</button>
                    </div>
                    <div id="listaHistorial" class="space-y-2"></div>
                </div>

                <!-- Error -->
                <div id="errorMsg" class="hidden fade-in bg-white p-8 rounded-[2rem] text-center border shadow-lg">
                    <p class="font-black text-slate-800 uppercase text-xs">No se encontró información</p>
                    <button onclick="nuevaBusqueda()" class="mt-4 text-[9px] font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-6 py-3 rounded-full">Reintentar</button>
                </div>
            </div>
        </div>

        <!-- MODAL REPORTES / ALERTAS -->
        <div id="modalGestion" class="hidden absolute inset-0 z-[300] bg-slate-900/95 backdrop-blur-md p-6 flex flex-col text-white">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic uppercase">REPORTES</h2>
                <button onclick="cerrarModalGestion()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            <div id="listaReporte" class="flex-grow overflow-y-auto space-y-3 pb-20"></div>
            <div class="flex gap-3">
                <button onclick="compartirReporte()" class="flex-grow bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase text-xs italic">Enviar WhatsApp</button>
                <button onclick="vaciarReporte()" class="bg-red-500 text-white p-5 rounded-2xl active:scale-90"><i class="fas fa-trash-alt"></i></button>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "https://round-sound-c782.cmaturana.workers.dev/?codigo=";
        let html5QrCode, currentProduct = null;
        let historial = JSON.parse(localStorage.getItem('ultron_history') || '[]');
        let gestionados = JSON.parse(localStorage.getItem('ultron_gestionados') || '[]');
        let auditorName = localStorage.getItem('ultron_auditor_name') || "";

        const scrollToTop = () => { document.querySelector('.content-scroll').scrollTop = 0; };

        window.onload = () => { 
            if (!auditorName) { document.getElementById('introScreen').classList.remove('hidden'); } 
            else { actualizarAuditorDisplay(); }
            actualizarHistorial(); actualizarBadge(); 
        };

        function registrarAuditor() {
            const name = document.getElementById('auditorNameInput').value.trim();
            if (name.length < 3) { alert("Ingresa tu nombre"); return; }
            auditorName = name;
            localStorage.setItem('ultron_auditor_name', auditorName);
            document.getElementById('introScreen').classList.add('hidden');
            actualizarAuditorDisplay();
        }

        function cerrarSesion() { if (confirm("¿Cerrar sesión?")) { localStorage.removeItem('ultron_auditor_name'); location.reload(); } }
        function actualizarAuditorDisplay() { document.getElementById('auditorDisplay').innerText = "AUDITOR: " + auditorName.toUpperCase(); }
        function limpiarInput() { document.getElementById('codigoInput').value = ''; document.getElementById('codigoInput').focus(); }
        function toggleUbi() { const i = document.getElementById('inputUbi'); if(document.getElementById('checkUbi').checked){ i.classList.remove('hidden'); i.focus(); } else { i.classList.add('hidden'); } }
        function limpiarHistorial() { if (confirm("¿Limpiar historial?")) { historial = []; localStorage.setItem('ultron_history', '[]'); actualizarHistorial(); } }

        async function buscarStock(codigoForzado = null) {
            const input = document.getElementById('codigoInput');
            const codigo = codigoForzado || input.value.trim();
            if (!codigo) return;
            
            if(codigoForzado) scrollToTop();

            cerrarEscanner(); limpiarChecks(); mostrarVista('loader');
            try {
                const response = await fetch(API_URL + codigo);
                const data = await response.json();
                if (data.error || !data.nombre || data.nombre === "No detectado") throw new Error();
                
                currentProduct = data; 
                guardarEnHistorial(data);

                const banner = document.getElementById('resBanner'), resLabel = document.getElementById('resCodigoLabel'), resNombre = document.getElementById('resNombre'), sBox = document.getElementById('stockBox'), sLabel = document.getElementById('stockLabel');
                sLabel.innerText = "STOCK";

                if (data.descontinuado === true) {
                    banner.classList.add('bg-descontinuado'); resLabel.innerHTML = `<i class="fas fa-ban mr-1"></i> DESCONTINUADO: ${data.codigo}`; resNombre.classList.add('text-red-600'); sBox.className = "p-4 rounded-2xl border border-red-200 bg-red-50 text-red-600 text-center font-bold";
                } else {
                    banner.classList.remove('bg-descontinuado'); resLabel.innerText = "CÓDIGO: " + data.codigo; resNombre.classList.remove('text-red-600');
                    if (parseInt(data.stock) <= 0) sBox.className = "p-4 rounded-2xl border border-red-100 bg-red-50 text-red-600 text-center font-bold";
                    else sBox.className = "p-4 rounded-2xl border border-green-50 bg-green-50 text-green-600 text-center font-bold";
                }
                document.getElementById('resNombre').innerText = data.nombre; document.getElementById('resPrecio').innerText = data.precio ? "$" + data.precio.toLocaleString('es-CL') : "---"; document.getElementById('resStock').innerText = data.stock ?? 0; mostrarVista('resultado');
            } catch (error) { mostrarVista('errorMsg'); }
        }

        function guardarYGestionar() {
            const tareas = Array.from(document.querySelectorAll('#checklistArea input[data-tarea]:checked')).map(c => c.getAttribute('data-tarea'));
            const ubiManual = document.getElementById('inputUbi').value.trim();
            if (tareas.length > 0 || ubiManual !== "") {
                const item = { ...currentProduct, tareas, ubicacion: ubiManual, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
                gestionados.unshift(item); localStorage.setItem('ultron_gestionados', JSON.stringify(gestionados)); actualizarBadge();
            }
            nuevaBusqueda();
            scrollToTop();
        }

        function mostrarVista(id) { document.querySelectorAll('#loader, #resultado, #errorMsg, #scannerWrapper, #historialSection').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); if(id !== 'resultado') document.getElementById('historialSection').classList.remove('hidden'); }
        function abrirEscanner() { mostrarVista('scannerWrapper'); html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => buscarStock(text)); }
        function cerrarEscanner() { if (html5QrCode) html5QrCode.stop().then(() => document.getElementById('scannerWrapper').classList.add('hidden')); }
        function nuevaBusqueda() { limpiarInput(); mostrarVista('historialSection'); scrollToTop(); }
        function actualizarBadge() { const b = document.getElementById('badgeGestion'); b.innerText = gestionados.length; b.classList.toggle('hidden', gestionados.length === 0); }
        function limpiarChecks() { document.querySelectorAll('#checklistArea input').forEach(c => c.checked = false); document.getElementById('inputUbi').classList.add('hidden'); document.getElementById('inputUbi').value = ""; }
        
        function abrirModalGestion() { 
            document.getElementById('modalGestion').classList.remove('hidden'); 
            const lista = document.getElementById('listaReporte'); 
            lista.innerHTML = gestionados.map(g => {
                const isDesc = g.descontinuado === true;
                const cardClass = isDesc ? "bg-red-50 border-red-200" : "bg-white border-slate-100";
                const nameClass = isDesc ? "text-red-700" : "text-slate-800";
                
                return `
                <div class="${cardClass} p-4 rounded-2xl mb-2 shadow-sm border">
                    <div class="flex justify-between items-start mb-1">
                        <p class="font-black text-[11px] uppercase w-4/5 ${nameClass}">${g.nombre}</p>
                        <span class="text-[9px] font-black ${isDesc ? 'text-red-600' : 'text-slate-400'}">STK: ${g.stock}</span>
                    </div>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">#${g.codigo} | ${g.time}</p>
                    <div class="mt-3 flex flex-wrap gap-1">
                        ${g.tareas.map(t => `<span class="bg-red-50 text-red-600 text-[8px] font-black px-2 py-0.5 rounded-full border border-red-100">${t}</span>`).join('')}
                        ${g.ubicacion ? `<span class="bg-blue-50 text-blue-600 text-[8px] font-black px-2 py-0.5 rounded-full border border-blue-100"><i class="fas fa-map-marker-alt mr-1"></i>${g.ubicacion}</span>` : ''}
                    </div>
                </div>`;
            }).join(''); 
        }

        function cerrarModalGestion() { document.getElementById('modalGestion').classList.add('hidden'); }
        function vaciarReporte() { if (confirm("¿Borrar todos los reportes?")) { gestionados = []; localStorage.setItem('ultron_gestionados', '[]'); actualizarBadge(); cerrarModalGestion(); } }
        
        function compartirReporte() { 
            const t = gestionados.map(g => `⚠️ ${g.nombre} (#${g.codigo})\n📦 STOCK: ${g.stock}\n🚨 TAREAS: ${g.tareas.join(', ')}\n📍 UBICACIÓN: ${g.ubicacion || 'N/A'}`).join('\n\n'); 
            const finalReport = `REPORTES ULTRON\nAuditado por: ${auditorName.toUpperCase()}\n\n${t}`;
            navigator.clipboard.writeText(finalReport).then(() => alert("Reporte copiado.")); 
        }

        function guardarEnHistorial(item) { 
            historial = historial.filter(h => h.codigo !== item.codigo); 
            // Guardamos stock y descontinuado en el objeto historial
            historial.unshift({
                codigo: item.codigo, 
                nombre: item.nombre, 
                precio: item.precio, 
                stock: item.stock, 
                descontinuado: item.descontinuado
            }); 
            historial = historial.slice(0, 10); 
            localStorage.setItem('ultron_history', JSON.stringify(historial)); 
            actualizarHistorial(); 
        }

        function actualizarHistorial() { 
            const lista = document.getElementById('listaHistorial'); 
            if (historial.length === 0) { lista.innerHTML = '<p class="text-slate-300 italic text-[10px] text-center py-4 uppercase font-black tracking-widest">Sin registros</p>'; return; } 
            
            lista.innerHTML = historial.map(h => {
                const isDesc = h.descontinuado === true;
                const cardClass = isDesc ? "bg-red-50 border-red-200" : "bg-white border-slate-50";
                const textClass = isDesc ? "text-red-700" : "text-slate-700";
                const priceClass = isDesc ? "text-red-600" : "text-blue-600";
                const stockColor = isDesc || parseInt(h.stock) <= 0 ? "text-red-500" : "text-slate-400";

                return `
                <div onclick="buscarStock('${h.codigo}')" class="${cardClass} p-4 rounded-2xl flex justify-between items-center shadow-sm text-[10px] uppercase font-black active:scale-95 transition-all border">
                    <div class="w-2/3">
                        <p class="truncate ${textClass}">${h.nombre}</p>
                        <div class="flex gap-2 items-center">
                            <p class="text-[8px] font-normal text-slate-400 italic">#${h.codigo}</p>
                            <span class="text-[8px] font-black ${stockColor}">STK: ${h.stock}</span>
                        </div>
                    </div>
                    <div class="${priceClass} font-black tracking-tighter">$${h.precio.toLocaleString('es-CL')}</div>
                </div>`;
            }).join(''); 
        }
    </script>
</body>
</html>
