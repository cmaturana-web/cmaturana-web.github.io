<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultron Auditor PRO - v30.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #cbd5e1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        
        .app-frame {
            width: 100%;
            max-width: 410px; 
            height: 94vh;
            background-color: #f8fafc;
            border: 4px solid #2563eb;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.4);
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 480px) {
            .app-frame { height: 100vh; border-radius: 0; border: none; }
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            background-color: #f8fafc;
            padding: 1rem;
            overflow: hidden;
        }

        .fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* GESTIÓN DE BOTONES COMPACTOS */
        .check-item div { padding: 0.7rem 0.3rem; border-width: 2px; border-radius: 1.2rem; transition: all 0.2s; border-color: #f1f5f9; background-color: white; }
        .check-item div i { font-size: 1rem; margin-bottom: 3px; color: #94a3b8; }
        .check-item span { font-size: 8px; font-weight: 900; color: #64748b; }
        
        .check-red input:checked + div { border-color: #ef4444; background-color: #fef2f2; }
        .check-red input:checked + div i { color: #dc2626; }
        .check-red input:checked + div span { color: #991b1b; }

        .check-green input:checked + div { border-color: #22c55e; background-color: #f0fdf4; }
        .check-green input:checked + div i { color: #16a34a; }
        .check-green input:checked + div span { color: #14532d; }

        #reader { width: 100% !important; border-radius: 1.5rem; overflow: hidden; }
        .bg-descontinuado { background-color: #dc2626 !important; }

        #modalGestion {
            position: absolute;
            inset: 0;
            z-index: 9999;
            background-color: #0f172a;
            display: none;
            flex-direction: column;
            padding: 1.5rem;
            color: white;
        }
    </style>
</head>
<body>

    <div class="app-frame">
        
        <!-- PANTALLA 1: LOGIN -->
        <div id="introScreen" class="screen z-[500] items-center justify-center text-center hidden">
            <div class="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white text-4xl mb-6 font-black italic shadow-xl">U</div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tighter leading-none uppercase">ULTRON <br><span class="text-blue-600">AUDITOR</span></h2>
            <div class="mt-10 w-full px-4">
                <input id="auditorNameInput" type="text" placeholder="TU NOMBRE" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-500 font-black text-center mb-4 uppercase">
                <button onclick="registrarAuditor()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl shadow-lg active:scale-95 uppercase text-xs italic tracking-widest">Entrar</button>
            </div>
        </div>

        <!-- PANTALLA 2: HOME -->
        <div id="homeScreen" class="screen hidden fade-in">
            <div class="flex justify-between items-center mb-5">
                <div>
                    <h1 class="text-xl font-black text-blue-900 italic uppercase">ULTRON <span class="text-blue-500 font-bold">GESTIÓN</span></h1>
                    <div class="flex items-center gap-2">
                        <p id="auditorDisplay" class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic">AUDITOR: ---</p>
                        <button onclick="cerrarSesion()" class="text-red-300 active:scale-75"><i class="fas fa-power-off text-[10px]"></i></button>
                    </div>
                </div>
                <button onclick="abrirModalGestion()" class="relative bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90">
                    <i class="fas fa-clipboard-list text-lg"></i>
                    <span id="badgeGestion" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                </button>
            </div>

            <div class="bg-white p-1 rounded-[2rem] shadow-sm flex items-center mb-5 border border-slate-200">
                <input id="codigoInput" type="number" inputmode="numeric" placeholder="ESCANEAR..." class="flex-grow p-3 text-base font-bold bg-transparent outline-none w-full" onkeypress="if(event.key === 'Enter') buscarStock()">
                <button onclick="abrirEscanner()" class="bg-slate-50 text-slate-400 w-10 h-10 rounded-xl flex items-center justify-center mr-1"><i class="fas fa-camera"></i></button>
                <button onclick="buscarStock()" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md active:scale-90"><i class="fas fa-search text-xs"></i></button>
            </div>

            <!-- ESCÁNER CON BOTÓN CERRAR -->
            <div id="scannerWrapper" class="hidden mb-4 fade-in">
                <div class="bg-black rounded-2xl overflow-hidden relative border-4 border-blue-600">
                    <div id="reader"></div>
                    <button onclick="cerrarEscanner()" class="absolute top-2 right-2 bg-red-600 text-white w-8 h-8 rounded-full z-50 flex items-center justify-center shadow-lg">
                        <i class="fas fa-times text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="flex-grow overflow-y-auto pr-1">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-slate-400 text-[9px] font-black uppercase tracking-widest italic px-1">HISTORIAL RECIENTE</h3>
                    <button onclick="limpiarHistorial()" class="text-red-400 text-[9px] font-black uppercase">Limpiar</button>
                </div>
                <div id="listaHistorial" class="space-y-2 pb-5"></div>
            </div>
        </div>

        <!-- PANTALLA 3: RESULTADO (OPTIMIZADO MÓVIL) -->
        <div id="resultScreen" class="screen !p-0 hidden fade-in">
            <div id="resBanner" class="bg-blue-600 p-3 text-white text-center font-black italic text-[11px] tracking-[0.2em] uppercase">
                <span id="resCodigoLabel">CÓDIGO: ---</span>
            </div>
            
            <div class="px-5 py-3 flex-grow flex flex-col overflow-hidden">
                <h2 id="resNombre" class="text-[1rem] font-black text-slate-800 text-center leading-tight tracking-tight uppercase mb-4 line-clamp-2">PRODUCTO</h2>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-50 p-3 rounded-[1.5rem] border border-slate-100 text-center">
                        <span class="text-[8px] font-black text-slate-400 uppercase block">PVP</span>
                        <p id="resPrecio" class="text-lg font-black text-slate-800">$0</p>
                    </div>
                    <div id="stockBox" class="p-3 rounded-[1.5rem] border text-center flex flex-col justify-center">
                        <span id="stockLabel" class="text-[8px] font-black uppercase block">STOCK</span>
                        <p id="resStock" class="text-lg font-black">0</p>
                    </div>
                </div>

                <!-- PANEL GESTIÓN SUBIDO -->
                <div class="bg-slate-50/50 p-3 rounded-[2rem] border border-slate-200/50 space-y-2">
                    <div id="checklistArea" class="grid grid-cols-2 gap-2">
                        <label class="check-item check-red cursor-pointer">
                            <input type="checkbox" data-tarea="PRECIO" class="hidden">
                            <div class="bg-white text-center shadow-sm flex flex-col items-center">
                                <i class="fas fa-tag"></i><span class="uppercase">PRECIO</span>
                            </div>
                        </label>
                        <label class="check-item check-red cursor-pointer">
                            <input type="checkbox" data-tarea="REPOSICIÓN" class="hidden">
                            <div class="bg-white text-center shadow-sm flex flex-col items-center">
                                <i class="fas fa-boxes"></i><span class="uppercase">REPOSICIÓN</span>
                            </div>
                        </label>
                        <label class="check-item check-red cursor-pointer">
                            <input type="checkbox" data-tarea="LIMPIEZA" class="hidden">
                            <div class="bg-white text-center shadow-sm flex flex-col items-center">
                                <i class="fas fa-broom"></i><span class="uppercase">LIMPIEZA</span>
                            </div>
                        </label>
                        <label class="check-item check-red cursor-pointer">
                            <input type="checkbox" data-tarea="REVISAR EXISTENCIA" class="hidden">
                            <div class="bg-white text-center shadow-sm flex flex-col items-center px-1">
                                <i class="fas fa-clipboard-check"></i><span class="uppercase leading-none">REVISAR EXISTENCIA</span>
                            </div>
                        </label>
                    </div>
                    
                    <label class="check-item check-green cursor-pointer block">
                        <input type="checkbox" id="checkUbi" class="hidden" onchange="toggleUbi()">
                        <div class="p-3 bg-white text-center shadow-sm flex items-center justify-center gap-2 rounded-2xl">
                            <i class="fas fa-map-marker-alt !m-0 !text-sm"></i>
                            <span class="uppercase tracking-widest">UBICACIÓN MANUAL</span>
                        </div>
                    </label>
                    <input id="inputUbi" type="text" placeholder="¿Dónde está?" class="hidden w-full p-3 bg-white rounded-xl border-2 border-blue-100 text-xs font-bold text-blue-900 outline-none fade-in">
                </div>

                <!-- BOTONES FINALES MÁS ARRIBA -->
                <div class="flex gap-3 mt-auto mb-2">
                    <button onclick="irAHome()" class="w-[35%] bg-slate-200 text-slate-600 font-black py-4 rounded-[1.5rem] uppercase text-[10px] active:scale-95 tracking-widest text-center">CERRAR</button>
                    <button onclick="guardarYGestionar()" class="flex-grow bg-blue-600 text-white font-black py-4 rounded-[1.5rem] shadow-xl uppercase text-[10px] italic flex items-center justify-center gap-2 active:scale-95">
                        <i class="fas fa-save"></i> GUARDAR ALERTA
                    </button>
                </div>
            </div>
        </div>

        <!-- MODAL REPORTES -->
        <div id="modalGestion">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black italic uppercase">LISTADO ALERTAS</h2>
                <button onclick="cerrarModalGestion()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            <div id="listaReporte" class="flex-grow overflow-y-auto space-y-3 pb-10 scrollbar-hide text-white"></div>
            <div class="flex gap-3 mt-4">
                <button onclick="compartirReporte()" class="flex-grow bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase text-[10px] italic">Enviar WhatsApp</button>
                <button onclick="vaciarReporte()" class="bg-red-500/30 text-red-400 border border-red-500/20 p-5 rounded-2xl"><i class="fas fa-trash-alt"></i></button>
            </div>
        </div>

        <!-- OVERLAYS -->
        <div id="loader" class="screen z-[1000] hidden items-center justify-center bg-white/90">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-100 border-t-blue-600 mb-3"></div>
            <p class="text-blue-900 font-black text-[9px] uppercase tracking-widest italic">Cargando...</p>
        </div>

        <div id="errorMsg" class="screen z-[1000] hidden items-center justify-center text-center px-8 bg-white">
            <i class="fas fa-ghost text-4xl text-red-500 mb-4"></i>
            <p class="font-black text-slate-800 uppercase text-xs mb-8">Código no encontrado</p>
            <button onclick="irAHome()" class="w-full text-[10px] font-black text-blue-600 uppercase bg-blue-50 py-4 rounded-[2rem]">Volver</button>
        </div>

    </div>

    <script>
        const API_URL = "https://round-sound-c782.cmaturana.workers.dev/?codigo=";
        let html5QrCode, currentProduct = null;
        let historial = JSON.parse(localStorage.getItem('ultron_history') || '[]');
        let gestionados = JSON.parse(localStorage.getItem('ultron_gestionados') || '[]');
        let auditorName = localStorage.getItem('ultron_auditor_name') || "";

        window.onload = () => { 
            if (!auditorName) { mostrarPantalla('introScreen'); } 
            else { actualizarAuditorDisplay(); mostrarPantalla('homeScreen'); }
            actualizarHistorial(); actualizarBadge(); 
        };

        function mostrarPantalla(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function registrarAuditor() {
            const name = document.getElementById('auditorNameInput').value.trim();
            if (name.length < 3) return;
            auditorName = name;
            localStorage.setItem('ultron_auditor_name', auditorName);
            actualizarAuditorDisplay();
            mostrarPantalla('homeScreen');
        }

        function cerrarSesion() { if (confirm("¿Cerrar sesión?")) { localStorage.removeItem('ultron_auditor_name'); location.reload(); } }
        function actualizarAuditorDisplay() { document.getElementById('auditorDisplay').innerText = "AUDITOR: " + auditorName.toUpperCase(); }
        function limpiarInput() { document.getElementById('codigoInput').value = ''; document.getElementById('codigoInput').focus(); }
        function toggleUbi() { const i = document.getElementById('inputUbi'); if(document.getElementById('checkUbi').checked){ i.classList.remove('hidden'); i.focus(); } else { i.classList.add('hidden'); i.value = ""; } }
        function limpiarHistorial() { if (confirm("¿Limpiar historial?")) { historial = []; localStorage.setItem('ultron_history', '[]'); actualizarHistorial(); } }

        async function buscarStock(codigoForzado = null) {
            const input = document.getElementById('codigoInput');
            const codigo = codigoForzado || input.value.trim();
            if (!codigo) return;
            input.blur();
            mostrarPantalla('loader');

            try {
                const response = await fetch(API_URL + codigo);
                const data = await response.json();
                if (data.error || !data.nombre || data.nombre === "No detectado") throw new Error();
                
                currentProduct = data; 
                guardarEnHistorial(data);

                const banner = document.getElementById('resBanner'), resLabel = document.getElementById('resCodigoLabel'), resNombre = document.getElementById('resNombre'), sBox = document.getElementById('stockBox');
                
                if (data.descontinuado === true) {
                    banner.classList.add('bg-descontinuado'); 
                    resLabel.innerHTML = `<i class="fas fa-ban mr-2"></i> DESCONTINUADO: ${data.codigo}`; 
                    resNombre.classList.add('text-red-600'); 
                    sBox.className = "p-3 rounded-[1.5rem] border-2 border-red-200 bg-red-50 text-red-600 text-center font-black shadow-sm";
                } else {
                    banner.classList.remove('bg-descontinuado'); 
                    resLabel.innerText = "CÓDIGO: " + data.codigo; 
                    resNombre.classList.remove('text-red-600');
                    if (parseInt(data.stock) <= 0) sBox.className = "p-3 rounded-[1.5rem] border-2 border-red-100 bg-red-50 text-red-600 text-center font-black shadow-sm";
                    else sBox.className = "p-3 rounded-[1.5rem] border-2 border-green-50 bg-green-50 text-green-600 text-center font-black shadow-sm";
                }
                
                document.getElementById('resNombre').innerText = data.nombre; 
                document.getElementById('resPrecio').innerText = data.precio ? "$" + data.precio.toLocaleString('es-CL') : "---"; 
                document.getElementById('resStock').innerText = data.stock ?? 0; 
                
                mostrarPantalla('resultScreen');
            } catch (error) { mostrarPantalla('errorMsg'); }
        }

        function irAHome() { document.getElementById('codigoInput').value = ''; limpiarChecks(); mostrarPantalla('homeScreen'); }

        function guardarYGestionar() {
            const tareas = Array.from(document.querySelectorAll('#checklistArea input[data-tarea]:checked')).map(c => c.getAttribute('data-tarea'));
            const ubiManual = document.getElementById('inputUbi').value.trim();
            if (tareas.length > 0 || ubiManual !== "") {
                const item = { ...currentProduct, tareas, ubicacion: ubiManual, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
                gestionados.unshift(item); localStorage.setItem('ultron_gestionados', JSON.stringify(gestionados)); actualizarBadge();
            }
            irAHome();
        }

        function abrirEscanner() { 
            document.getElementById('scannerWrapper').classList.remove('hidden'); 
            html5QrCode = new Html5Qrcode("reader"); 
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 200 }, (text) => {
                cerrarEscanner();
                buscarStock(text);
            }); 
        }

        function cerrarEscanner() { 
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scannerWrapper').classList.add('hidden');
                }).catch(() => {
                    document.getElementById('scannerWrapper').classList.add('hidden');
                });
            } else {
                document.getElementById('scannerWrapper').classList.add('hidden');
            }
        }

        function actualizarBadge() { const b = document.getElementById('badgeGestion'); b.innerText = gestionados.length; b.classList.toggle('hidden', gestionados.length === 0); }
        function limpiarChecks() { document.querySelectorAll('#checklistArea input').forEach(c => c.checked = false); document.getElementById('inputUbi').classList.add('hidden'); document.getElementById('inputUbi').value = ""; }
        
        function abrirModalGestion() { 
            document.getElementById('modalGestion').style.display = 'flex'; 
            const lista = document.getElementById('listaReporte'); 
            lista.innerHTML = gestionados.map(g => `
            <div class="${g.descontinuado ? 'bg-red-50/10 border-red-500/30' : 'bg-white/10 border-white/10'} p-4 rounded-[1.5rem] border shadow-sm mb-2">
                <div class="flex justify-between items-start mb-1">
                    <p class="font-black text-[11px] uppercase w-4/5 leading-tight ${g.descontinuado ? 'text-red-400' : 'text-white'}">${g.nombre}</p>
                    <span class="text-[10px] font-black ${g.descontinuado ? 'text-red-400' : 'text-blue-400'}">STK: ${g.stock}</span>
                </div>
                <div class="mt-3 flex flex-wrap gap-2">${g.tareas.map(t => `<span class="bg-blue-600 text-white text-[8px] font-black px-3 py-1 rounded-full italic tracking-wider">${t}</span>`).join('')}${g.ubicacion ? `<span class="bg-white/10 text-white text-[8px] font-black px-3 py-1 rounded-full border border-white/20">${g.ubicacion}</span>` : ''}</div>
            </div>`).join(''); 
        }

        function cerrarModalGestion() { document.getElementById('modalGestion').style.display = 'none'; }
        function vaciarReporte() { if (confirm("¿Borrar todo?")) { gestionados = []; localStorage.setItem('ultron_gestionados', '[]'); actualizarBadge(); cerrarModalGestion(); } }
        function compartirReporte() { 
            const t = gestionados.map(g => `⚠️ ${g.nombre} (#${g.codigo})\n📦 STK: ${g.stock}\n🚨 TAREAS: ${g.tareas.join(', ')}`).join('\n\n'); 
            const finalReport = `REPORTES ULTRON\nAuditor: ${auditorName.toUpperCase()}\n\n${t}`;
            navigator.clipboard.writeText(finalReport).then(() => alert("Copiado al portapapeles.")); 
        }

        function guardarEnHistorial(item) { 
            historial = historial.filter(h => h.codigo !== item.codigo); 
            historial.unshift({ codigo: item.codigo, nombre: item.nombre, precio: item.precio, stock: item.stock, descontinuado: item.descontinuado }); 
            historial = historial.slice(0, 10); localStorage.setItem('ultron_history', JSON.stringify(historial)); actualizarHistorial(); 
        }

        function actualizarHistorial() { 
            const lista = document.getElementById('listaHistorial'); 
            if (historial.length === 0) { lista.innerHTML = '<p class="text-slate-300 italic text-[10px] text-center py-6 uppercase font-black">Vacío</p>'; return; } 
            lista.innerHTML = historial.map(h => `
                <div onclick="buscarStock('${h.codigo}')" class="${h.descontinuado ? 'bg-red-50 border-red-100' : 'bg-white border-slate-100'} p-4 rounded-[1.5rem] flex justify-between items-center shadow-sm active:scale-95 transition-all border">
                    <div class="w-2/3">
                        <p class="text-[8px] font-black text-slate-400 mb-0.5 uppercase italic">#${h.codigo}</p>
                        <p class="truncate text-[10px] font-black uppercase ${h.descontinuado ? 'text-red-700' : 'text-slate-800'}">${h.nombre}</p>
                        <span class="text-[9px] font-black ${h.descontinuado || parseInt(h.stock) <= 0 ? 'text-red-500' : 'text-slate-400'} uppercase">STK: ${h.stock}</span>
                    </div>
                    <div class="${h.descontinuado ? 'text-red-600' : 'text-blue-600'} font-black text-sm">$${h.precio.toLocaleString('es-CL')}</div>
                </div>`).join(''); 
        }
    </script>
</body>
</html>
