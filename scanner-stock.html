<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultron Gestión Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        #reader { width: 100% !important; border: none !important; border-radius: 2rem; overflow: hidden; }
        
        /* Estilo para los checks */
        .check-item input:checked + div { background-color: #dcfce7; border-color: #22c55e; }
        .check-item input:checked + div i { color: #16a34a; opacity: 1; }
        .check-item input:checked + div span { color: #166534; text-decoration: line-through; opacity: 0.7; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen pb-10">

    <div class="max-w-md mx-auto w-full">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6 px-2">
            <div>
                <h1 class="text-2xl font-black text-blue-900 tracking-tighter italic">ULTRON <span class="text-blue-500">GESTIÓN</span></h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Checklist de Pasillo v3.0</p>
            </div>
            <div class="bg-blue-600 text-white p-2 rounded-2xl w-10 h-10 flex items-center justify-center shadow-lg shadow-blue-200">
                <i class="fas fa-clipboard-check"></i>
            </div>
        </div>

        <!-- Buscador -->
        <div id="searchContainer" class="bg-white p-2 rounded-3xl shadow-xl flex items-center mb-4 border border-gray-100 transition-all">
            <input id="codigoInput" type="number" inputmode="numeric" placeholder="Código..." 
                   class="flex-grow p-4 text-lg font-bold bg-transparent text-gray-700 outline-none w-full"
                   onkeypress="if(event.key === 'Enter') buscarStock()">
            
            <button onclick="abrirEscanner()" class="bg-slate-100 text-slate-500 w-12 h-12 rounded-2xl flex items-center justify-center mr-2 active:scale-90 transition-all">
                <i class="fas fa-camera text-xl"></i>
            </button>

            <button onclick="buscarStock()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center active:scale-90 transition-all shadow-lg">
                <i class="fas fa-search text-sm"></i>
            </button>
        </div>

        <!-- Escáner -->
        <div id="scannerWrapper" class="hidden mb-6 fade-in">
            <div class="bg-black rounded-[2.5rem] overflow-hidden relative shadow-2xl border-4 border-white">
                <div id="reader"></div>
                <button onclick="cerrarEscanner()" class="absolute top-4 right-4 bg-white/20 backdrop-blur-md text-white w-10 h-10 rounded-full z-50 flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden flex flex-col items-center justify-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-[6px] border-blue-50 border-t-blue-600 mb-4"></div>
            <p class="text-blue-900 font-black text-[10px] uppercase tracking-widest animate-pulse">Sincronizando...</p>
        </div>

        <!-- RESULTADO CON CHECKLIST -->
        <div id="resultado" class="hidden fade-in space-y-4">
            <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-50">
                <!-- Info Producto -->
                <div class="bg-blue-600 p-3 text-white text-center">
                    <span id="resCodigo" class="text-[9px] font-black tracking-[0.4em] opacity-80 uppercase leading-none">CARGANDO...</span>
                </div>
                
                <div class="p-6">
                    <h2 id="resNombre" class="text-lg font-black text-slate-800 mb-6 leading-tight">Nombre del producto</h2>
                    
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-center">
                            <span class="text-blue-500 text-[9px] font-black uppercase block mb-1 tracking-widest">NETO</span>
                            <span id="resPrecio" class="text-xl font-black text-blue-800">$0</span>
                        </div>
                        <div id="stockBox" class="p-4 rounded-2xl border text-center">
                            <span id="stockLabel" class="text-[9px] font-black uppercase block mb-1 tracking-widest">EXISTENCIA</span>
                            <span id="resStock" class="text-xl font-black">0</span>
                        </div>
                    </div>

                    <!-- SECCIÓN CHECKLIST -->
                    <div class="bg-slate-50 p-5 rounded-[2rem] border border-slate-100">
                        <h3 class="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4 text-center">Tareas Pendientes</h3>
                        <div id="checklistArea" class="grid grid-cols-2 gap-3">
                            
                            <!-- ITEM: PRECIO -->
                            <label class="check-item relative">
                                <input type="checkbox" class="hidden peer">
                                <div class="flex items-center justify-center gap-2 p-4 bg-white rounded-2xl border border-slate-200 shadow-sm transition-all active:scale-95">
                                    <i class="fas fa-check-circle opacity-0 transition-opacity"></i>
                                    <span class="text-xs font-black text-slate-600 uppercase tracking-tighter">Precio</span>
                                </div>
                            </label>

                            <!-- ITEM: LIMPIEZA -->
                            <label class="check-item relative">
                                <input type="checkbox" class="hidden peer">
                                <div class="flex items-center justify-center gap-2 p-4 bg-white rounded-2xl border border-slate-200 shadow-sm transition-all active:scale-95">
                                    <i class="fas fa-check-circle opacity-0 transition-opacity"></i>
                                    <span class="text-xs font-black text-slate-600 uppercase tracking-tighter">Limpieza</span>
                                </div>
                            </label>

                            <!-- ITEM: REPOSICIÓN -->
                            <label class="check-item relative">
                                <input type="checkbox" class="hidden peer">
                                <div class="flex items-center justify-center gap-2 p-4 bg-white rounded-2xl border border-slate-200 shadow-sm transition-all active:scale-95">
                                    <i class="fas fa-check-circle opacity-0 transition-opacity"></i>
                                    <span class="text-xs font-black text-slate-600 uppercase tracking-tighter">Stock</span>
                                </div>
                            </label>

                            <!-- ITEM: ORDEN -->
                            <label class="check-item relative">
                                <input type="checkbox" class="hidden peer">
                                <div class="flex items-center justify-center gap-2 p-4 bg-white rounded-2xl border border-slate-200 shadow-sm transition-all active:scale-95">
                                    <i class="fas fa-check-circle opacity-0 transition-opacity"></i>
                                    <span class="text-xs font-black text-slate-600 uppercase tracking-tighter">Orden</span>
                                </div>
                            </label>

                        </div>
                    </div>
                </div>
            </div>
            
            <button onclick="nuevaBusqueda()" class="w-full bg-white text-slate-400 font-black py-5 rounded-[1.5rem] shadow-lg border border-slate-100 flex items-center justify-center gap-3 active:scale-95 uppercase text-[9px] tracking-[0.3em]">
                <i class="fas fa-plus-circle text-blue-500"></i> Nueva Consulta
            </button>
        </div>

        <!-- Historial Recientes -->
        <div id="historialSection" class="mt-8 px-2">
            <h3 class="text-slate-400 text-[9px] font-black uppercase tracking-[0.3em] mb-4">Últimas Consultas</h3>
            <div id="listaHistorial" class="space-y-2"></div>
        </div>

        <!-- Error -->
        <div id="errorMsg" class="hidden fade-in bg-white p-10 rounded-[2.5rem] text-center mt-4 border border-red-50 shadow-2xl">
            <i class="fas fa-search text-red-100 text-6xl mb-4"></i>
            <p class="font-black text-slate-800">Código no encontrado</p>
            <button onclick="nuevaBusqueda()" class="mt-6 text-[10px] font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-8 py-4 rounded-full">Reintentar</button>
        </div>
    </div>

    <script>
        const API_URL = "https://ultron-proxy.cmaturana.workers.dev/?codigo=";
        let html5QrCode;
        let historial = JSON.parse(localStorage.getItem('ultron_history') || '[]');

        window.onload = actualizarHistorial;

        async function buscarStock(codigoForzado = null) {
            const input = document.getElementById('codigoInput');
            const codigo = codigoForzado || input.value.trim();
            if (!codigo) return;

            if (codigoForzado) {
                input.value = codigoForzado;
                if (navigator.vibrate) navigator.vibrate(50);
            }

            cerrarEscanner();
            input.blur();
            resetChecklist(); // LIMPIAR EL CHECKLIST PARA EL NUEVO PRODUCTO
            mostrarVista('loader');

            try {
                const response = await fetch(API_URL + codigo);
                const data = await response.json();

                if (data.error || !data.nombre || data.nombre === "No detectado") throw new Error();

                guardarEnHistorial(data);

                document.getElementById('resCodigo').innerText = "CÓDIGO: " + data.codigo;
                document.getElementById('resNombre').innerText = data.nombre;
                document.getElementById('resPrecio').innerText = data.precio ? "$" + data.precio.toLocaleString('es-CL') : "---";
                document.getElementById('resStock').innerText = data.stock ?? 0;

                const sBox = document.getElementById('stockBox');
                const sLab = document.getElementById('stockLabel');
                const sVal = document.getElementById('resStock');

                if (data.stock <= 0) {
                    sBox.className = "p-4 rounded-2xl border border-red-100 bg-red-50 text-red-600";
                    sLab.innerText = "AGOTADO";
                    sVal.className = "text-xl font-black text-red-700";
                } else {
                    sBox.className = "p-4 rounded-2xl border border-green-100 bg-green-50 text-green-600";
                    sLab.innerText = "DISPONIBLE";
                    sVal.className = "text-xl font-black text-green-700";
                }

                mostrarVista('resultado');
            } catch (error) {
                mostrarVista('errorMsg');
            }
        }

        function resetChecklist() {
            // Desmarca todos los checkboxes del checklist
            const checks = document.querySelectorAll('#checklistArea input');
            checks.forEach(c => c.checked = false);
        }

        function abrirEscanner() {
            mostrarVista('scannerWrapper');
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 15, qrbox: { width: 250, height: 180 } };
            html5QrCode.start({ facingMode: "environment" }, config, (text) => buscarStock(text));
        }

        function cerrarEscanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scannerWrapper').classList.add('hidden');
                });
            }
        }

        function mostrarVista(id) {
            ['loader', 'resultado', 'errorMsg', 'scannerWrapper', 'historialSection'].forEach(v => {
                const el = document.getElementById(v);
                if (v === id) el.classList.remove('hidden');
                else if (v === 'historialSection' && (id === 'loader' || id === 'resultado')) el.classList.add('hidden');
                else if (v === 'historialSection') el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
        }

        function nuevaBusqueda() {
            document.getElementById('codigoInput').value = '';
            mostrarVista('historialSection');
            document.getElementById('codigoInput').focus();
        }

        function guardarEnHistorial(item) {
            historial = historial.filter(h => h.codigo !== item.codigo);
            historial.unshift({codigo: item.codigo, nombre: item.nombre, precio: item.precio});
            historial = historial.slice(0, 5);
            localStorage.setItem('ultron_history', JSON.stringify(historial));
            actualizarHistorial();
        }

        function actualizarHistorial() {
            const lista = document.getElementById('listaHistorial');
            if (historial.length === 0) {
                lista.innerHTML = '<p class="text-slate-300 italic text-[10px] text-center py-4">Sin registros recientes</p>';
                return;
            }
            lista.innerHTML = historial.map(h => `
                <div onclick="buscarStock('${h.codigo}')" class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50 active:scale-95 transition-all">
                    <div class="overflow-hidden">
                        <p class="font-bold text-slate-700 text-sm truncate pr-4">${h.nombre}</p>
                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">${h.codigo}</p>
                    </div>
                    <div class="text-blue-600 font-black text-sm">$${h.precio ? h.precio.toLocaleString('es-CL') : '---'}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
