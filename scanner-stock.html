<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#080C10"/>
<title>Scanner · Stock Higuerillas</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --cyan:       #00E5FF;
  --cyan-dim:   rgba(0,229,255,.15);
  --cyan-glow:  rgba(0,229,255,.4);
  --green:      #00FF9C;
  --green-dim:  rgba(0,255,156,.12);
  --green-glow: rgba(0,255,156,.4);
  --red:        #FF3B5C;
  --red-dim:    rgba(255,59,92,.13);
  --yellow:     #FFD600;
  --bg:         #080C10;
  --bg3:        #131920;
  --card:       #111820;
  --border:     rgba(0,229,255,.12);
  --text:       #E0F0FF;
  --muted:      #4A6070;
  --font-mono:  'Share Tech Mono', monospace;
  --font-ui:    'Exo 2', sans-serif;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{min-height:100%;background:var(--bg);font-family:var(--font-ui);color:var(--text);
  -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;
  overscroll-behavior:none;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch}
button{font-family:inherit;cursor:pointer;border:none;outline:none;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
input{font-family:inherit;outline:none;-webkit-appearance:none}

body::before{content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none}
body::after{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,229,255,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 100%,rgba(0,255,156,.05) 0%,transparent 60%);pointer-events:none}

#app{display:flex;flex-direction:column;min-height:100dvh;max-width:480px;margin:0 auto;
  position:relative;z-index:1;
  padding-top:var(--safe-top);
  padding-bottom:calc(var(--safe-bottom) + 60px)}

/* HEADER */
header{padding:14px 18px 12px;border-bottom:1px solid var(--border);
  background:rgba(8,12,16,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:var(--font-mono);font-size:18px;color:var(--cyan);letter-spacing:2px;text-shadow:0 0 20px var(--cyan-glow)}
.app-sub{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.header-badge{background:var(--cyan-dim);border:1px solid var(--border);border-radius:8px;padding:6px 12px;
  font-family:var(--font-mono);font-size:11px;color:var(--cyan);display:flex;align-items:center;gap:6px}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green-glow);animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.section{padding:16px 14px}
.section-title{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* PANTALLA PERMISO */
#perm-screen{display:flex;flex-direction:column;align-items:center;
  padding:32px 24px;gap:18px;text-align:center}
.perm-icon{width:84px;height:84px;border-radius:50%;background:var(--cyan-dim);
  border:2px solid rgba(0,229,255,.3);display:flex;align-items:center;justify-content:center;
  font-size:36px;animation:pulse-ring 2.2s ease-in-out infinite}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 20px var(--cyan-glow)}
  50%{box-shadow:0 0 55px var(--cyan-glow),0 0 90px rgba(0,229,255,.12)}}
.perm-title{font-size:20px;font-weight:900;color:var(--text)}
.perm-desc{font-size:13px;color:var(--muted);line-height:1.75;max-width:290px}
.perm-desc b{color:var(--cyan);font-weight:700}

#btn-perm{padding:16px 0;width:100%;max-width:290px;background:var(--cyan);color:var(--bg);
  border-radius:16px;font-size:15px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  box-shadow:0 4px 24px var(--cyan-glow);transition:opacity .2s}
#btn-perm:active{opacity:.8}

.btn-link{background:none;border:none;color:var(--cyan);font-size:13px;font-weight:700;
  padding:8px;text-decoration:underline;cursor:pointer}

/* CÁMARA */
#cam-screen{display:none;flex-direction:column;gap:10px}

.cam-wrap{position:relative;width:100%;aspect-ratio:1/1;border-radius:20px;
  overflow:hidden;background:#000;border:1px solid var(--border);
  box-shadow:0 0 0 1px rgba(0,229,255,.05),0 8px 40px rgba(0,0,0,.6)}

#video{width:100%;height:100%;object-fit:cover;display:block}
#canvas-scan{display:none}

/* Marco de escaneo */
.scan-frame{position:absolute;inset:0;z-index:10;pointer-events:none;
  display:flex;align-items:center;justify-content:center}
.scan-box{width:65%;aspect-ratio:3/2;position:relative}
.scan-box::before,.scan-box::after,.corner-bl,.corner-br{
  content:'';position:absolute;width:28px;height:28px;border-color:var(--cyan);border-style:solid}
.scan-box::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-box::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.corner-bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.corner-br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-line{position:absolute;left:6%;right:6%;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  box-shadow:0 0 12px var(--cyan-glow);animation:scanMove 2s ease-in-out infinite}
@keyframes scanMove{0%{top:10%;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:90%;opacity:0}}

.scan-overlay{position:absolute;inset:0;z-index:9;pointer-events:none;
  background:radial-gradient(ellipse 60% 45% at 50% 50%,transparent 55%,rgba(0,0,0,.6) 100%)}

.cam-pill{display:flex;align-items:center;gap:6px;justify-content:center;
  padding:6px 14px;background:var(--bg3);border:1px solid var(--border);
  border-radius:50px;font-family:var(--font-mono);font-size:11px;color:var(--cyan);
  width:fit-content;margin:0 auto}
#cam-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--green);box-shadow:0 0 8px var(--green-glow);
  animation:blink 1.4s ease-in-out infinite}

/* BOTONES */
.row-btns{display:flex;gap:10px}
.btn-stop{flex:1;padding:14px;border-radius:14px;background:var(--red);color:#fff;
  font-size:13px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  box-shadow:0 4px 16px rgba(255,59,92,.4)}
.btn-stop:active{transform:scale(.96)}
.btn-manual-toggle{flex:1;padding:14px;border-radius:14px;background:var(--bg3);
  border:1px solid var(--border);color:var(--muted);
  font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:7px}
.btn-manual-toggle svg{width:15px;height:15px;flex-shrink:0}

/* INPUT MANUAL */
.manual-wrap{display:none;background:var(--card);border-radius:14px;
  border:1.5px solid var(--border);overflow:hidden}
.manual-wrap.show{display:flex}
.manual-wrap:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-dim)}
#manual-input{flex:1;background:transparent;border:none;padding:13px 14px;
  font-family:var(--font-mono);font-size:15px;color:var(--text);letter-spacing:1px}
#manual-input::placeholder{color:var(--muted)}
#btn-go{padding:13px 16px;background:var(--cyan-dim);border-left:1px solid var(--border);
  color:var(--cyan);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
#btn-go:active{background:var(--cyan);color:var(--bg)}

/* SOLO MANUAL */
#solo-manual{display:none;flex-direction:column;gap:10px}
.btn-primary-full{padding:15px;width:100%;border-radius:14px;background:var(--cyan);
  color:var(--bg);font-size:14px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  box-shadow:0 4px 20px var(--cyan-glow)}
.btn-primary-full:active{transform:scale(.96)}

/* RESULTADO */
#result-section{display:none;padding:0 14px 16px}
.result-card{background:var(--card);border-radius:20px;border:1px solid var(--border);
  overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.result-header{padding:14px 16px 12px;
  background:linear-gradient(135deg,rgba(0,229,255,.08),transparent);
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.result-code{font-family:var(--font-mono);font-size:20px;font-weight:700;
  color:var(--cyan);text-shadow:0 0 20px var(--cyan-glow)}
.result-src{margin-left:auto;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}

/* IFRAME resultado */
.iframe-wrap{position:relative;min-height:200px;background:#fff;overflow:hidden}
#iframe-loading{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;background:var(--card);z-index:2}
.spin{width:36px;height:36px;border:2px solid var(--bg3);
  border-top-color:var(--cyan);border-right-color:var(--cyan);
  border-radius:50%;animation:spin .8s linear infinite;box-shadow:0 0 12px var(--cyan-glow)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-label{font-family:var(--font-mono);font-size:11px;color:var(--muted);
  letter-spacing:1px;text-transform:uppercase}
#stock-frame{width:100%;min-height:200px;border:none;display:block;background:#fff}

.result-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.btn-agregar{padding:13px;width:100%;background:var(--green);color:var(--bg);
  border-radius:12px;font-size:13px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  box-shadow:0 4px 16px var(--green-glow)}
.btn-agregar:active{transform:scale(.96)}
.btn-ver{display:block;text-align:center;padding:11px;background:var(--bg3);
  border:1px solid var(--border);border-radius:12px;
  font-family:var(--font-mono);font-size:11px;color:var(--cyan);
  text-decoration:none;letter-spacing:1px}

/* LOADING card */
.loading-card{background:var(--card);border-radius:20px;border:1px solid var(--border);
  padding:32px;display:flex;flex-direction:column;align-items:center;gap:14px}
.loading-code{font-family:var(--font-mono);font-size:22px;color:var(--cyan);letter-spacing:2px}

/* REPORTE PREGUNTA */
.report-ask{margin:0 14px 16px;padding:14px 16px;
  background:rgba(0,255,156,.06);border:1px solid rgba(0,255,156,.2);
  border-radius:14px;display:flex;flex-direction:column;gap:10px;
  animation:slideUp .3s ease}
.ask-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.5}
.ask-text span{color:var(--green)}
.ask-btns{display:flex;gap:8px}
.btn-agregar-sm{flex:1;padding:13px;background:var(--green);color:var(--bg);
  border-radius:12px;font-size:12px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  box-shadow:0 4px 14px var(--green-glow)}
.btn-omitir{padding:13px 16px;background:transparent;border:1px solid var(--border);
  border-radius:12px;color:var(--muted);font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase}

/* REPORTE */
#report-section{padding:0 14px 16px;display:none}
.report-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.btn-export{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--green);background:none;border:1px solid rgba(0,255,156,.25);
  border-radius:8px;padding:5px 10px;display:flex;align-items:center;gap:5px}
.btn-limpiar{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--red);background:none;border:1px solid rgba(255,59,92,.25);border-radius:8px;padding:5px 10px}
.report-list{display:flex;flex-direction:column;gap:8px}
.report-item{background:var(--bg3);border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;display:flex;align-items:center;gap:12px;animation:slideUp .2s ease}
.ri-num{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:20px;text-align:center;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-code{font-family:var(--font-mono);font-size:14px;color:var(--cyan);font-weight:700}
.ri-name{font-size:11px;color:var(--muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-price{font-family:var(--font-mono);font-size:13px;color:var(--green);font-weight:700;flex-shrink:0}
.btn-rm{background:none;color:var(--muted);font-size:16px;padding:4px 8px;border-radius:6px;flex-shrink:0}
.report-total{margin-top:10px;padding:14px 16px;background:var(--green-dim);
  border:1px solid rgba(0,255,156,.2);border-radius:14px;
  display:flex;justify-content:space-between;align-items:center}
.total-label{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.total-val{font-family:var(--font-mono);font-size:20px;color:var(--green);text-shadow:0 0 16px var(--green-glow)}
.report-empty{text-align:center;padding:28px;color:var(--muted);font-size:13px;
  font-weight:600;border:1px dashed var(--border);border-radius:14px}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--safe-bottom) + 24px);left:50%;
  transform:translateX(-50%) translateY(20px);background:var(--bg3);
  border:1px solid var(--border);color:var(--text);border-radius:50px;
  padding:10px 22px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;
  pointer-events:none;z-index:500;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.6);font-family:var(--font-mono);letter-spacing:1px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.green{border-color:rgba(0,255,156,.3);color:var(--green)}
#toast.red{border-color:rgba(255,59,92,.3);color:var(--red)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
</style>
</head>
<body>
<div id="app">

  <header>
    <div>
      <div class="app-title">◈ SCANNER</div>
      <div class="app-sub">Ferretería Higuerillas · Stock</div>
    </div>
    <div class="header-badge">
      <span class="pulse-dot"></span>
      <span id="report-count">0 ítems</span>
    </div>
  </header>

  <div class="section">
    <div class="section-title">Escanear código</div>

    <!-- PANTALLA PERMISO -->
    <div id="perm-screen">
      <div class="perm-icon">📷</div>
      <div class="perm-title">Acceso a la Cámara</div>
      <div class="perm-desc">
        Toca el botón y <b>acepta el permiso</b> que aparece en tu celular para escanear códigos de barras.
      </div>
      <button id="btn-perm" onclick="btnPermClick()">📷 PERMITIR CÁMARA</button>
      <button class="btn-link" onclick="mostrarSoloManual()">Continuar sin cámara →</button>
      <div style="font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:flex-start;max-width:260px;line-height:1.6">
        <span style="flex-shrink:0">🔒</span>
        <span>Solo para escanear. No se graba ni almacena video.</span>
      </div>
    </div>

    <!-- CÁMARA ACTIVA -->
    <div id="cam-screen">
      <div class="cam-wrap">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas-scan"></canvas>
        <div class="scan-overlay"></div>
        <div class="scan-frame">
          <div class="scan-box">
            <div class="corner-bl"></div>
            <div class="corner-br"></div>
            <div class="scan-line"></div>
          </div>
        </div>
      </div>
      <div class="cam-pill">
        <span id="cam-dot"></span>
        <span id="cam-txt">Iniciando…</span>
      </div>
      <div class="row-btns">
        <button class="btn-stop" onclick="detenerCamara()">⏹ DETENER</button>
        <button class="btn-manual-toggle" onclick="toggleManual()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="17" y1="10" x2="3" y2="10"/>
            <line x1="21" y1="6"  x2="3" y2="6"/>
            <line x1="21" y1="14" x2="3" y2="14"/>
            <line x1="17" y1="18" x2="3" y2="18"/>
          </svg>
          MANUAL
        </button>
      </div>
      <div class="manual-wrap" id="manual-wrap">
        <input id="manual-input" type="text" placeholder="Código de barras…"
               inputmode="numeric" autocomplete="off"
               onkeydown="if(event.key==='Enter')buscarManual()"/>
        <button id="btn-go" onclick="buscarManual()">BUSCAR</button>
      </div>
    </div>

    <!-- SOLO MANUAL (sin cámara) -->
    <div id="solo-manual">
      <button class="btn-primary-full" onclick="toggleManual()">✎ INGRESAR CÓDIGO</button>
      <div class="manual-wrap" id="manual-wrap2">
        <input id="manual-input2" type="text" placeholder="Código de barras…"
               inputmode="numeric" autocomplete="off"
               onkeydown="if(event.key==='Enter')buscarManual2()"/>
        <button id="btn-go2" onclick="buscarManual2()">BUSCAR</button>
      </div>
    </div>

  </div><!-- /section -->

  <div id="result-section"></div>

  <div id="report-section">
    <div class="section-title">Reporte de compras</div>
    <div class="report-header-row">
      <button class="btn-export" onclick="exportarReporte()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>EXPORTAR
      </button>
      <button class="btn-limpiar" onclick="limpiarReporte()">✕ LIMPIAR</button>
    </div>
    <div class="report-list" id="report-list"></div>
    <div id="report-total-wrap"></div>
  </div>

</div><!-- /app -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════
var STOCK_BASE = 'http://net.fh.cl:82/ultron_stock.asp';

var videoStream    = null;
var scanLoop       = null;
var escaneando     = false;
var reporteItems   = [];
var ultimoProducto = null;
var detector       = null;

var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
            (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

try { reporteItems = JSON.parse(localStorage.getItem('reporte_compras') || '[]'); } catch(e){}

// ══════════════════════════════════════
//  BOTÓN PERMITIR — entrada principal
// ══════════════════════════════════════
function btnPermClick() {
  var btn = document.getElementById('btn-perm');
  btn.textContent = '⏳ Esperando…';
  btn.disabled = true;
  btn.style.opacity = '.6';
  activarCamara();
}

// ══════════════════════════════════════
//  ACTIVAR CÁMARA — getUserMedia nativo
// ══════════════════════════════════════
function activarCamara() {
  // Verificar soporte
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    mostrarErrorCamara('Tu navegador no soporta acceso a la cámara.',
      isIOS ? 'Usa Safari.' : 'Usa Chrome actualizado.');
    return;
  }

  var constraints = {
    video: {
      facingMode: { ideal: 'environment' },
      width:  { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: false
  };

  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      videoStream = stream;
      mostrarPantallaCamara(stream);
    })
    .catch(function(err) {
      var nombre = err.name || '';
      var msg    = err.message || '';
      console.error('getUserMedia error:', nombre, msg);

      if (nombre === 'NotAllowedError' || nombre === 'PermissionDeniedError') {
        mostrarErrorPermiso();
      } else if (nombre === 'NotFoundError' || nombre === 'DevicesNotFoundError') {
        mostrarErrorCamara('No se encontró una cámara en este dispositivo.', '');
      } else if (nombre === 'NotReadableError' || nombre === 'TrackStartError') {
        mostrarErrorCamara('La cámara está siendo usada por otra app.', 'Cierra otras apps y recarga.');
      } else {
        mostrarErrorCamara('Error: ' + (msg || nombre), '');
      }
    });
}

function mostrarPantallaCamara(stream) {
  // Ocultar pantalla de permiso, mostrar cámara
  document.getElementById('perm-screen').style.display = 'none';
  var camScreen = document.getElementById('cam-screen');
  camScreen.style.display = 'flex';

  var video = document.getElementById('video');
  video.srcObject = stream;
  video.play().catch(function(e){ console.warn('video.play:', e); });

  setCamStatus('Buscando código…', 'green');

  // Iniciar detección de códigos
  iniciarDeteccion(video);
}

// ══════════════════════════════════════
//  DETECCIÓN DE CÓDIGOS
//  Usa BarcodeDetector (Chrome Android)
//  o fallback manual con canvas
// ══════════════════════════════════════
function iniciarDeteccion(video) {
  // Esperar a que el video tenga dimensiones
  video.addEventListener('loadeddata', function() {
    if ('BarcodeDetector' in window) {
      // API nativa de Chrome — más rápida y precisa
      try {
        detector = new BarcodeDetector({
          formats: ['ean_13','ean_8','code_128','code_39','upc_a','upc_e','qr_code','data_matrix','itf','codabar']
        });
        setCamStatus('Escaneando…', 'green');
        scanLoop = setInterval(function() { detectarConAPI(video); }, 200);
      } catch(e) {
        setCamStatus('Escaneando (modo básico)…', 'yellow');
        scanLoop = setInterval(function() { detectarConCanvas(video); }, 300);
      }
    } else {
      // Fallback: mostrar solo el visor y esperar input manual
      setCamStatus('Apunta al código', 'yellow');
      // En este caso usamos un enfoque más simple:
      // el usuario ve la cámara y también puede escribir el código
      mostrarAvisoManual();
    }
  }, { once: true });
}

function detectarConAPI(video) {
  if (escaneando || !detector || video.readyState < 2) return;
  detector.detect(video).then(function(barcodes) {
    if (barcodes && barcodes.length > 0 && !escaneando) {
      var code = barcodes[0].rawValue;
      if (code && code.length > 2) {
        escaneando = true;
        vibrar();
        setCamStatus('✓ ' + code, 'green');
        consultarCodigo(code);
        setTimeout(function() {
          escaneando = false;
          setCamStatus('Escaneando…', 'green');
        }, 3000);
      }
    }
  }).catch(function(){});
}

function detectarConCanvas(video) {
  // Fallback básico — en dispositivos sin BarcodeDetector
  // Solo mostramos el visor para que el usuario ingrese manual
  if (!escaneando) {
    setCamStatus('Ingresa el código manualmente', 'yellow');
    mostrarAvisoManual();
    clearInterval(scanLoop);
  }
}

function mostrarAvisoManual() {
  var wrap = document.getElementById('manual-wrap');
  if (wrap && !wrap.classList.contains('show')) {
    wrap.classList.add('show');
    setTimeout(function() {
      var inp = document.getElementById('manual-input');
      if (inp) inp.focus();
    }, 300);
  }
}

function detenerCamara() {
  if (scanLoop) { clearInterval(scanLoop); scanLoop = null; }
  if (videoStream) { videoStream.getTracks().forEach(function(t){ t.stop(); }); videoStream = null; }
  document.getElementById('cam-screen').style.display  = 'none';
  document.getElementById('perm-screen').style.display = 'flex';
  var btn = document.getElementById('btn-perm');
  if (btn) { btn.textContent = '📷 ACTIVAR CÁMARA'; btn.disabled = false; btn.style.opacity = '1'; }
}

function setCamStatus(txt, color) {
  var dot = document.getElementById('cam-dot');
  var el  = document.getElementById('cam-txt');
  if (!dot || !el) return;
  el.textContent = txt;
  var map = {
    green:  { bg:'var(--green)',  sh:'0 0 8px var(--green-glow)',       an:'blink 1.4s ease-in-out infinite' },
    yellow: ['var(--yellow)', '0 0 8px rgba(255,214,0,.5)', 'blink 1.4s ease-in-out infinite'],
    red:    ['var(--red)',    '0 0 8px rgba(255,59,92,.5)',  'none'],
    muted:  ['var(--muted)', 'none', 'none'],
  };
  var s = map[color] || map.muted;
  if (Array.isArray(s)) {
    dot.style.background = s[0]; dot.style.boxShadow = s[1]; dot.style.animation = s[2];
  } else {
    dot.style.background = s.bg; dot.style.boxShadow = s.sh; dot.style.animation = s.an;
  }
}

function guardarYAgregar() {
  var nombre = document.getElementById('inp-nombre') ? document.getElementById('inp-nombre').value.trim() : '';
  var precioVal = document.getElementById('inp-precio') ? document.getElementById('inp-precio').value : '';
  var stockVal  = document.getElementById('inp-stock')  ? document.getElementById('inp-stock').value  : '';
  var precio = precioVal !== '' ? parseInt(precioVal) : null;
  var stock  = stockVal  !== '' ? parseInt(stockVal)  : null;
  if (ultimoProducto) {
    ultimoProducto.nombre = nombre || '(sin nombre)';
    ultimoProducto.precio = (precio && precio > 0) ? precio : null;
    ultimoProducto.stock  = (stock  !== null && stock >= 0) ? stock : null;
  }
  agregarReporte();
}


// ══════════════════════════════════════
//  PARSEO HTML de Ultron
// ══════════════════════════════════════
function parsearUltron(doc) {
  var txt = ((doc.body && (doc.body.innerText || doc.body.textContent)) || '')
    .replace(/\r\n/g,'\n').replace(/\r/g,'\n');

  var nombre = null, precio = null, stock = null;

  var mStock = txt.match(/Stock\s*:\s*(\d+)/i);
  if (mStock) stock = parseInt(mStock[1]);

  var mPrecio = txt.match(/\$\s*([\d.,]+)\s*c\/u/i) || txt.match(/\$\s*([\d.,]+)/);
  if (mPrecio) {
    var raw = mPrecio[1].replace(/[.,]/g,'');
    var n   = parseInt(raw);
    if (n >= 100) precio = n;
  }

  var mNombre = txt.match(/([A-ZÁÉÍÓÚ][A-ZÁÉÍÓÚ0-9 \-\/]{5,})\s*\nCodigo\s*:/i);
  if (mNombre) {
    nombre = mNombre[1].trim();
  } else {
    var lineas = txt.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 5; });
    for (var i = 0; i < lineas.length; i++) {
      var l = lineas[i];
      if (/^[A-ZÁÉÍÓÚ]/.test(l) && l.length > 8 && l.length < 200 &&
          !/^(Consulte|Codigo|Stock|\$|Ferretería|Higuerillas)/i.test(l)) {
        nombre = l; break;
      }
    }
  }

  return { nombre: nombre || 'Sin nombre', precio: precio, stock: stock };
}

// ══════════════════════════════════════
//  REPORTE
// ══════════════════════════════════════
function agregarAlReporte() {
  mostrarPreguntaReporte(ultimoProducto || { codigo:'?', nombre:null, precio:null, stock:null });
}

function mostrarPreguntaReporte(p) {
  var old = document.querySelector('.report-ask');
  if (old) old.remove();

  var div = document.createElement('div');
  div.className = 'report-ask';
  div.innerHTML =
    '<div class="ask-text">¿Agregar <span>#' + esc(p.codigo) + '</span> al reporte de compras?</div>' +
    '<div class="ask-btns">' +
      '<button class="btn-agregar-sm" onclick="agregarReporte()">✓ AGREGAR</button>' +
      '<button class="btn-omitir"     onclick="this.closest(\'.report-ask\').remove()">✕ OMITIR</button>' +
    '</div>';

  var rs = document.getElementById('result-section');
  rs.parentNode.insertBefore(div, rs.nextSibling);
}

function agregarReporte() {
  if (!ultimoProducto) return;
  if (reporteItems.find(function(i){ return i.codigo === ultimoProducto.codigo; })) {
    toast('Ya está en el reporte','red');
    var ra = document.querySelector('.report-ask'); if (ra) ra.remove();
    return;
  }
  reporteItems.push(Object.assign({}, ultimoProducto, { ts: Date.now() }));
  guardarReporte(); renderReporte();
  toast('✓ Agregado al reporte','green');
  var ra = document.querySelector('.report-ask'); if (ra) ra.remove();
  vibrar();
}

function renderReporte() {
  var sec  = document.getElementById('report-section');
  var list = document.getElementById('report-list');
  var totW = document.getElementById('report-total-wrap');
  document.getElementById('report-count').textContent =
    reporteItems.length + ' ítem' + (reporteItems.length !== 1 ? 's' : '');
  sec.style.display = 'block';

  if (!reporteItems.length) {
    list.innerHTML = '<div class="report-empty">Sin productos en el reporte</div>';
    totW.innerHTML = ''; return;
  }

  list.innerHTML = reporteItems.map(function(item, i) {
    var pr = item.precio !== null ? '$' + item.precio.toLocaleString('es-CL') : '—';
    var nm = (item.nombre && item.nombre !== 'Sin nombre') ? item.nombre : '(sin nombre)';
    return '<div class="report-item">' +
      '<div class="ri-num">' + (i+1) + '</div>' +
      '<div class="ri-info">' +
        '<div class="ri-code">' + esc(item.codigo) + '</div>' +
        '<div class="ri-name">' + esc(nm) + '</div>' +
      '</div>' +
      '<div class="ri-price">' + pr + '</div>' +
      '<button class="btn-rm" onclick="eliminarItem(' + i + ')">✕</button>' +
    '</div>';
  }).join('');

  var total = reporteItems.reduce(function(s,i){ return s + (i.precio||0); }, 0);
  totW.innerHTML = '<div class="report-total">' +
    '<span class="total-label">Total estimado</span>' +
    '<span class="total-val">$' + total.toLocaleString('es-CL') + '</span>' +
  '</div>';
}

function eliminarItem(idx) {
  reporteItems.splice(idx,1); guardarReporte(); renderReporte(); toast('Ítem eliminado');
}
function limpiarReporte() {
  if (!reporteItems.length) return;
  if (!confirm('¿Limpiar todo el reporte?')) return;
  reporteItems=[]; guardarReporte(); renderReporte(); toast('Reporte limpiado');
}
function guardarReporte() {
  try { localStorage.setItem('reporte_compras', JSON.stringify(reporteItems)); } catch(e){}
}
function exportarReporte() {
  if (!reporteItems.length) { toast('Reporte vacío','red'); return; }
  var fecha = new Date().toLocaleDateString('es-CL');
  var lineas = ['REPORTE DE COMPRAS · ' + fecha, '─'.repeat(38)];
  reporteItems.forEach(function(item, i) {
    var n = (item.nombre && item.nombre !== 'Sin nombre') ? item.nombre : '(sin nombre)';
    var p = item.precio !== null ? '$' + item.precio.toLocaleString('es-CL') : 'S/P';
    lineas.push((i+1) + '. [' + item.codigo + '] ' + n + ' — ' + p);
  });
  lineas.push('─'.repeat(38));
  lineas.push('TOTAL: $' + reporteItems.reduce(function(s,i){ return s+(i.precio||0); },0).toLocaleString('es-CL'));
  var texto = lineas.join('\n');
  if (navigator.share) navigator.share({ title:'Reporte de Compras', text:texto }).catch(function(){ copiar(texto); });
  else copiar(texto);
}
function copiar(t) {
  navigator.clipboard && navigator.clipboard.writeText(t)
    .then(function(){ toast('✓ Copiado','green'); })
    .catch(function(){ toast('Error al copiar','red'); });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function vibrar() { try { if(navigator.vibrate) navigator.vibrate([40,20,40]); } catch(e){} }

var _tt;
function toast(msg, tipo) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (tipo||'');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 2800);
}

window.addEventListener('DOMContentLoaded', function() {
  renderReporte();
});
</script>
