<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Inventario - Higuerillas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Librerías para Leer Excel y Escanear QR/Barra -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .header { background: #002060; color: white; padding: 20px; text-align: center; border-bottom: 5px solid #ffcc00; }
        .card-resultado { display: none; margin-top: 20px; border-left: 8px solid #002060; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-top: 10px; display: none; }
        .btn-scanner { background-color: #ffcc00; color: #002060; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h4>FERRETERÍA HIGUERILLAS</h4>
    <p class="mb-0">Consulta de Inventario Real</p>
</div>

<div class="container mt-4">
    <!-- PASO 1: CARGAR EXCEL -->
    <div id="paso1" class="card p-4 shadow-sm text-center">
        <h5>1. Carga tu Planilla Excel</h5>
        <p class="text-muted small">Sube el archivo para empezar a consultar.</p>
        <input type="file" id="input-excel" class="form-control" accept=".xlsx, .xls, .csv">
    </div>

    <!-- PASO 2: BUSCADOR Y ESCÁNER (Oculto hasta que se cargue el archivo) -->
    <div id="paso2" style="display:none;">
        <div class="card p-3 shadow-sm mt-3">
            <h5>2. Buscar Producto</h5>
            
            <div class="input-group mb-2">
                <input type="text" id="codigo-manual" class="form-control" placeholder="Escribe el código aquí...">
                <button class="btn btn-primary" onclick="buscarManual()">Buscar</button>
            </div>

            <button class="btn btn-scanner w-100 p-3" onclick="iniciarEscaneo()">
                📷 ABRIR ESCÁNER DE CÁMARA
            </button>
            
            <div id="reader"></div>
            <button id="btn-cerrar-camara" class="btn btn-danger btn-sm w-100 mt-2" style="display:none;" onclick="detenerEscaneo()">Cerrar Cámara</button>
        </div>

        <!-- RESULTADOS -->
        <div id="resultado" class="card card-resultado p-4 shadow mb-5">
            <h4 id="res-nombre" class="text-primary">Nombre del Producto</h4>
            <hr>
            <div class="row">
                <div class="col-6"><strong>Código:</strong> <span id="res-codigo">-</span></div>
                <div class="col-6 text-end"><strong>Folio:</strong> <span id="res-folio">-</span></div>
            </div>
            <div class="mt-3 p-3 bg-light rounded text-center">
                <div class="row">
                    <div class="col-4 border-end">
                        <small>STOCK FÍSICO</small><br>
                        <h4 id="res-fisico" class="mb-0">0</h4>
                    </div>
                    <div class="col-4 border-end">
                        <small>SISTEMA</small><br>
                        <h4 id="res-sistema" class="mb-0">0</h4>
                    </div>
                    <div class="col-4">
                        <small>DIFERENCIA</small><br>
                        <h4 id="res-dif" class="mb-0 text-danger">0</h4>
                    </div>
                </div>
            </div>
            <div class="mt-3">
                <strong>Responsable:</strong> <span id="res-user">-</span><br>
                <strong>Categoría:</strong> <span id="res-cat">-</span>
            </div>
        </div>
    </div>
</div>

<script>
    let datosInventario = [];
    let html5QrCode;

    // LÓGICA PARA LEER EL EXCEL
    document.getElementById('input-excel').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            // Suponemos que los datos están en la "Segunda Hoja" (Index 1)
            // Si están en la primera, cambia el 1 por un 0.
            const sheetName = workbook.SheetNames[1] || workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            
            // Convertir a JSON
            datosInventario = XLSX.utils.sheet_to_json(worksheet);
            
            if(datosInventario.length > 0) {
                alert("✅ Planilla cargada: " + datosInventario.length + " productos encontrados.");
                document.getElementById('paso1').style.display = 'none';
                document.getElementById('paso2').style.display = 'block';
            }
        };
        reader.readAsArrayBuffer(file);
    });

    // FUNCIÓN DE BÚSQUEDA
    function buscarProducto(codigo) {
        // Buscamos en el JSON por el código de producto
        // Ajusta 'CÓDIGO PRODUCTO' al nombre exacto de tu columna en Excel
        const encontrado = datosInventario.find(item => 
            String(item['CÓDIGO PRODUCTO'] || item['CODIGO']).trim() === String(codigo).trim()
        );

        if (encontrado) {
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('res-nombre').innerText = encontrado['DESCRIPCIÓN PRODUCTO'] || 'Sin descripción';
            document.getElementById('res-codigo').innerText = encontrado['CÓDIGO PRODUCTO'] || '-';
            document.getElementById('res-fisico').innerText = encontrado['CONTEO TOTAL'] || '0';
            document.getElementById('res-sistema').innerText = encontrado['STOCK'] || '0';
            document.getElementById('res-dif').innerText = encontrado['DIFERENCIA EN UNIDADES'] || '0';
            document.getElementById('res-cat').innerText = encontrado['CATEGORIA'] || '-';
            
            // Vibrar el celular al encontrar (si el móvil lo permite)
            if (navigator.vibrate) navigator.vibrate(200);
            detenerEscaneo();
        } else {
            alert("❌ Código " + codigo + " no encontrado en esta planilla.");
        }
    }

    function buscarManual() {
        const cod = document.getElementById('codigo-manual').value;
        if(cod) buscarProducto(cod);
    }

    // LÓGICA DEL ESCÁNER
    function iniciarEscaneo() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('btn-cerrar-camara').style.display = 'block';
        
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 150 } };

        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            buscarProducto(decodedText);
        });
    }

    function detenerEscaneo() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('btn-cerrar-camara').style.display = 'none';
            });
        }
    }
</script>

</body>
</html>
