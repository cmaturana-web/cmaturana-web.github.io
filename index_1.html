<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Importaciones China · !LWii</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --teal:    #00838F;
  --teal-dk: #005F6B;
  --orange:  #EF6C00;
  --green:   #43A047;
  --red:     #E53935;
  --bg:      #F0F2F5;
  --card:    #FFFFFF;
  --text:    #1A1A2E;
  --muted:   #7A8090;
  --border:  #E2E5EC;
  --shadow:  0 2px 12px rgba(0,0,0,.09);
  --radius:  14px;
  --font-h:  'Syne', sans-serif;
  --font-b:  'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); font-family: var(--font-b); color: var(--text); -webkit-font-smoothing: antialiased; }
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; border: none; outline: none; }
input  { font-family: inherit; outline: none; }
#app { display: flex; flex-direction: column; min-height: 100dvh; max-width: 480px; margin: 0 auto; }

/* TOPBAR */
#topbar {
  background: var(--teal); padding: 14px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,131,143,.35);
}
#topbar h1 { font-family: var(--font-h); font-size: 13px; font-weight: 800; color: #fff; letter-spacing: .5px; line-height: 1.3; }
#topbar h1 span { display: block; font-size: 10px; font-weight: 400; opacity: .75; letter-spacing: 1px; text-transform: uppercase; }
#btn-auth {
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
  border-radius: 50px; padding: 6px 12px; font-size: 12px; font-weight: 500; color: #fff;
  display: flex; align-items: center; gap: 6px; transition: background .2s; white-space: nowrap;
}
#btn-auth svg { width: 16px; height: 16px; flex-shrink: 0; }

#content { flex: 1; display: flex; flex-direction: column; }
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* LOGIN */
#screen-login {
  align-items: center; justify-content: center; padding: 40px 32px;
  background: linear-gradient(160deg, #e0f7f9 0%, #f0f2f5 60%);
  min-height: calc(100dvh - 60px);
}
.login-logo {
  width: 80px; height: 80px; border-radius: 24px;
  background: var(--teal); display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px; box-shadow: 0 8px 24px rgba(0,131,143,.3);
}
.login-logo svg { width: 44px; height: 44px; fill: #fff; }
#screen-login h2 { font-family: var(--font-h); font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 6px; }
#screen-login p.subtitle { color: var(--muted); text-align: center; font-size: 14px; margin-bottom: 40px; line-height: 1.5; }
#btn-google-login {
  background: #fff; border: 1.5px solid var(--border); border-radius: 50px; padding: 14px 28px;
  font-size: 15px; font-weight: 500; color: var(--text);
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow); transition: box-shadow .2s, transform .15s, opacity .2s; width: 100%;
}
#btn-google-login:hover  { box-shadow: 0 4px 20px rgba(0,0,0,.13); transform: translateY(-1px); }
#btn-google-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }
#btn-google-login img { width: 22px; height: 22px; }
#login-status { margin-top: 14px; font-size: 12px; color: var(--muted); text-align: center; min-height: 18px; }

/* INVENTORY */
.search-wrap { padding: 12px 12px 0; position: sticky; top: 60px; z-index: 90; background: var(--bg); }
.search-inner {
  background: var(--card); border-radius: var(--radius);
  display: flex; align-items: center; padding: 0 14px;
  box-shadow: var(--shadow); border: 1.5px solid transparent; transition: border-color .2s;
}
.search-inner:focus-within { border-color: var(--teal); }
.search-inner svg { width: 18px; height: 18px; color: var(--teal); flex-shrink: 0; }
#search-input { flex: 1; border: none; background: transparent; padding: 13px 10px; font-size: 15px; color: var(--text); }
#search-input::placeholder { color: var(--muted); }
#btn-clear-search { background: none; border: none; color: var(--muted); padding: 4px; display: none; }

.stats-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 4px; }
.stats-row span { font-size: 13px; font-weight: 700; color: var(--teal); }
#btn-sync {
  background: var(--card); border: 1.5px solid var(--border); border-radius: 50px;
  padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--teal);
  display: flex; align-items: center; gap: 5px; box-shadow: var(--shadow); transition: all .2s;
}
#btn-sync:hover { background: var(--teal); color: #fff; border-color: var(--teal); }
#btn-sync svg { width: 14px; height: 14px; }

#product-list { padding: 8px 12px 100px; display: flex; flex-direction: column; gap: 8px; }

.product-card {
  background: var(--card); border-radius: var(--radius);
  display: flex; align-items: center; gap: 12px; padding: 10px;
  box-shadow: var(--shadow); animation: fadeUp .25s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.prod-thumb { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--bg); }
.prod-thumb-placeholder {
  width: 70px; height: 70px; border-radius: 10px;
  background: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.prod-thumb-placeholder svg { width: 28px; height: 28px; color: var(--border); }
.prod-info { flex: 1; min-width: 0; }
.prod-code { font-family: var(--font-h); font-size: 15px; font-weight: 700; color: var(--teal); }
.prod-name { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.prod-actions { display: flex; flex-direction: column; gap: 6px; }
.btn-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background .15s; }
.btn-icon svg { width: 18px; height: 18px; }
.btn-view   { background: rgba(67,160,71,.12);  color: var(--green); }
.btn-view:hover { background: var(--green); color: #fff; }

#empty-state {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 32px; gap: 12px;
  color: var(--muted); text-align: center;
}
#empty-state svg { width: 64px; height: 64px; opacity: .3; }
#empty-state p { font-size: 15px; line-height: 1.5; }

/* BOTTOM NAV */
#bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--card); border-top: 1.5px solid var(--border);
  display: flex; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,.07);
}
.nav-btn {
  flex: 1; background: none; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  padding: 10px 8px 12px; color: var(--muted); font-size: 11px; font-weight: 500;
}
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--teal); }

/* MODALES */
#modal-view {
  display: none; position: fixed; inset: 0; z-index: 200; padding: 20px;
  background: rgba(0,0,0,.85); align-items: center; justify-content: center;
}
#modal-view.open { display: flex; }

.modal-card {
  background: var(--card); border-radius: 20px;
  width: 100%; max-width: 440px; max-height: 90dvh;
  display: flex; flex-direction: column; overflow: hidden;
  animation: scaleIn .2s ease;
}
@keyframes scaleIn { from { opacity:0; transform:scale(.93); } to { opacity:1; transform:scale(1); } }
#modal-img { width: 100%; aspect-ratio: 1; object-fit: contain; background: var(--bg); }
.modal-body { padding: 16px 20px 20px; }
.modal-code { font-family: var(--font-h); font-size: 22px; font-weight: 800; color: var(--teal); }
.modal-name { font-size: 16px; margin-top: 2px; }
#btn-modal-close { margin-top: 16px; width: 100%; padding: 14px; background: var(--teal); color: #fff; border-radius: 12px; font-size: 15px; font-weight: 600; }



/* TOAST */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #1a1a2e; color: #fff; border-radius: 50px;
  padding: 10px 20px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 300; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.sync-dot { width:7px; height:7px; border-radius:50%; background:#ccc; display:inline-block; margin-left:6px; vertical-align:middle; }
.sync-dot.ok   { background: var(--green); }
.sync-dot.busy { background: var(--orange); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <h1>IMPORTACIONES CHINA <span>by !LWii</span></h1>
    <button id="btn-auth" onclick="handleAuth()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Entrar
    </button>
  </header>

  <main id="content">
    <section id="screen-login" class="screen active">
      <div class="login-logo">
        <svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.1 15.9 0 13.36 0c-1.3 0-2.43.5-3.36 1.3L12 3l-2 2-2-2 1.82-1.7C8.93.5 7.8 0 6.64 0 4.1 0 2 2.1 2 4.64c0 .48.11.92.18 1.36H0v2h20V6zm-7-4c1.24 0 2 .76 2 1.64 0 .44-.4 1.36-.64 1.36H12V3.64C12 2.76 12.76 2 13 2zm-6.36 0C7.24 2 8 2.76 8 3.64V5H6.64C6.4 5 6 4.08 6 3.64 6 2.76 6.76 2 6.64 2zM0 9v2h10v13h4V11h10V9z"/></svg>
      </div>
      <h2>Inventario Pro</h2>
      <p class="subtitle">Conéctate con Google para acceder a tu inventario sincronizado con Drive.</p>
      <button id="btn-google-login" onclick="signIn()" disabled>
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
        Iniciar sesión con Google
      </button>
      <p id="login-status">Cargando APIs de Google…</p>
    </section>

    <section id="screen-inventory" class="screen">
      <div class="search-wrap">
        <div class="search-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search-input" type="search" placeholder="Buscar código o nombre…" oninput="filterProducts()" autocomplete="off"/>
          <button id="btn-clear-search" onclick="clearSearch()">✕</button>
        </div>
      </div>
      <div class="stats-row">
        <span id="product-count">0 Productos <span class="sync-dot" id="sync-dot"></span></span>
        <button id="btn-sync" onclick="syncDrive()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          SINCRO
        </button>
      </div>
      <div id="product-list"></div>
      <div id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
        <p>Sin productos.<br/>Pulsa SINCRO para cargar desde Drive.</p>
      </div>
    </section>
  </main>

  <nav id="bottom-nav" style="display:none">
    <button class="nav-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Inventario
    </button>
  </nav>
</div>

<!-- MODAL VER -->
<div id="modal-view" onclick="if(event.target===this)closeViewModal()">
  <div class="modal-card">
    <img id="modal-img" src="" alt=""/>
    <div class="modal-body">
      <div class="modal-code" id="modal-code"></div>
      <div class="modal-name" id="modal-name"></div>
      <button id="btn-modal-close" onclick="closeViewModal()">CERRAR</button>
    </div>
  </div>
</div>



<div id="toast"></div>

<script>
/* ════════════════════════════════════════
   ⚠️  REEMPLAZA CON TUS CREDENCIALES
   ════════════════════════════════════════ */
const CLIENT_ID = '565842081271-tm3hgcea5ut80a3g68ofeknsvruogffc.apps.googleusercontent.com';
const API_KEY   = 'AIzaSyAAHwo4KFYUkRDUQHPqY0pzjmv0BKrjtw8';
/* ════════════════════════════════════════ */

const FOLDER_NAME = 'Importaciones';
const SCOPES      = 'https://www.googleapis.com/auth/drive.readonly';
const DISCOVERY   = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

let tokenClient  = null;
let gapiReady    = false;
let gisReady     = false;
let accessToken  = null;
let allProducts  = [];

/* ── Callbacks que llaman los scripts de Google ── */
function gapiLoaded() {
  gapi.load('client', () => {
    gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY] })
      .then(() => { gapiReady = true; checkReady(); })
      .catch(e => setStatus('Error GAPI: ' + (e.message || e)));
  });
}

function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: handleToken,
  });
  gisReady = true;
  checkReady();
}

function checkReady() {
  if (!gapiReady || !gisReady) return;
  document.getElementById('btn-google-login').disabled = false;
  setStatus('');
  // Restaurar token de sesión
  const saved = sessionStorage.getItem('inv_token');
  if (saved) {
    accessToken = saved;
    gapi.client.setToken({ access_token: saved });
    showApp();
    syncDrive();
  }
}

function setStatus(msg) {
  document.getElementById('login-status').textContent = msg;
}

/* ── Auth ── */
function signIn() {
  if (!gapiReady || !gisReady) { toast('Espera, cargando…'); return; }
  tokenClient.requestAccessToken({ prompt: '' });
}

function handleToken(resp) {
  if (resp.error) { toast('Error: ' + resp.error); return; }
  accessToken = resp.access_token;
  sessionStorage.setItem('inv_token', accessToken);
  showApp();
  syncDrive();
}

function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null;
  sessionStorage.removeItem('inv_token');
  allProducts = [];
  showLogin();
  toast('Sesión cerrada');
}

function handleAuth() { if (accessToken) signOut(); else signIn(); }

/* ── Pantallas ── */
function showLogin() {
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('screen-inventory').classList.remove('active');
  document.getElementById('bottom-nav').style.display = 'none';
  document.getElementById('btn-auth').innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
      <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
    </svg> Entrar`;
}

function showApp() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-inventory').classList.add('active');
  document.getElementById('bottom-nav').style.display = 'flex';
  document.getElementById('btn-auth').innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg> Salir`;
}

/* ── Drive Sync ── */
async function syncDrive() {
  if (!accessToken) { toast('Inicia sesión primero'); return; }
  setSyncDot('busy');
  toast('Sincronizando…');
  try {
    const fRes = await gapi.client.drive.files.list({
      q: `mimeType='application/vnd.google-apps.folder' and name='${FOLDER_NAME}' and trashed=false`,
      fields: 'files(id)', spaces: 'drive',
    });
    const folders = fRes.result.files || [];
    if (!folders.length) {
      toast(`No encontré la carpeta "${FOLDER_NAME}" en Drive`);
      setSyncDot(''); renderProducts([]); return;
    }
    const folderId = folders[0].id;
    let all = [], pageToken = null;
    do {
      const p = {
        q: `'${folderId}' in parents and trashed=false and (mimeType contains 'image/')`,
        fields: 'nextPageToken,files(id,name,thumbnailLink,modifiedTime)',
        pageSize: 100, spaces: 'drive',
      };
      if (pageToken) p.pageToken = pageToken;
      const r = await gapi.client.drive.files.list(p);
      all.push(...(r.result.files || []));
      pageToken = r.result.nextPageToken;
    } while (pageToken);

    allProducts = all.map(f => {
      const base = f.name.replace(/\.[^.]+$/, '');
      const parts = base.split('_');
      return {
        id: f.id,
        code: parts[0] || '?',
        name: parts[1] || 'SN',
        thumb: f.thumbnailLink ? f.thumbnailLink.replace(/=s\d+/, '=s400') : null,
        fullLink: `https://lh3.googleusercontent.com/d/${f.id}`,
      };
    }).sort((a, b) => b.code.localeCompare(a.code, undefined, { numeric: true }));

    renderProducts(allProducts);
    setSyncDot('ok');
    toast(`✓ ${allProducts.length} productos cargados`);
  } catch (e) {
    console.error(e);
    if (e.status === 401) {
      accessToken = null; sessionStorage.removeItem('inv_token');
      showLogin(); toast('Sesión expirada, vuelve a entrar');
    } else {
      setSyncDot(''); toast('Error al sincronizar');
    }
  }
}

/* ── Render ── */
function renderProducts(list) {
  const container = document.getElementById('product-list');
  const empty     = document.getElementById('empty-state');
  updateCount(list.length);
  if (!list.length) { container.innerHTML = ''; empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  container.innerHTML = list.map((p, i) => `
    <div class="product-card" style="animation-delay:${Math.min(i*25,250)}ms">
      ${p.thumb
        ? `<img class="prod-thumb" src="${p.thumb}" alt="#${p.code}" loading="lazy">`
        : `<div class="prod-thumb-placeholder">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
               <rect x="3" y="3" width="18" height="18" rx="2"/>
               <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
             </svg></div>`}
      <div class="prod-info">
        <div class="prod-code">#${p.code}</div>
        <div class="prod-name">${p.name==='SN'?'<em style="color:var(--muted)">Sin nombre</em>':p.name.replace(/-/g,' ')}</div>
      </div>
      <div class="prod-actions">
        <button class="btn-icon btn-view" onclick="viewProduct(${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>`).join('');
}

/* ── Búsqueda ── */
function getFiltered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  return q ? allProducts.filter(p =>
    p.code.toLowerCase().includes(q) ||
    p.name.toLowerCase().replace(/-/g,' ').includes(q)) : allProducts;
}
function filterProducts() {
  const q = document.getElementById('search-input').value.trim();
  document.getElementById('btn-clear-search').style.display = q ? 'block' : 'none';
  renderProducts(getFiltered());
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('btn-clear-search').style.display = 'none';
  renderProducts(allProducts);
}

/* ── Modal ver ── */
function viewProduct(idx) {
  const p = getFiltered()[idx]; if (!p) return;
  document.getElementById('modal-img').src = p.fullLink;
  document.getElementById('modal-code').textContent = `#${p.code}`;
  document.getElementById('modal-name').textContent = p.name==='SN'?'Sin nombre':p.name.replace(/-/g,' ');
  document.getElementById('modal-view').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeViewModal() {
  document.getElementById('modal-view').classList.remove('open');
  document.getElementById('modal-img').src = '';
  document.body.style.overflow = '';
}

/* ── Helpers ── */
function updateCount(n) {
  const dot = document.getElementById('sync-dot');
  const cls = dot ? dot.className : 'sync-dot';
  document.getElementById('product-count').innerHTML =
    `${n} Producto${n!==1?'s':''} <span class="${cls}" id="sync-dot"></span>`;
}
function setSyncDot(s) {
  const d = document.getElementById('sync-dot');
  if (d) d.className = 'sync-dot'+(s?' '+s:'');
}
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
